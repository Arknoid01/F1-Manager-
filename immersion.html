<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>F1 Manager — Paddock & Saison</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;0,900;1,700&family=Barlow:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>.section-.tile-val{font-family:var(--fh);font-weight:900;font-size:34px;line-height:1;margin-bottom:3px}.tile-sub{font-family:var(--fh);font-size:11px;color:var(--muted);line-height:1.4}
.news-row{padding:11px 0;border-bottom:1px solid var(--border);display:flex;gap:10px}.news-row:last-child{border-bottom:0}.news-ico{font-size:20px;width:26px;text-align:center;flex-shrink:0}.news-title{font-family:var(--fh);font-weight:700;font-size:14px;margin-bottom:3px}.news-text{font-family:var(--fb);font-size:12px;color:var(--muted);line-height:1.5}.row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border);font-family:var(--fh)}.row:last-child{border-bottom:0}.row-main{flex:1;min-width:0}.row-name{font-weight:700;font-size:14px}.row-sub{font-family:var(--fb);font-size:12px;color:var(--muted);line-height:1.35}.row-val{font-family:var(--fh);font-weight:900;font-size:20px;color:var(--gold);white-space:nowrap}.quote{background:#0b0b12;border:1px solid var(--border);border-radius:8px;padding:11px 12px;margin:8px 0;font-size:13px;line-height:1.45}.quote b{font-family:var(--fh);font-size:14px;color:var(--gold)}.junior{display:grid;grid-template-columns:38px 1fr 48px;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}.junior:last-child{border-bottom:0}.flag{font-size:24px}
@media(max-width:640px){.tile-val{font-size:30px}}
</style>
<link rel="stylesheet" href="css/immersive-theme.css">
</head>
<body>
<div class="topbar"><div class="logo">F1<span>Manager</span></div><a class="nav-back" href="index.html">← Accueil</a><div class="top-pills"><div class="pill pill-muted" id="seasonBadge">Saison —</div><div class="pill pill-gold" id="repBadge">⭐ —</div></div></div>
<div class="page"><section class="hero"><div class="hero-kicker">Centre narratif</div><div class="hero-title">Paddock & Saison</div><div class="hero-sub" id="heroSub">Réputation, moral, sponsors, interviews, historique et records de carrière.</div></section><div class="tab-bar"><button class="tab-btn active" onclick="showPane('overview',this)">🎙️ Vue paddock</button><button class="tab-btn" onclick="showPane('history',this)">📚 Historique</button><button class="tab-btn" onclick="showPane('records',this)">🏛️ Records</button><button class="tab-btn" onclick="showPane('academy',this)">🌱 Académie</button></div><main id="content"></main></div>
<script src="js/data.js"></script><script src="js/save.js"></script><script src="js/immersion.js"></script>
<script>
let save=null;
function clamp(v){return Math.max(0,Math.min(100,Math.round(v||0)));}
function esc(s){return Immersion.esc(s);}
function bar(v,cls=''){return `<div class="sbar"><div class="sbar-fill ${cls}" style="width:${clamp(v)}%"></div></div>`;}
function showPane(id,btn){document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));document.getElementById(id)?.classList.add('active');document.querySelectorAll('.tab-btn').forEach(t=>t.classList.remove('active'));btn?.classList.add('active'); if(id) history.replaceState(null,'','#'+id);}
function panel(title,body,extra=''){return `<div class="panel"><div class="sec-lbl">${title}${extra}</div><div class="section-body">${body}</div></div>`;}
function renderNews(items){ if(!items?.length) return '<div class="empty">Aucune nouvelle paddock pour le moment. Termine un GP pour générer des articles.</div>'; return items.slice(-8).reverse().map(n=>`<div class="news-row"><div class="news-ico">${n.icon||'📰'}</div><div><div class="news-title">${esc(n.title)}</div><div class="news-text">${esc(n.text)}</div></div></div>`).join('');}
function renderInterviews(items){ if(!items?.length) return '<div class="empty">Aucune interview disponible.</div>'; return items.slice(-3).reverse().map(i=>`<div class="quote"><b>${esc(i.circuitName)} — ${esc(i.headline)}</b>${(i.quotes||[]).map(q=>`<div style="margin-top:8px">${esc(q)}</div>`).join('')}</div>`).join('');}
function moraleList(m){ const vals=Object.values(m||{}); if(!vals.length) return '<div class="empty">Moral pilote disponible après le prochain GP.</div>'; return vals.slice(0,4).map(d=>`<div class="row"><div class="row-main"><div class="row-name">${esc(d.name)}</div><div class="row-sub">${esc(d.note)}</div></div><div class="row-val">${clamp(d.value)}</div></div>`).join('');}
function topRows(arr,suffix=''){ if(!arr.length) return '<div class="empty">Pas encore assez de données.</div>'; return arr.map((r,i)=>`<div class="row"><div class="row-main"><div class="row-name">${i+1}. ${esc(r.name)}</div></div><div class="row-val">${r.value}${suffix}</div></div>`).join('');}
function histRows(items){ if(!items?.length) return '<div class="empty">Termine une course pour remplir l’historique.</div>'; return items.slice().reverse().map(g=>`<div class="row"><div class="row-main"><div class="row-name">S${g.season} — ${esc(g.circuitName)}</div><div class="row-sub">Victoire ${esc(g.winner)} · ${esc(g.weather)} · SC ${g.safetyCarLaps||0}t · DNF ${g.dnf||0}</div></div><div class="row-val">${g.teamPoints||0} pts</div></div>`).join('');}
function init(){
  save=Save.load(); if(!save){document.getElementById('content').innerHTML=panel('Erreur','<div class="empty">Aucune carrière chargée.</div>');return;}
  Immersion.ensure(save); Save.save(save);
  const im=save.immersion; const rep=im.teamReputation||{};
  document.getElementById('seasonBadge').textContent=`Saison ${save.season||2025}`;
  document.getElementById('repBadge').textContent=`⭐ ${clamp(rep.value)}`;
  document.getElementById('heroSub').textContent=`Saison ${save.season||2025} · Réputation ${clamp(rep.value)}/100 · ${im.gpHistory.length} GP archivé${im.gpHistory.length>1?'s':''}`;
  const last=(im.gpHistory||[]).slice(-1)[0];
  document.getElementById('content').innerHTML=`
  <section class="tab-pane active" id="overview">
    <div class="tiles-grid">
      ${panel('Réputation équipe',`<div class="tile-val">${clamp(rep.value)}</div>${bar(rep.value,'blue')}<div>${(rep.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>`)}
      ${panel('Sponsors vivants',`<div class="tile-val">${clamp(im.sponsorMood.value)}</div>${bar(im.sponsorMood.value,'orange')}<div class="tile-sub" style="margin-top:8px">${esc(im.sponsorMood.note)}</div>`)}
      ${panel('Moral pilotes',moraleList(im.driverMorale))}
      ${panel('Garage & staff',`<div class="tile-val">${clamp(im.staffMorale.value)}</div>${bar(im.staffMorale.value,'green')}<div class="tile-sub" style="margin-top:8px">${esc(im.staffMorale.note)}</div>`)}
    </div>
    ${panel('📰 Paddock news',renderNews(im.paddockNews))}
    ${panel('🎤 Interviews post-course',renderInterviews(im.interviews))}
    <div class="btns"><a class="btn btn-sec" href="news.html">Actualités classiques</a><a class="btn btn-red" href="weekend.html">Prochain week-end</a></div>
  </section>
  <section class="tab-pane" id="history">
    ${panel('Résumé récent',last?`<div class="quote"><b>${esc(last.circuitName)}</b><div>${esc(last.winner)} gagne pour ${esc(last.winnerTeam)}.</div><div class="row-sub">Podium : ${(last.podium||[]).map(esc).join(' · ')||'—'} · Votre meilleur résultat : ${last.playerBest?'P'+last.playerBest:'—'} · ${last.teamPoints||0} pts</div></div>`:'<div class="empty">Aucun GP archivé.</div>')}
    ${panel('Historique des GP',histRows(im.gpHistory))}
  </section>
  <section class="tab-pane" id="records">
    <div class="tiles-grid">
      ${panel('Victoires',topRows(Immersion.top(im.records.wins,6)))}
      ${panel('Podiums',topRows(Immersion.top(im.records.podiums,6)))}
      ${panel('Points carrière',topRows(Immersion.top(im.records.points,6),' pts'))}
      ${panel('Meilleurs résultats',topRows(Immersion.top(im.records.bestResults,6,true).map(r=>({...r,value:'P'+r.value}))))}
    </div>
  </section>
  <section class="tab-pane" id="academy">
    ${panel('Académie junior',`<div class="tile-sub" style="margin-bottom:10px">Prospects suivis par votre cellule junior. Leur progression avance à chaque GP terminé.</div>${(im.juniorAcademy||[]).map(j=>`<div class="junior"><div class="flag">${j.flag}</div><div><div class="row-name">${esc(j.firstName)} ${esc(j.name)}</div><div class="row-sub">${j.age} ans · potentiel ${j.potential} · ${esc(j.note)}</div>${bar(j.progress,'gold')}</div><div class="row-val">${j.progress}%</div></div>`).join('')}`)}
  </section>`;
  const hash=(location.hash||'#overview').slice(1); const b=[...document.querySelectorAll('.tab-btn')].find(x=>x.getAttribute('onclick')?.includes(hash)); if(hash!=='overview') showPane(hash,b);
}
init();
</script>
</body>
</html>
