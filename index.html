<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>F1 Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;0,900;1,700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>/* TEAM SELECT */
.select-screen{padding:20px 4px}
.select-title{font-family:var(--fh);font-weight:900;font-size:26px;letter-spacing:2px;margin-bottom:4px}
.select-sub{font-family:var(--fh);font-size:13px;color:var(--muted);margin-bottom:20px}
.teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:16px}
.team-card{background:var(--surface);border:2px solid var(--border);border-radius:8px;padding:12px 10px;cursor:pointer;transition:all .15s;text-align:center}
.team-card:active{transform:scale(.97)}
.team-card.selected{border-color:var(--gold);background:var(--surface2)}
.tc-name{font-family:var(--fh);font-weight:900;font-size:15px;margin-bottom:3px}
.tc-perf{font-family:var(--fh);font-size:11px;color:var(--muted)}
.tc-budget{font-family:var(--fh);font-size:12px;color:var(--gold);margin-top:3px}
.btn-confirm{font-family:var(--fh);font-weight:900;font-size:15px;letter-spacing:2px;text-transform:uppercase;background:var(--accent);color:#fff;border:none;border-radius:6px;padding:12px 32px;cursor:pointer;display:none;width:100%;transition:background .15s}

/* RACE HERO */
.race-hero{background:linear-gradient(135deg,#12000e,#07070d);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;padding:16px;display:flex;align-items:center;gap:14px;text-decoration:none;color:inherit;transition:background .15s}
.race-hero:active{background:var(--surface)}
.rh-flag{font-size:36px;line-height:1}
.rh-info{flex:1}
.rh-label{font-family:var(--fh);font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:3px}
.rh-name{font-family:var(--fh);font-weight:900;font-size:20px;letter-spacing:1px}
.rh-detail{font-family:var(--fh);font-size:11px;color:var(--muted);margin-top:3px}
.rh-cta{font-family:var(--fh);font-weight:900;font-size:11px;letter-spacing:1px;text-transform:uppercase;background:var(--accent);color:#fff;padding:8px 14px;border-radius:5px;white-space:nowrap;flex-shrink:0}

/* SECTION LABEL */

/* PILOTES */
.driver-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border);text-decoration:none;color:inherit;transition:background .1s}
.driver-row:last-child{border-bottom:0}
.driver-row:active{background:var(--surface2)}
.dr-num{font-family:var(--fh);font-weight:900;font-size:26px;min-width:40px;text-align:center}
.dr-info{flex:1}
.dr-name{font-family:var(--fh);font-weight:700;font-size:16px}
.dr-trait{font-family:var(--fh);font-size:11px;color:var(--muted);margin-top:2px}
.dr-pace{font-family:var(--fh);font-weight:900;font-size:24px}

/* TUILES */

.tile{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;text-decoration:none;color:inherit;display:block;transition:background .1s;min-height:86px}
@media(max-width:520px){.tile{padding:9px;min-height:78px}.tile-icon{font-size:17px!important;margin-bottom:3px!important}.tile-val{font-size:17px!important}.tile-sub{font-size:10px!important}}
.tile:active{background:var(--surface2)}
.tile-icon{font-size:18px;margin-bottom:4px;display:block}
.tile-lbl{font-family:var(--fh);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.tile-val{font-family:var(--fh);font-weight:900;font-size:18px;line-height:1;margin-bottom:3px}
.tile-sub{font-family:var(--fh);font-size:11px;color:var(--muted);line-height:1.4}

/* STAT BAR */

/* CLASSEMENT */
.st-row{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border);font-family:var(--fh);font-size:13px}
.st-row:last-child{border-bottom:0}
.st-pos{font-weight:900;font-size:15px;width:22px}
.st-bar{width:3px;height:18px;border-radius:2px;flex-shrink:0}
.st-name{flex:1}
.st-pts{color:var(--gold);font-weight:700}

/* NEWS */
.news-row{padding:11px 14px;border-bottom:1px solid var(--border)}
.news-row:last-child{border-bottom:0}
.news-title{font-family:var(--fh);font-weight:700;font-size:14px;margin-bottom:3px}
.news-text{font-family:var(--fb);font-size:12px;color:var(--muted);line-height:1.5}

/* BANNER SAISON */
.season-banner{background:linear-gradient(135deg,#1a1a00,#0a1400);border:1px solid var(--gold);border-left:3px solid var(--gold);border-radius:8px;padding:14px 16px}

/* PANEL */

/* BTN */

.btn-gold{background:#161200;color:var(--gold);border:1px solid #3a3400}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:6px;padding:10px 18px;font-family:var(--fh);font-size:13px;z-index:500;transition:transform .3s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.error{border-left-color:var(--accent)}

::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
<link rel="stylesheet" href="css/immersive-theme.css">
</head>
<body>

<div class="topbar">
  <div class="logo">F1<span>Manager</span></div>
  <div class="top-pills">
    <div class="pill pill-muted" id="seasonBadge">—</div>
    <div class="pill pill-gold" id="budgetBadge">—</div>
  </div>
</div>

<div class="page" id="mainPage">

  <!-- SÉLECTION ÉQUIPE -->
  <div id="teamSelectScreen" style="display:none">
    <div class="select-screen">
      <div class="select-title">CHOISISSEZ VOTRE ÉQUIPE</div>
      <div class="select-sub">Budget, performances et ambitions — tout diffère</div>
      <div class="teams-grid" id="teamsGrid"></div>
      <button class="btn-confirm" id="btnConfirmTeam" onclick="confirmTeam()">✅ Confirmer l'équipe</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" style="display:none;flex-direction:column;gap:12px">

    <!-- BANNIÈRE NOUVELLE SAISON -->
    <div id="newSeasonBanner" style="display:none" class="season-banner">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div id="newSeasonTitle" style="font-family:var(--fh);font-weight:900;font-size:18px;color:var(--gold);letter-spacing:1px"></div>
        <button onclick="dismissNewSeasonBanner()" class="btn btn-sec" style="padding:3px 10px">✕</button>
      </div>
      <div id="newSeasonSummary" style="font-family:var(--fh);font-size:13px;color:var(--muted);line-height:1.8"></div>
      <div style="margin-top:10px;display:flex;gap:8px">
        <a href="weekend.html" class="btn btn-red">🏁 Weekend →</a>
        <a href="drivers.html" class="btn btn-gold">👤 Pilotes</a>
      </div>
    </div>

    <!-- HERO PROCHAINE COURSE -->
    <a href="weekend.html" class="race-hero" id="raceHero">
      <div class="rh-flag" id="raceFlag">🏁</div>
      <div class="rh-info">
        <div class="rh-label">Prochain Grand Prix</div>
        <div class="rh-name" id="nextRaceName">—</div>
        <div class="rh-detail" id="nextRaceDetail">—</div>
      </div>
      <div class="rh-cta">Weekend →</div>
    </a>

    <!-- PILOTES -->
    <div class="sec-lbl">Mes pilotes</div>
    <div class="panel" id="driversPanel"></div>

    <!-- NEWS -->
    <div class="sec-lbl">Dernières nouvelles</div>
    <div class="panel" id="newsPanel"></div>

    <!-- DÉCISIONS / STORY WORLD -->
    <div class="sec-lbl" id="storyDecisionLabel" style="display:none">Décisions du paddock</div>
    <div class="panel" id="storyDecisionPanel" style="display:none"></div>

    <!-- R&D -->
    <div class="sec-lbl">R&D</div>
    <div class="tiles-grid" id="carTiles"></div>

    <!-- CLASSEMENT -->
    <div class="sec-lbl">Classement constructeurs</div>
    <div class="panel" id="standingsPanel"></div>

    <!-- NAVIGATION -->
    <div class="sec-lbl">Navigation</div>
    <div class="tiles-grid" id="navTiles"></div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/data.js?v=20260508b"></script>
<script src="js/save.js?v=20260508b"></script>
<script src="js/immersion.js?v=20260508b"></script>
<script src="js/events.js?v=20260508b"></script>
<script src="js/career.js?v=20260508b"></script>
<script src="js/profiles.js?v=20260508b"></script>
<script>

const CIRCUIT_FLAGS={bahrain:'🇧🇭',jeddah:'🇸🇦',melbourne:'🇦🇺',imola:'🇮🇹',miami:'🇺🇸',monaco:'🇲🇨',canada:'🇨🇦',barcelona:'🇪🇸',austria:'🇦🇹',silverstone:'🇬🇧',hungary:'🇭🇺',spa:'🇧🇪',zandvoort:'🇳🇱',monza:'🇮🇹',baku:'🇦🇿',singapore:'🇸🇬',suzuka:'🇯🇵',qatar:'🇶🇦',cota:'🇺🇸',mexico:'🇲🇽',brazil:'🇧🇷',vegas:'🇺🇸',abudhabi:'🇦🇪'};

let save = null;

function init() {
  try {
    save = Save.load();
    if (save && window.Immersion) {
      Immersion.ensure(save);
      if (typeof Immersion.syncLatestGp === 'function') {
        Immersion.syncLatestGp(save);
      } else if (save.lastGpSummary && typeof Immersion.updateAfterGp === 'function') {
        Immersion.updateAfterGp(save, save.lastGpSummary);
      }
      Save.save(save);
    }
    if (!save || !save.playerTeamId) { showTeamSelection(); return; }
    restoreDriverStates(save);
    if (typeof Career !== 'undefined' && typeof Career.restoreTeamStates === 'function') Career.restoreTeamStates(save);
    migrateSave(save);
    showDashboard();
  } catch(err) {
    console.error('init error:', err);
    document.getElementById('mainPage').innerHTML =
      `<div style="padding:20px;font-family:var(--fh);color:var(--accent)">
        Erreur init : ${err.message}<br><br>
        <button onclick="localStorage.clear();location.reload()" style="background:var(--accent);color:#fff;border:none;padding:10px 20px;border-radius:4px;font-family:var(--fh);cursor:pointer">
          Réinitialiser la save
        </button>
      </div>`;
  }
}

function restoreDriverStates(sv) {
  if (sv.driverStates) F1Data.drivers.forEach(d=>{ const st=sv.driverStates[d.id]; if(st) Object.assign(d,st); });
  if (sv.generatedDrivers?.length) sv.generatedDrivers.forEach(gd=>{ if(!F1Data.drivers.find(d=>d.id===gd.id)) F1Data.drivers.push(gd); });
}

function migrateSave(sv) {
  sv.staff=sv.staff||[]; sv.carDev=sv.carDev||{}; sv.contracts=sv.contracts||{}; sv.sponsors=sv.sponsors||[]; sv.completedSeasons=sv.completedSeasons||[];
  if(!sv.carDev.reliability) sv.carDev.reliability={level:F1Data.teams.find(t=>t.id===sv.playerTeamId)?.reliability||75,upgrades:0};
  // Initialiser le budget R&D si absent
  if(!sv.rdBudget) {
    const t=F1Data.teams.find(t=>t.id===sv.playerTeamId);
    sv.rdBudget=Math.round((t?.budget||200)*(F1Data.rdBudgetRatio||0.4));
    sv.rdBudgetTotal=sv.rdBudget;
  }
  Save.save(sv);
}

// ── SÉLECTION ÉQUIPE ──────────────────────────────────────
function showTeamSelection() {
  document.getElementById('teamSelectScreen').style.display='block';
  document.getElementById('dashboard').style.display='none';
  const grid=document.getElementById('teamsGrid');
  grid.innerHTML='';
  F1Data.teams.forEach(team=>{
    const card=document.createElement('div');
    card.className='team-card';
    card.innerHTML=`<div class="tc-name" style="color:${team.color}">${team.shortName}</div><div style="font-family:var(--fh);font-size:11px;color:var(--muted)">${team.name}</div><div class="tc-perf">Perf. ${team.performance}</div><div class="tc-budget">${team.budget}M€</div>`;
    card.onclick=()=>selectTeam(team.id,card);
    grid.appendChild(card);
  });
}

let selectedTeamId=null;
function selectTeam(teamId,el) {
  document.querySelectorAll('.team-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  selectedTeamId=teamId;
  document.getElementById('btnConfirmTeam').style.display='block';
}

function confirmTeam() {
  if (!selectedTeamId) return;
  const team=F1Data.teams.find(t=>t.id===selectedTeamId);
  const newSave = typeof Save.newGame === 'function' ? Save.newGame() : Save.defaultSave();
  newSave.playerTeamId=selectedTeamId; newSave.budget=team.budget; newSave.season=2025; newSave.race=0;
  newSave.carDev={aero:{level:team.aero,upgrades:0},chassis:{level:team.chassis,upgrades:0},engine:{level:team.engine,upgrades:0},reliability:{level:team.reliability,upgrades:0},pitstop:{level:50,upgrades:0}};
  // Réputation initiale basée sur la performance de l'équipe
  const baseRep = Math.round(team.performance * 0.55);
  newSave.reputation = { 
    sport:   Math.max(40, baseRep), 
    media:   Math.max(35, baseRep-5), 
    tech:    Math.max(35, baseRep-3), 
    finance: Math.max(35, baseRep-5) 
  };
  Save.save(newSave); save=newSave;
  restoreDriverStates(newSave); migrateSave(newSave);
  showDashboard(); showToast(`✅ ${team.name} sélectionné !`);
}

// ── DASHBOARD ─────────────────────────────────────────────
function showDashboard() {
  document.getElementById('teamSelectScreen').style.display='none';
  const dash = document.getElementById('dashboard');
  dash.style.display='flex';
  dash.style.flexDirection='column';

  const team=F1Data.teams.find(t=>t.id===save.playerTeamId);
  const totalRaces = F1Data.circuits.length || 23;
  const seasonFinished = (save.race || 0) >= totalRaces;
  const circuit=seasonFinished ? null : F1Data.circuits[(save.race||0)%totalRaces];
  const drivers=F1Data.drivers.filter(d=>d.teamId===save.playerTeamId&&!d.retired);

  document.getElementById('seasonBadge').textContent=`Saison ${save.season||2025}`;
  document.getElementById('budgetBadge').textContent=`💰 ${Math.round((save.budget||0)*10)/10}M €`;

  const raceHero = document.getElementById('raceHero');
  if (seasonFinished) {
    document.getElementById('raceFlag').textContent='🏆';
    document.getElementById('nextRaceName').textContent='Fin de saison';
    document.getElementById('nextRaceDetail').textContent=`Saison ${save.season||2025} terminée · Revue annuelle disponible`;
    raceHero.setAttribute('href', 'javascript:void(0)');
    raceHero.onclick = (ev) => { ev.preventDefault(); launchEndOfSeason(); };
    const cta = raceHero.querySelector('.rh-cta');
    if (cta) cta.textContent = 'Clôturer →';
  } else {
    document.getElementById('raceFlag').textContent=CIRCUIT_FLAGS[circuit?.id]||'🏁';
    document.getElementById('nextRaceName').textContent=circuit?.fullName||circuit?.name||'—';
    document.getElementById('nextRaceDetail').textContent=`Course ${(save.race||0)+1}/${totalRaces} · ${circuit?.laps} tours · ${circuit?.lapDistance}km`;
    raceHero.setAttribute('href','weekend.html');
    raceHero.onclick = null;
    const cta = raceHero.querySelector('.rh-cta');
    if (cta) cta.textContent = 'Weekend →';
  }

  if (save._newSeasonBanner&&!save._bannerDismissed) {
    document.getElementById('newSeasonBanner').style.display='block';
    document.getElementById('newSeasonTitle').textContent=`🏆 Nouvelle saison ${save.season} !`;
    document.getElementById('newSeasonSummary').textContent=save._newSeasonBanner;
  }

  renderDrivers(drivers,team);
  renderCarTiles(team);
  renderNavTiles(team,drivers);
  renderStoryDecisions();
  renderStandings();
  renderNews();
}


function launchEndOfSeason() {
  if (!save || !save.playerTeamId) return;
  const totalRaces = F1Data.circuits.length || 23;
  if ((save.race || 0) < totalRaces) {
    location.href = 'weekend.html';
    return;
  }
  if (typeof Career === 'undefined' || typeof Career.endOfSeason !== 'function') {
    showToast('Fin de saison indisponible : module Career non chargé.', true);
    return;
  }
  const ok = confirm(`Clôturer la saison ${save.season || 2025} ?

Cela applique les primes, la R&D intersaison, les retraites, les transferts et la revue de l'académie.`);
  if (!ok) return;
  try {
    const report = Career.endOfSeason(save) || {};
    save = Save.load() || save;
    const academyTxt = report.academy?.released
      ? ` Académie : ${report.academy.released.firstName} ${report.academy.released.name} libéré, ${report.academy.newJunior?.firstName || 'un nouveau talent'} rejoint le centre.`
      : '';
    save._newSeasonBanner = `Prime de fin de saison appliquée. ${report.retired?.length || 0} retraite(s), ${report.newTalents?.length || 0} nouveau(x) talent(s).${academyTxt}`;
    save._bannerDismissed = false;
    Save.save(save);
    restoreDriverStates(save);
    if (typeof Career.restoreTeamStates === 'function') Career.restoreTeamStates(save);
    migrateSave(save);
    showDashboard();
    showToast(`🏆 Saison ${save.season} lancée !`);
  } catch (err) {
    console.error('end season error:', err);
    showToast('Erreur fin de saison : ' + err.message, true);
  }
}

function renderDrivers(drivers,team) {
  const panel=document.getElementById('driversPanel');
  if (!drivers.length){panel.innerHTML='<div style="padding:14px;color:var(--muted);font-family:var(--fh)">Aucun pilote</div>';return;}
  panel.innerHTML=drivers.map(d=>{
    const trait=F1Data.traits?.[d.trait]||{};
    return `<a href="profile.html?type=driver&id=${d.id}" class="driver-row"><div class="dr-num" style="color:${team?.color||'#fff'}">${d.number}</div><div class="dr-info"><div class="dr-name">${d.firstName} ${d.name}</div><div class="dr-trait">${d.age||'?'} ans · ${trait.label||d.trait||'—'} ${trait.icon||''}</div></div><div style="text-align:right"><div class="dr-pace" style="color:${team?.color||'#fff'}">${d.pace}</div><div style="font-family:var(--fh);font-size:9px;color:var(--muted)">PACE</div></div></a>`;
  }).join('');
}

function renderCarTiles(team) {
  const carDev=save.carDev||{};
  const sb=save.staffBonuses||{};
  const stats=[
    {key:'aero',label:'Aéro',icon:'🌊',color:'var(--blue)'},
    {key:'chassis',label:'Châssis',icon:'🏗️',color:'var(--accent)'},
    {key:'engine',label:'Moteur',icon:'⚡',color:'var(--orange)'},
    {key:'reliability',label:'Fiabilité',icon:'🛡️',color:'var(--green)'},
  ];
  document.getElementById('carTiles').innerHTML=stats.map(s=>{
    const base   = team?.[s.key]||70;
    const devLvl = carDev[s.key]?.level || base;
    const staffB = sb[s.key]||0;
    // Même calcul que rd.html : dev.level + bonus staff direct
    const val    = Math.min(100, devLvl + staffB);
    return `<div class="tile"><div class="tile-icon">${s.icon}</div><div class="tile-lbl">${s.label}</div><div class="tile-val" style="color:${s.color}">${devLvl}${staffB>0?`<span style="font-size:13px;color:var(--green)"> +${staffB}</span>`:''}</div><div class="sbar"><div class="sbar-fill" style="width:${val}%;background:${s.color}"></div></div></div>`;
  }).join('');
}

function renderNavTiles(team,drivers) {
  const ts=save.teamStandings||{};
  const sorted=Object.entries(ts).sort((a,b)=>b[1]-a[1]);
  const pos=sorted.findIndex(([id])=>id===save.playerTeamId);
  const myPts=ts[save.playerTeamId]||0;
  const staffCount=(save.staff||[]).length;

  const tiles=[
    {href:'standings.html',icon:'🏆',lbl:'Championnat',val:pos>=0?`P${pos+1}`:'—',sub:`${myPts} pts constructeurs`,c:'var(--gold)'},
    {href:'drivers.html',icon:'👤',lbl:'Pilotes',val:`${drivers.length}`,sub:drivers.map(d=>d.name).join(' · '),c:'var(--blue)'},
    {href:'staff.html',icon:'🧑‍🔧',lbl:'Staff',val:`${staffCount}/4`,sub:staffCount>0?`${staffCount} expert${staffCount>1?'s':''} en poste`:'Aucun staff recruté',c:'var(--purple)'},
    {href:'board.html',icon:'🏢',lbl:'Direction',val:`${save.boardPressure||0}%`,sub:'Pression du board',c:'var(--orange)'},
    {href:'sponsors.html',icon:'🤝',lbl:'Sponsors',val:`${(save.sponsors||[]).length}/7`,sub:`${(save.sponsors||[]).reduce((s,sp)=>s+(sp.value||0),0)}M€/an`,c:'var(--green)'},
    {href:'news.html',icon:'📰',lbl:'Actualités',val:`${(save.news||[]).length}`,sub:'événements récents',c:'var(--orange)'},
    {href:'immersion.html#overview',icon:'🎙️',lbl:'Paddock',val:`${save.immersion?.teamReputation?.value || save.reputation || 50}`,sub:'réputation · moral',c:'var(--purple)'},
    {href:'immersion.html#history',icon:'📚',lbl:'Historique',val:`${save.immersion?.gpHistory?.length || 0}`,sub:'GP archivés',c:'var(--gold)'},
    {href:'immersion.html#records',icon:'🏛️',lbl:'Records',val:`${Object.keys(save.immersion?.records?.wins||{}).length}`,sub:'carrière',c:'var(--green)'},
    {href:'immersion.html#academy',icon:'🌱',lbl:'Académie',val:`${save.immersion?.juniorAcademy?.length || 0}`,sub:'jeunes talents',c:'var(--blue)'},
    {href:'rd.html',icon:'🔬',lbl:'R&D',val:`${save.tokens||0} tokens`,sub:`Budget : ${Math.round((save.budget||0)*10)/10}M€`,c:'var(--blue)'},
    {href:`profile.html?type=team&id=${save.playerTeamId}`,icon:'🔍',lbl:'Fiche équipe',val:team?.shortName||'—',sub:`Budget ${Math.round((save.budget||0)*10)/10}M€`,c:'var(--muted)'},
  ];

  document.getElementById('navTiles').innerHTML=tiles.map(t=>`<a href="${t.href}" class="tile" style="border-left:2px solid ${t.c}"><span class="tile-icon">${t.icon}</span><div class="tile-lbl">${t.lbl}</div><div class="tile-val" style="color:${t.c}">${t.val}</div><div class="tile-sub">${t.sub}</div></a>`).join('');
}


function escHtml(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function renderStoryDecisions(){
  const label=document.getElementById('storyDecisionLabel');
  const panel=document.getElementById('storyDecisionPanel');
  if(!label||!panel) return;
  const seen=new Set();
  const pending=(save.notifications||[]).filter(n=>!n.resolved).filter(n=>{
    const key=(n.title||'')+'|'+(n.text||'');
    if(seen.has(key)) return false;
    seen.add(key);
    return true;
  }).slice(0,2);
  if(!pending.length){label.style.display='none';panel.style.display='none';panel.innerHTML='';return;}
  label.style.display='block'; panel.style.display='block';
  panel.innerHTML=pending.map(n=>`
    <div style="padding:12px;border-bottom:1px solid var(--border)">
      <div style="display:flex;gap:10px;align-items:flex-start">
        <div style="font-size:24px;width:32px;text-align:center">${n.icon||'📌'}</div>
        <div style="flex:1;min-width:0">
          <div style="font-family:var(--fh);font-weight:900;font-size:16px;letter-spacing:.5px">${escHtml(n.title)}</div>
          <div style="font-size:12px;color:var(--muted);line-height:1.45;margin-top:3px">${escHtml(n.text)}</div>
          <div style="display:flex;flex-direction:column;gap:6px;margin-top:10px">
            ${(n.choices||[]).map(c=>`
              <button class="btn btn-gold" style="width:100%;justify-content:flex-start;text-align:left;white-space:normal;line-height:1.2" onclick="resolveStoryDecision('${n.id}','${c.id}')">
                <span>${escHtml(c.label)}</span>
                ${c.preview?`<small style="display:block;color:var(--muted);font-weight:500;margin-top:2px">${escHtml(c.preview)}</small>`:''}
              </button>
            `).join('')}
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function resolveStoryDecision(id,choiceId){
  if(typeof CareerEvents==='undefined') return;
  const res=CareerEvents.resolveNotification(save,id,choiceId);
  save=Save.load()||save;
  showDashboard();
  showToast(res.msg || (res.ok?'Décision appliquée':'Erreur'), !res.ok);
}

function renderStandings() {
  const panel=document.getElementById('standingsPanel');
  const ts=save.teamStandings||{};
  const sorted=F1Data.teams.filter(t=>ts[t.id]>=0).sort((a,b)=>(ts[b.id]||0)-(ts[a.id]||0)).slice(0,6);
  if (!sorted.length){panel.innerHTML='<div style="padding:12px;color:var(--muted);font-family:var(--fh);font-size:12px">Aucune course disputée</div>';return;}
  panel.innerHTML=sorted.map((t,stIdx)=>{
    const pts=ts[t.id]||0;
    const isMe=t.id===save.playerTeamId;
    const pc=stIdx===0?'var(--gold)':stIdx===1?'#c0c0c0':stIdx===2?'#cd7f32':'var(--muted)';
    return `<div class="st-row" style="${isMe?'background:var(--surface2)':''}"><div class="st-pos" style="color:${pc}">${stIdx+1}</div><div class="st-bar" style="background:${t.color}"></div><div class="st-name" style="${isMe?'color:var(--gold);font-weight:700':''}">${t.shortName}${isMe?' ★':''}</div><div class="st-pts">${pts} pts</div></div>`;
  }).join('');
}

function renderNews() {
  const panel=document.getElementById('newsPanel');
  const news=(save.news||[]).slice(-3).reverse();
  if (!news.length){panel.innerHTML='<div style="padding:12px;color:var(--muted);font-family:var(--fh);font-size:12px">Aucune actualité récente</div>';return;}
  panel.innerHTML=news.map(n=>`<div class="news-row"><div class="news-title">${n.icon||'📰'} ${n.title}</div><div class="news-text">${n.text}</div></div>`).join('');
}

function dismissNewSeasonBanner() {
  document.getElementById('newSeasonBanner').style.display='none';
  save._bannerDismissed=true; Save.save(save);
}

function showToast(msg,isError=false) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast${isError?' error':''}`;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000);
}

init();
</script>
</body>
</html>
