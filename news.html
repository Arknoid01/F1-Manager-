<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>F1 Manager — News</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;--border:#2a2a3e;--text:#e8e8f0;--muted:#6a6a8a;--accent:#e8003d;--gold:#ffd700;--green:#00e676;--orange:#ff9944;--fh:'Barlow Condensed',sans-serif;--fb:'Barlow',sans-serif}
    html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--fb);font-size:14px}

    .topbar{background:var(--surface);border-bottom:2px solid var(--accent);padding:0 14px;height:50px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
    .logo{font-family:var(--fh);font-weight:900;font-size:20px;color:var(--accent);letter-spacing:2px}
    .logo span{color:var(--text)}
    .nav-link{font-family:var(--fh);font-size:13px;font-weight:700;color:var(--muted);text-decoration:none;letter-spacing:1px;text-transform:uppercase;padding:4px 8px}
    .nav-link:hover,.nav-link.active{color:var(--accent)}
    .tb-right{margin-left:auto;display:flex;align-items:center;gap:10px}
    .badge-pill{font-family:var(--fh);font-weight:700;font-size:13px;padding:4px 12px;border-radius:4px;background:var(--surface2);border:1px solid var(--border)}

    .page{padding:14px;display:flex;flex-direction:column;gap:12px;max-width:800px;margin:0 auto}

    .panel{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden}
    .ph{background:var(--surface2);border-bottom:1px solid var(--border);padding:8px 14px;font-family:var(--fh);font-weight:700;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:8px}
    .ph .dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
    .ph .ml{margin-left:auto;font-size:11px}

    /* FILTRES */
    .filters{display:flex;gap:6px;flex-wrap:wrap;padding:10px 12px;background:var(--surface2);border-bottom:1px solid var(--border)}
    .filter-btn{font-family:var(--fh);font-weight:700;font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border:1px solid var(--border);border-radius:3px;background:none;color:var(--muted);cursor:pointer;transition:all .15s}
    .filter-btn:hover{color:var(--text);border-color:var(--text)}
    .filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

    /* NEWS ITEMS */
    .news-list{padding:10px;display:flex;flex-direction:column;gap:8px}
    .news-item{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:12px;display:flex;gap:12px;transition:border-color .2s;cursor:default}
    .news-item:hover{border-color:#3a3a5a}
    .news-item.breaking{border-left:3px solid var(--accent)}
    .news-item.positive{border-left:3px solid var(--green)}
    .news-item.negative{border-left:3px solid #ff4444}
    .news-item.neutral{border-left:3px solid var(--muted)}
    .news-icon{font-size:24px;width:36px;text-align:center;flex-shrink:0;padding-top:2px}
    .news-content{flex:1}
    .news-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px}
    .news-title{font-family:var(--fh);font-weight:700;font-size:15px;line-height:1.2}
    .news-meta{font-family:var(--fh);font-size:10px;color:var(--muted);white-space:nowrap;padding-top:2px}
    .news-text{font-size:12px;color:var(--muted);line-height:1.5}
    .news-category{display:inline-block;font-family:var(--fh);font-size:9px;font-weight:700;padding:1px 6px;border-radius:3px;margin-top:5px;letter-spacing:1px;text-transform:uppercase}

    /* CATÉGORIE COULEURS */
    .cat-race_result{background:#1a1a00;color:var(--gold);border:1px solid #3a3a00}
    .cat-pre{background:#001a2a;color:#4488ff;border:1px solid #003a5a}
    .cat-post{background:#001a0a;color:var(--green);border:1px solid #003a18}
    .cat-technical{background:#1a0a00;color:var(--orange);border:1px solid #3a1a00}
    .cat-financial{background:#001a00;color:#00cc44;border:1px solid #003a00}
    .cat-mercato{background:#1a001a;color:#cc44ff;border:1px solid #3a003a}
    .cat-medical{background:#1a0000;color:#ff6666;border:1px solid #3a0000}
    .cat-board{background:#0a0a1a;color:#8888ff;border:1px solid #1a1a3a}
    .cat-media{background:#0a1a1a;color:#44cccc;border:1px solid #1a3a3a}
    .cat-competitor{background:#1a0a1a;color:#ff44ff;border:1px solid #3a1a3a}
    .cat-transfer{background:#1a1a00;color:var(--gold);border:1px solid #3a3a00}
    .cat-general,.cat-internal{background:var(--surface);color:var(--muted);border:1px solid var(--border)}

    /* STATS RAPIDES */
    .quick-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px}
    .qs{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:10px;text-align:center}
    .qs-val{font-family:var(--fh);font-weight:900;font-size:22px;color:var(--gold)}
    .qs-lbl{font-family:var(--fh);font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px}

    .empty{padding:28px;text-align:center;color:var(--muted);font-family:var(--fh);font-size:16px}

    ::-webkit-scrollbar{width:3px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  .entity-link{color:inherit;text-decoration:none;border-bottom:1px dotted currentColor}.entity-link:hover{color:var(--gold,#ffd700)}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">F1<span>Manager</span></div>
  <a href="index.html"     class="nav-link">🏠 Équipe</a>
  <a href="race.html"      class="nav-link">🏁 Course</a>
  <a href="standings.html" class="nav-link">🏆 Champ.</a>
  <a href="drivers.html"   class="nav-link">👤 Pilotes</a>
  <a href="board.html"     class="nav-link">🏢 Direction</a>
  <a href="news.html"      class="nav-link active">📰 News</a>
  <div class="tb-right">
    <div class="badge-pill" id="seasonBadge">Saison —</div>
  </div>
</div>

<div class="page">

  <!-- STATS RAPIDES -->
  <div class="panel">
    <div class="ph"><div class="dot"></div>📊 Résumé de carrière</div>
    <div class="quick-stats" id="quickStats"></div>
  </div>

  <!-- NEWS FEED -->
  <div class="panel">
    <div class="ph">
      <div class="dot"></div>📰 Fil d'actualités
      <span class="ml" id="newsCount"></span>
    </div>
    <div class="filters" id="filtersBar"></div>
    <div class="news-list" id="newsList"></div>
  </div>

</div>

<script src="js/data.js"></script>
<script src="js/save.js"></script>
<script src="js/events.js"></script>
<script src="js/career.js"></script>
<script src="js/profiles.js"></script>
<script>

let save       = null;
let activeFilter = 'all';

const CATEGORIES = {
  all:          { label:'Tout',         icon:'📋' },
  race_result:  { label:'Résultats',    icon:'🏁' },
  pre:          { label:'Avant GP',     icon:'🔮' },
  post:         { label:'Après GP',     icon:'📊' },
  technical:    { label:'Technique',    icon:'🔧' },
  financial:    { label:'Finance',      icon:'💰' },
  mercato:      { label:'Mercato',      icon:'🔄' },
  transfer:     { label:'Transferts',   icon:'✅' },
  medical:      { label:'Médical',      icon:'🏥' },
  board:        { label:'Direction',    icon:'🏢' },
  media:        { label:'Médias',       icon:'🎤' },
  competitor:   { label:'Concurrents',  icon:'⚡' },
};

function getNewsStyle(item) {
  const cat = item.category || item.phase || 'general';
  if (cat === 'race_result') return item.icon?.includes('🏆') ? 'positive breaking' : 'neutral';
  if (['financial','media','post'].includes(cat)) return 'positive';
  if (['medical','board'].includes(cat) && item.text?.includes('problème')) return 'negative';
  if (cat === 'technical' && item.text?.includes('fuite')) return 'negative';
  return 'neutral';
}

function formatDate(iso, season, race) {
  if (season && race !== undefined) return `S${season} · GP ${race+1}`;
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('fr-FR', { day:'2-digit', month:'short' });
}

function init() {
  save = Save.load();
  if (!save) {
    document.querySelector('.page').innerHTML = `<div style="padding:40px;text-align:center;color:var(--muted);font-family:var(--fh)"><div style="font-size:24px;margin-bottom:12px">Aucune carrière trouvée</div><a href="index.html" style="background:var(--accent);color:#fff;padding:8px 20px;border-radius:4px;text-decoration:none;font-family:var(--fh);font-weight:700">Créer</a></div>`;
    return;
  }
  CareerEvents.ensure(save);
  document.getElementById('seasonBadge').textContent = `Saison ${save.season||2025}`;
  renderQuickStats();
  renderFilters();
  renderNews();
}

function renderQuickStats() {
  const news   = save.news || [];
  const wins   = news.filter(n=>n.icon==='🏆').length;
  const podiums= news.filter(n=>['🏆','🥈'].includes(n.icon)).length;
  const total  = (save.raceResults||[]).length;
  const pts    = Object.values(save.driverStandings||{}).reduce((s,p)=>s+p,0);

  document.getElementById('quickStats').innerHTML = `
    <div class="qs"><div class="qs-val">${wins}</div><div class="qs-lbl">Victoires</div></div>
    <div class="qs"><div class="qs-val">${podiums}</div><div class="qs-lbl">Podiums</div></div>
    <div class="qs"><div class="qs-val">${pts}</div><div class="qs-lbl">Points saison</div></div>
  `;
}

function renderFilters() {
  const news  = save.news || [];
  const cats  = new Set(['all', ...news.map(n=>n.category||n.phase||'general').filter(Boolean)]);
  const bar   = document.getElementById('filtersBar');

  bar.innerHTML = [...cats].map(cat => {
    const def = CATEGORIES[cat] || { label: cat, icon:'📌' };
    return `<button class="filter-btn${cat===activeFilter?' active':''}" onclick="setFilter('${cat}')">${def.icon} ${def.label}</button>`;
  }).join('');
}

function setFilter(cat) {
  activeFilter = cat;
  renderFilters();
  renderNews();
}

function renderNews() {
  const news = (save.news||[]).filter(n => {
    if (activeFilter === 'all') return true;
    return (n.category||n.phase||'general') === activeFilter;
  });

  document.getElementById('newsCount').textContent = `${news.length} article${news.length!==1?'s':''}`;

  const list = document.getElementById('newsList');

  if (!news.length) {
    list.innerHTML = `<div class="empty">Aucune actualité pour ce filtre.<br>Joue des courses pour remplir le fil !</div>`;
    return;
  }

  list.innerHTML = news.map(item => {
    const style = getNewsStyle(item);
    const cat   = item.category || item.phase || 'general';
    const catDef= CATEGORIES[cat] || { label:cat, icon:'📌' };
    const icon  = item.icon || catDef.icon || '📰';
    const meta  = formatDate(item.date, item.season, item.race);

    return `
      <div class="news-item ${style}">
        <div class="news-icon">${icon}</div>
        <div class="news-content">
          <div class="news-header">
            <div class="news-title">${item.title||'—'}</div>
            <div class="news-meta">${meta}</div>
          </div>
          <div class="news-text">${item.text||''}</div>
          <span class="news-category cat-${cat}">${catDef.icon} ${catDef.label}</span>
        </div>
      </div>
    `;
  }).join('');
}

init();
</script>
</body>
</html>
