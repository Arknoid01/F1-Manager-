<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiche — F1 Manager</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070d;--surface:#0f0f18;--surface2:#161622;--border:#22223a;
  --text:#e4e4f0;--muted:#55556a;--accent:#e8003d;--gold:#f5c842;
  --green:#00d97e;--blue:#3d7eff;--orange:#ff8c42;--purple:#a855f7;
  --fh:'Barlow Condensed',sans-serif;--fb:'Barlow',sans-serif;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--fb);font-size:14px}
.topbar{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;position:sticky;top:0;z-index:100}
.logo{font-family:var(--fh);font-weight:900;font-size:22px;letter-spacing:3px;color:var(--accent)}
.logo span{color:var(--text)}
.top-pills{margin-left:auto;display:flex;gap:8px;align-items:center}
.pill{font-family:var(--fh);font-weight:700;font-size:13px;padding:4px 12px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);white-space:nowrap}
.pill-gold{color:var(--gold);border-color:#3a3400;background:#161200}
.pill-muted{color:var(--muted)}
.page{padding:12px;display:flex;flex-direction:column;gap:12px;max-width:800px;margin:0 auto}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.ph{background:var(--surface2);border-bottom:1px solid var(--border);padding:8px 14px;font-family:var(--fh);font-weight:700;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:8px}
.ph .dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
.ph .ml{margin-left:auto;font-weight:400;letter-spacing:0;font-size:11px}
.sec-lbl{font-family:var(--fh);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);padding-bottom:6px;border-bottom:1px solid var(--border)}
.btn{font-family:var(--fh);font-weight:700;font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:6px 14px;border:none;border-radius:4px;cursor:pointer;text-decoration:none;display:inline-block;transition:all .15s}
.btn-red{background:var(--accent);color:#fff}.btn-red:hover{background:#ff1a52}.btn-red:disabled{background:#3a1a22;color:#664;cursor:not-allowed}
.btn-gold{background:#161200;color:var(--gold);border:1px solid #3a3400}.btn-gold:hover{background:#2a2400}
.btn-sec{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.btn-sec:hover{border-color:var(--accent);color:var(--accent)}
.btn-green{background:#001a0a;color:var(--green);border:1px solid #003a18}
.sbar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.sbar-fill{height:100%;border-radius:2px;transition:width .5s}
.tile{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:13px;text-decoration:none;color:inherit;display:block;transition:background .1s}
.tile:active{background:var(--surface2)}
.tile-icon{font-size:20px;margin-bottom:6px;display:block}
.tile-lbl{font-family:var(--fh);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.tile-val{font-family:var(--fh);font-weight:900;font-size:20px;line-height:1;margin-bottom:3px}
.tile-sub{font-family:var(--fh);font-size:11px;color:var(--muted);line-height:1.4}
.tiles-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:6px;padding:10px 18px;font-family:var(--fh);font-size:13px;z-index:500;transition:transform .3s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.error{border-left-color:var(--accent)}
select{background:var(--surface);color:var(--text);border:1px solid var(--border);padding:5px 8px;border-radius:4px;font-family:var(--fh);font-size:12px;outline:none}
input[type=number],input[type=text]{background:var(--surface);color:var(--text);border:1px solid var(--border);padding:5px 8px;border-radius:4px;font-family:var(--fh);font-size:12px;outline:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
/* === Page profile === */

</style>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;0,900;1,700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="topbar">
  <div class="logo">F1<span>Manager</span></div>
  <a href="index.html" style="font-family:var(--fh);font-size:12px;color:var(--muted);text-decoration:none;padding:4px 8px;border:1px solid var(--border);border-radius:4px">← Accueil</a>
  <div class="top-pills">
    <div class="pill pill-muted" id="seasonBadge">—</div>
    <div class="pill pill-gold" id="budgetBadge">—</div>
  </div>
</div>
</div>
<div class="page">
  <a href="javascript:history.back()" class="back">← Retour</a>
  <div id="profile"></div>
</div>
<script src="js/data.js"></script>
<script src="js/save.js"></script>
<script src="js/events.js"></script>
<script src="js/career.js"></script>
<script src="js/profiles.js"></script>
<script>
const params = new URLSearchParams(location.search);
const type = params.get('type');
const id = params.get('id');
const save = Profiles.loadSave() || {};
const entity = Profiles.getEntity(type, id, save);
const root = document.getElementById('profile');
const esc = Profiles.escapeHtml;
function fmt(v, fallback='—'){ return v === undefined || v === null || v === '' ? fallback : esc(v); }
function full(d){ return Profiles.fullName(d); }
function driverScore(d){ return typeof Career !== 'undefined' && Career.getDriverScore ? Career.getDriverScore(d) : Math.round(((d.pace||0)+(d.consistency||0)+(d.wetSkill||0)+(d.overtaking||0)+(d.defending||0))/5); }
function line(label, value){ return `<div class="line"><div class="label">${label}</div><div class="value">${value}</div></div>`; }
function stats(items){ return `<div class="stats">${items.map(s=>`<div class="stat"><b style="color:${s.color||'var(--text)'}">${s.value}</b><span>${s.label}</span></div>`).join('')}</div>`; }
function hero(icon, title, subtitle, score, accent){ return `<div class="hero"><div class="hero-top" style="background:${accent||'var(--accent)'}"></div><div class="hero-body"><div class="avatar">${icon}</div><div><div class="title">${esc(title)}</div><div class="subtitle">${subtitle}</div></div>${score?`<div class="score">${score}<small>Note</small></div>`:''}</div></div>`; }
if (!entity) {
  root.innerHTML = `<div class="panel"><div class="empty">Fiche introuvable pour <strong>${esc(type||'?')}</strong> / <strong>${esc(id||'?')}</strong>.</div></div>`;
} else if (type === 'driver' || type === 'pilote') {
  const d = entity, team = d.teamId ? F1Data.teams.find(t=>String(t.id)===String(d.teamId)) : null;
  root.innerHTML = hero('🏎️', full(d), `${team ? Profiles.linkTeam(team) : 'Agent libre'} · N° ${fmt(d.number)} · ${fmt(d.age)} ans`, driverScore(d), team?.color)
    + `<div class="grid"><div class="panel"><div class="ph"><div class="dot"></div>Stats pilote</div><div class="content">${stats([
      {label:'Pace',value:fmt(d.pace),color:'#ffd700'},{label:'Régularité',value:fmt(d.consistency),color:'#00e676'},{label:'Pluie',value:fmt(d.wetSkill),color:'#2979ff'},{label:'Attaque',value:fmt(d.overtaking),color:'#ff9944'},{label:'Défense',value:fmt(d.defending),color:'#e10600'},{label:'Potentiel',value:fmt(d.potential),color:'#aa44ff'}
    ])}</div></div><div class="panel"><div class="ph"><div class="dot"></div>Contrat</div><div class="content">${line('Écurie', team?Profiles.linkTeam(team):'Agent libre')}${line('Salaire', `${fmt(d.salary)}M€/an`)}${line('Contrat', `${fmt(save.contracts?.[d.id]?.years, 0)} an(s)`)}${line('Trait', fmt(d.trait))}${line('Statut', d.retired?'Retraité':'Actif')}</div></div></div>`;
} else if (type === 'team' || type === 'ecurie' || type === 'écurie') {
  const t = entity;
  const drivers = F1Data.drivers.filter(d=>String(d.teamId)===String(t.id) && !d.retired);
  root.innerHTML = hero('🏢', t.name, `${fmt(t.shortName)} · Budget ${fmt(t.budget)}M€`, fmt(t.performance), t.color)
    + `<div class="grid"><div class="panel"><div class="ph"><div class="dot"></div>Performance voiture</div><div class="content">${stats([
      {label:'Perf.',value:fmt(t.performance),color:t.color},{label:'Aéro',value:fmt(t.aero),color:'#2979ff'},{label:'Châssis',value:fmt(t.chassis),color:'#e10600'},{label:'Moteur',value:fmt(t.engine),color:'#ff9944'},{label:'Fiabilité',value:fmt(t.reliability),color:'#00e676'},{label:'Budget',value:fmt(t.budget)+'M',color:'#ffd700'}
    ])}</div></div><div class="panel"><div class="ph"><div class="dot"></div>Pilotes</div><div class="content">${drivers.length?drivers.map(d=>line(Profiles.linkDriver(d), `N° ${fmt(d.number)} · ${driverScore(d)}`)).join(''):'<div class="desc">Aucun pilote actif.</div>'}</div></div></div>`;
} else if (type === 'staff') {
  const st = entity;
  const displayName = st.firstName ? `${st.firstName} ${st.name}` : (st.fullName || st.name);
  const impacts = st.impacts || {};
  root.innerHTML = hero(st.icon||'🧑‍🔧', displayName, `${fmt(st.role)} · ${fmt(st.age,'âge inconnu')}${st.age?' ans':''}`, fmt(Math.round(st.level||0)), '#ffd700')
    + `<div class="grid"><div class="panel"><div class="ph"><div class="dot"></div>Compétences</div><div class="content">${stats(Object.entries(impacts).map(([k,v])=>({label:k,value:'+'+v,color:'#ffd700'})))}<div class="desc" style="margin-top:12px">${fmt(st.desc,'Membre de staff qualifié.')}</div></div></div><div class="panel"><div class="ph"><div class="dot"></div>Contrat & passif</div><div class="content">${line('Spécialité', fmt(st.specialty || st.bonus))}${line('Salaire', `${fmt(st.salary)}M€/an`)}${line('Coût recrutement', `${fmt(st.cost)}M€`)}${line('Statut', save.staff?.map(Profiles.normalizeStaffId).includes(Profiles.normalizeStaffId(st.id))?'En poste':'Disponible')}<div class="badge">🔮 ${fmt(st.passive,'Bonus de performance')}</div></div></div></div>`;
}
</script>
</body>
</html>
