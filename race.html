<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F1 Manager — Course</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── RESET & BASE ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #12121a;
      --surface2:  #1a1a26;
      --border:    #2a2a3e;
      --text:      #e8e8f0;
      --muted:     #6a6a8a;
      --accent:    #e8003d;
      --gold:      #ffd700;
      --green:     #00e676;
      --yellow:    #ffea00;
      --blue:      #2979ff;
      --font-head: 'Barlow Condensed', sans-serif;
      --font-body: 'Barlow', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      overflow-x: hidden;
    }

    /* ── TOPBAR ── */
    .topbar {
      background: var(--surface);
      border-bottom: 2px solid var(--accent);
      padding: 0 16px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-logo {
      font-family: var(--font-head);
      font-weight: 900;
      font-size: 22px;
      color: var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .topbar-logo span { color: var(--text); }

    .topbar-circuit {
      font-family: var(--font-head);
      font-size: 16px;
      font-weight: 700;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-left: auto;
    }

    .topbar-lap {
      font-family: var(--font-head);
      font-size: 15px;
      font-weight: 600;
      color: var(--muted);
    }

    .topbar-lap span {
      color: var(--text);
      font-size: 18px;
    }

    /* ── LAYOUT ── */
    .layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      grid-template-rows: auto 1fr;
      gap: 12px;
      padding: 12px;
      min-height: calc(100vh - 52px);
    }

    @media (max-width: 768px) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
      }
    }

    /* ── PANELS ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .panel-header {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      padding: 8px 14px;
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-header .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }

    /* ── CONTROLS ── */
    .controls {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 8px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: #ff1a52; }
    .btn-primary:disabled { background: #3a1a22; color: #664; cursor: not-allowed; }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

    .btn-fast {
      background: var(--surface2);
      color: var(--gold);
      border: 1px solid #3a3a00;
    }
    .btn-fast.active { background: #2a2a00; border-color: var(--gold); }
    .btn-fast:hover  { border-color: var(--gold); }

    .speed-label {
      font-family: var(--font-head);
      font-size: 13px;
      color: var(--muted);
      margin-left: 4px;
    }

    select.circuit-select {
      font-family: var(--font-head);
      font-size: 14px;
      font-weight: 600;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 7px 12px;
      border-radius: 4px;
      cursor: pointer;
      outline: none;
    }

    select.circuit-select:focus { border-color: var(--accent); }

    .weather-badge {
      font-family: var(--font-head);
      font-size: 13px;
      padding: 5px 12px;
      border-radius: 20px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .weather-dry    { background: #1a2a1a; color: var(--green); border: 1px solid #1e4a1e; }
    .weather-rain   { background: #1a1a3a; color: #88aaff; border: 1px solid #2a2a5a; }
    .weather-heavy  { background: #0a0a2a; color: #6688ff; border: 1px solid #2a2a6a; }

    /* ── CLASSEMENT ── */
    .standings-table {
      width: 100%;
    }

    .standing-row {
      display: grid;
      grid-template-columns: 32px 26px 4px 1fr 80px 70px 60px;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-bottom: 1px solid #16161f;
      transition: background 0.1s;
    }

    .standing-row:hover { background: #16161f; }

    .standing-row.leader { background: #1a1a10; }
    .standing-row.dnf    { opacity: 0.4; }

    .pos {
      font-family: var(--font-head);
      font-weight: 900;
      font-size: 17px;
      color: var(--muted);
      text-align: center;
    }
    .pos.p1 { color: var(--gold); }
    .pos.p2 { color: #c0c0c0; }
    .pos.p3 { color: #cd7f32; }

    .driver-num {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }

    .team-bar {
      width: 4px;
      height: 28px;
      border-radius: 2px;
    }

    .driver-name {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .driver-tyre {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-family: var(--font-head);
      font-weight: 700;
    }

    .tyre-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
      flex-shrink: 0;
    }

    .tyre-condition {
      width: 36px;
      height: 4px;
      background: #222;
      border-radius: 2px;
      overflow: hidden;
    }

    .tyre-condition-bar {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s, background 0.3s;
    }

    .gap-time {
      font-family: var(--font-head);
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-align: right;
    }
    .gap-time.leader-time { color: var(--green); }

    .last-lap {
      font-family: var(--font-head);
      font-size: 12px;
      color: var(--muted);
      text-align: right;
    }

    .pit-badge {
      font-family: var(--font-head);
      font-size: 10px;
      font-weight: 700;
      background: #2a1a00;
      color: var(--gold);
      border: 1px solid #5a3a00;
      padding: 1px 5px;
      border-radius: 3px;
      letter-spacing: 1px;
    }

    .dnf-badge {
      font-family: var(--font-head);
      font-size: 10px;
      font-weight: 700;
      background: #2a0a0a;
      color: #ff4444;
      border: 1px solid #5a1a1a;
      padding: 1px 5px;
      border-radius: 3px;
    }

    /* ── COLONNE DROITE ── */
    .right-col {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── EVENTS LOG ── */
    .events-log {
      flex: 1;
      overflow-y: auto;
      max-height: 320px;
      padding: 8px 0;
    }

    .event-item {
      padding: 5px 12px;
      font-size: 12px;
      border-bottom: 1px solid #12121a;
      display: flex;
      gap: 8px;
      align-items: flex-start;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .event-lap {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 11px;
      color: var(--muted);
      min-width: 40px;
      padding-top: 1px;
    }

    .event-msg { line-height: 1.4; }

    .event-dnf     { color: #ff6666; }
    .event-pit     { color: var(--gold); }
    .event-weather { color: #88aaff; }
    .event-sc      { color: var(--yellow); }
    .event-finish  { color: var(--green); font-weight: 700; }
    .event-penalty { color: #ff9944; }

    /* ── STRATÉGIE ── */
    .strategy-list { padding: 8px 12px; }

    .strategy-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      border-bottom: 1px solid #12121a;
      font-size: 12px;
    }

    .strategy-driver {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 13px;
      width: 90px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .compound-pill {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 10px;
      background: rgba(255,255,255,0.08);
      letter-spacing: 0.5px;
    }

    /* ── PROGRESS BAR ── */
    .race-progress {
      padding: 10px 14px;
    }

    .progress-track {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 4px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--gold));
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    .progress-label {
      font-family: var(--font-head);
      font-size: 12px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }

    /* ── RÉSULTATS FINAUX ── */
    .results-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .results-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 3px solid var(--accent);
      border-radius: 8px;
      width: 100%;
      max-width: 560px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 24px;
    }

    .results-title {
      font-family: var(--font-head);
      font-weight: 900;
      font-size: 28px;
      color: var(--accent);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .results-subtitle {
      font-family: var(--font-head);
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .result-row {
      display: grid;
      grid-template-columns: 36px 28px 1fr 50px 60px;
      gap: 8px;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }

    .result-pos {
      font-family: var(--font-head);
      font-weight: 900;
      font-size: 20px;
      color: var(--muted);
    }
    .result-pos.p1 { color: var(--gold); }
    .result-pos.p2 { color: #c0c0c0; }
    .result-pos.p3 { color: #cd7f32; }

    .result-num {
      font-family: var(--font-head);
      font-size: 13px;
      color: var(--muted);
    }

    .result-name {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 15px;
    }

    .result-pts {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 16px;
      color: var(--gold);
      text-align: right;
    }

    .result-time {
      font-family: var(--font-head);
      font-size: 12px;
      color: var(--muted);
      text-align: right;
    }

    .podium-row { background: rgba(255,215,0,0.04); }

    /* ── HEADER TABLE ── */
    .standing-header {
      display: grid;
      grid-template-columns: 32px 26px 4px 1fr 80px 70px 60px;
      gap: 6px;
      padding: 6px 12px 4px;
      font-family: var(--font-head);
      font-size: 10px;
      letter-spacing: 1.5px;
      color: var(--muted);
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── SAFETY CAR BANNER ── */
    .sc-banner {
      display: none;
      background: linear-gradient(135deg, #2a2a00, #1a1a00);
      border: 1px solid var(--yellow);
      color: var(--yellow);
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 2px;
      padding: 6px 14px;
      border-radius: 4px;
      animation: pulse 1s ease infinite alternate;
    }
    .sc-banner.visible { display: block; }
    @keyframes pulse { from { opacity: 0.7; } to { opacity: 1; } }

  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-logo">F1<span>Manager</span></div>
  <div id="topbarCircuit" class="topbar-circuit">— Choisir un circuit —</div>
  <div class="topbar-lap">Tour <span id="topbarLap">0</span> / <span id="topbarTotal">—</span></div>
  <div id="weatherBadge" class="weather-badge weather-dry">☀️ SEC</div>
  <div id="scBanner" class="sc-banner">🟡 SAFETY CAR</div>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- CONTROLS -->
  <div class="controls panel" style="padding: 10px 14px;">
    <select id="circuitSelect" class="circuit-select">
      <option value="">— Choisir un circuit —</option>
    </select>
    <button class="btn btn-primary" id="btnStart" onclick="startRace()">Démarrer</button>
    <button class="btn btn-secondary" id="btnPause" onclick="togglePause()" disabled>Pause</button>
    <button class="btn btn-fast" id="btnFast" onclick="toggleFast()">⚡ Rapide</button>
    <span class="speed-label" id="speedLabel">x1</span>
    <button class="btn btn-secondary" onclick="skipToEnd()" id="btnSkip" disabled>⏩ Fin de course</button>
  </div>

  <!-- CLASSEMENT -->
  <div class="panel">
    <div class="panel-header"><div class="dot"></div> Classement en direct</div>
    <div class="race-progress">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="progress-label">
        <span id="progressLaps">Tour 0 / —</span>
        <span id="progressDist">0 km</span>
      </div>
    </div>
    <div class="standing-header">
      <div>Pos</div><div>#</div><div></div><div>Pilote</div><div>Pneu</div><div>Gap</div><div>Dernier</div>
    </div>
    <div id="standingsBody" class="standings-table"></div>
  </div>

  <!-- COLONNE DROITE -->
  <div class="right-col">

    <!-- EVENTS -->
    <div class="panel">
      <div class="panel-header"><div class="dot"></div> Radio & Événements</div>
      <div id="eventsLog" class="events-log">
        <div style="padding:16px;color:var(--muted);font-size:12px;text-align:center;">En attente du départ…</div>
      </div>
    </div>

    <!-- STRATÉGIE TOP 5 -->
    <div class="panel">
      <div class="panel-header"><div class="dot"></div> Stratégie Top 5</div>
      <div id="strategyList" class="strategy-list">
        <div style="padding:8px;color:var(--muted);font-size:12px;text-align:center;">—</div>
      </div>
    </div>

  </div>

</div>

<!-- RÉSULTATS FINAUX -->
<div id="resultsOverlay" class="results-overlay" style="display:none;">
  <div class="results-card">
    <div class="results-title">🏁 Résultats</div>
    <div class="results-subtitle" id="resultsSubtitle">Grand Prix</div>
    <div id="resultsBody"></div>
    <div style="margin-top:20px;display:flex;gap:10px;">
      <button class="btn btn-primary" onclick="closeResults()">Fermer</button>
      <button class="btn btn-secondary" onclick="restartRace()">Nouvelle Course</button>
    </div>
  </div>
</div>

<!-- SCRIPTS -->
<script src="js/data.js"></script>
<script src="js/engine.js"></script>
<script src="js/race.js"></script>
<script src="js/save.js"></script>
<script>

// ── STATE UI ──────────────────────────────────────────────
let simInterval   = null;
let isPaused      = false;
let isFast        = false;
let simSpeed      = 400; // ms entre chaque tour (normal)
let raceStarted   = false;

// ── INIT CIRCUITS SELECT ──────────────────────────────────
function initCircuitSelect() {
  const sel = document.getElementById('circuitSelect');
  F1Data.circuits.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = `${c.name} (${c.laps} tours)`;
    sel.appendChild(opt);
  });
}

// ── DÉMARRER LA COURSE ────────────────────────────────────
function startRace() {
  const circuitId = document.getElementById('circuitSelect').value;
  if (!circuitId) { alert('Choisis un circuit !'); return; }

  Race.init(circuitId);
  raceStarted = true;

  const circuit = Race.state.circuit;
  document.getElementById('topbarCircuit').textContent = circuit.fullName;
  document.getElementById('topbarTotal').textContent   = circuit.laps;
  document.getElementById('btnStart').disabled         = true;
  document.getElementById('btnPause').disabled         = false;
  document.getElementById('btnSkip').disabled          = false;
  document.getElementById('circuitSelect').disabled    = true;

  updateStandingsUI();
  updateStrategyUI();

  startSimulation();
}

// ── SIMULATION ────────────────────────────────────────────
function startSimulation() {
  clearInterval(simInterval);
  simInterval = setInterval(() => {
    if (isPaused) return;
    if (!Race.state || Race.state.finished) {
      clearInterval(simInterval);
      showResults();
      return;
    }

    const result = Race.simulateLap();
    if (!result) return;

    updateTopbar();
    updateWeather();
    updateStandingsUI();
    updateEventsUI(result.events);
    updateStrategyUI();
    updateProgress();

    if (Race.state.finished) {
      clearInterval(simInterval);
      setTimeout(showResults, 1200);
    }
  }, isFast ? 50 : simSpeed);
}

// ── PAUSE ─────────────────────────────────────────────────
function togglePause() {
  isPaused = !isPaused;
  document.getElementById('btnPause').textContent = isPaused ? '▶ Reprendre' : 'Pause';
}

// ── VITESSE ───────────────────────────────────────────────
function toggleFast() {
  isFast = !isFast;
  document.getElementById('btnFast').classList.toggle('active', isFast);
  document.getElementById('speedLabel').textContent = isFast ? 'x8' : 'x1';
  if (raceStarted) startSimulation();
}

// ── SKIP ──────────────────────────────────────────────────
function skipToEnd() {
  clearInterval(simInterval);
  Race.simulateAll();
  updateTopbar();
  updateStandingsUI();
  updateProgress();
  const allEvents = Race.state.events;
  updateEventsUI(allEvents.slice(-30));
  showResults();
}

// ── TOPBAR ────────────────────────────────────────────────
function updateTopbar() {
  if (!Race.state) return;
  document.getElementById('topbarLap').textContent = Race.state.currentLap;
}

// ── MÉTÉO ─────────────────────────────────────────────────
function updateWeather() {
  if (!Race.state) return;
  const w = Race.state.weather;
  const badge = document.getElementById('weatherBadge');
  badge.className = 'weather-badge';
  const sc = document.getElementById('scBanner');

  if (w === 'dry')         { badge.classList.add('weather-dry');   badge.textContent = '☀️ SEC'; }
  if (w === 'light_rain')  { badge.classList.add('weather-rain');  badge.textContent = '🌧️ PLUIE'; }
  if (w === 'heavy_rain')  { badge.classList.add('weather-heavy'); badge.textContent = '⛈️ FORTE PLUIE'; }

  sc.classList.toggle('visible', Race.state.safetyCar.active);
}

// ── CLASSEMENT ────────────────────────────────────────────
function updateStandingsUI() {
  if (!Race.state) return;
  const standings = Race.getStandings();
  const body = document.getElementById('standingsBody');
  body.innerHTML = '';

  standings.forEach(car => {
    const tyre   = F1Data.tyres[car.tyre.compound];
    const isDnf  = car.status === 'dnf';
    const isLead = car.position === 1;

    const condition = Math.round(car.tyre.condition * 100);
    const condColor = condition > 60 ? '#00e676' : condition > 30 ? '#ffea00' : '#ff4444';

    const row = document.createElement('div');
    row.className = `standing-row${isLead ? ' leader' : ''}${isDnf ? ' dnf' : ''}`;

    const posClass = car.position <= 3 ? `pos p${car.position}` : 'pos';
    const gapText  = isLead ? formatTime(car.totalTime) : '+' + car.gap.toFixed(3) + 's';
    const lastLap  = car.lapTimes.length > 0 ? formatLapTime(car.lapTimes[car.lapTimes.length - 1]) : '—';
    const pitInfo  = car.pitThisLap
      ? `<span class="pit-badge">PIT</span>`
      : isDnf ? `<span class="dnf-badge">DNF</span>` : '';

    row.innerHTML = `
      <div class="${posClass}">${car.position}</div>
      <div class="driver-num">${car.driver.number}</div>
      <div class="team-bar" style="background:${car.team.color}"></div>
      <div>
        <div class="driver-name">${car.driver.firstName[0]}. ${car.driver.name} ${pitInfo}</div>
        <div style="font-size:10px;color:var(--muted);font-family:var(--font-head)">${car.team.shortName}</div>
      </div>
      <div class="driver-tyre">
        <div class="tyre-dot" style="background:${tyre.color}"></div>
        <div>
          <div style="color:${tyre.color};font-size:10px">${tyre.name.substring(0,1)}</div>
          <div class="tyre-condition">
            <div class="tyre-condition-bar" style="width:${condition}%;background:${condColor}"></div>
          </div>
        </div>
      </div>
      <div class="gap-time ${isLead ? 'leader-time' : ''}">${gapText}</div>
      <div class="last-lap">${lastLap}</div>
    `;
    body.appendChild(row);
  });
}

// ── EVENTS LOG ────────────────────────────────────────────
function updateEventsUI(events) {
  if (!events || events.length === 0) return;
  const log = document.getElementById('eventsLog');

  // Vider le placeholder au premier event
  if (log.querySelector('div[style]')) log.innerHTML = '';

  events.forEach(ev => {
    const item = document.createElement('div');
    item.className = `event-item event-${ev.type}`;
    item.innerHTML = `<span class="event-lap">T.${ev.lap}</span><span class="event-msg">${ev.message}</span>`;
    log.insertBefore(item, log.firstChild);
  });

  // Limite à 80 items
  while (log.children.length > 80) log.removeChild(log.lastChild);
}

// ── STRATÉGIE TOP 5 ───────────────────────────────────────
function updateStrategyUI() {
  if (!Race.state) return;
  const top5 = Race.getStandings().slice(0, 5);
  const list = document.getElementById('strategyList');
  list.innerHTML = '';

  top5.forEach(car => {
    const row = document.createElement('div');
    row.className = 'strategy-row';

    const compounds = car.strategy.compounds.map((c, i) => {
      const t = F1Data.tyres[c];
      const isCurrent = i === car.currentCompoundIndex;
      return `<span class="compound-pill" style="color:${t.color};border:1px solid ${isCurrent ? t.color : 'transparent'}">${t.name}</span>`;
    }).join('');

    row.innerHTML = `
      <div class="strategy-driver">${car.driver.name}</div>
      ${compounds}
      <div style="margin-left:auto;font-size:10px;color:var(--muted);font-family:var(--font-head)">${car.pitStops.length} arrêt${car.pitStops.length !== 1 ? 's' : ''}</div>
    `;
    list.appendChild(row);
  });
}

// ── PROGRESS ─────────────────────────────────────────────
function updateProgress() {
  if (!Race.state) return;
  const pct = (Race.state.currentLap / Race.state.totalLaps) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLaps').textContent = `Tour ${Race.state.currentLap} / ${Race.state.totalLaps}`;
  const dist = (Race.state.currentLap * Race.state.circuit.lapDistance).toFixed(0);
  document.getElementById('progressDist').textContent = dist + ' km';
}

// ── RÉSULTATS ────────────────────────────────────────────
function showResults() {
  const results = Race.assignPoints();
  document.getElementById('resultsSubtitle').textContent = `Grand Prix de ${Race.state.circuit.name}`;
  const body = document.getElementById('resultsBody');
  body.innerHTML = '';

  results.forEach((r, i) => {
    const row = document.createElement('div');
    const isPodium = i < 3;
    row.className = `result-row${isPodium ? ' podium-row' : ''}`;
    const posClass = i < 3 ? `result-pos p${i+1}` : 'result-pos';
    const timeText = r.dnfLap ? `DNF (T.${r.dnfLap})` : (i === 0 ? formatTime(r.totalTime) : '+' + ((r.totalTime || 0) - (results[0].totalTime || 0)).toFixed(3) + 's');
    row.innerHTML = `
      <div class="${posClass}">${r.position}</div>
      <div class="result-num">${r.driver.number}</div>
      <div class="result-name" style="color:${r.team.color}">
        ${r.driver.firstName} ${r.driver.name}
        <div style="font-size:11px;color:var(--muted)">${r.team.name}</div>
      </div>
      <div class="result-pts">${r.points > 0 ? r.points + ' pts' : '—'}</div>
      <div class="result-time">${timeText}</div>
    `;
    body.appendChild(row);
  });

  document.getElementById('resultsOverlay').style.display = 'flex';
}

function closeResults() {
  document.getElementById('resultsOverlay').style.display = 'none';
}

function restartRace() {
  closeResults();
  clearInterval(simInterval);
  raceStarted = false;
  isPaused = false;
  document.getElementById('btnStart').disabled      = false;
  document.getElementById('btnPause').disabled      = true;
  document.getElementById('btnSkip').disabled       = true;
  document.getElementById('circuitSelect').disabled = false;
  document.getElementById('topbarCircuit').textContent = '— Choisir un circuit —';
  document.getElementById('topbarLap').textContent = '0';
  document.getElementById('topbarTotal').textContent = '—';
  document.getElementById('standingsBody').innerHTML = '';
  document.getElementById('eventsLog').innerHTML = '<div style="padding:16px;color:var(--muted);font-size:12px;text-align:center;">En attente du départ…</div>';
  document.getElementById('strategyList').innerHTML = '<div style="padding:8px;color:var(--muted);font-size:12px;text-align:center;">—</div>';
  document.getElementById('progressFill').style.width = '0%';
}

// ── UTILS FORMATAGE ───────────────────────────────────────
function formatTime(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = (seconds % 60).toFixed(3);
  if (h > 0) return `${h}h${String(m).padStart(2,'0')}m${String(Math.floor(s)).padStart(2,'0')}s`;
  return `${m}:${String(parseFloat(s).toFixed(3)).padStart(6,'0')}`;
}

function formatLapTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = (seconds % 60).toFixed(3);
  return `${m}:${String(parseFloat(s).toFixed(3)).padStart(6,'0')}`;
}

// ── INIT ─────────────────────────────────────────────────
initCircuitSelect();

</script>
