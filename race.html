<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F1 Manager — Course</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#0a0a0f; --surface:#12121a; --surface2:#1a1a26; --border:#2a2a3e;
      --text:#e8e8f0; --muted:#6a6a8a; --accent:#e8003d; --gold:#ffd700;
      --green:#00e676; --yellow:#ffea00;
      --fh:'Barlow Condensed',sans-serif; --fb:'Barlow',sans-serif;
    }
    html,body { height:100%; background:var(--bg); color:var(--text); font-family:var(--fb); font-size:14px; overflow-x:hidden; }

    /* TOPBAR */
    .topbar { background:var(--surface); border-bottom:2px solid var(--accent); padding:0 12px; height:48px; display:flex; align-items:center; gap:10px; position:sticky; top:0; z-index:100; }
    .logo { font-family:var(--fh); font-weight:900; font-size:19px; color:var(--accent); letter-spacing:2px; }
    .logo span { color:var(--text); }
    .nav-link { font-family:var(--fh); font-size:12px; font-weight:700; color:var(--muted); text-decoration:none; letter-spacing:1px; text-transform:uppercase; padding:3px 6px; }
    .nav-link:hover,.nav-link.active { color:var(--accent); }
    .tb-right { margin-left:auto; display:flex; align-items:center; gap:8px; }
    .lap-pill { font-family:var(--fh); font-weight:700; font-size:15px; color:var(--text); }
    .lap-pill span { color:var(--muted); font-size:13px; }
    .w-badge { font-family:var(--fh); font-size:11px; padding:3px 8px; border-radius:12px; font-weight:700; }
    .w-dry   { background:#1a2a1a; color:var(--green);  border:1px solid #1e4a1e; }
    .w-rain  { background:#1a1a3a; color:#88aaff; border:1px solid #2a2a5a; }
    .w-heavy { background:#0a0a2a; color:#6688ff; border:1px solid #2a2a6a; }
    .sc-pill { display:none; background:#2a2a00; border:1px solid var(--yellow); color:var(--yellow); font-family:var(--fh); font-weight:700; font-size:11px; padding:3px 8px; border-radius:12px; animation:pulse 1s ease infinite alternate; }
    .sc-pill.on { display:block; }
    @keyframes pulse { from{opacity:.6} to{opacity:1} }

    /* PAGE LAYOUT — mobile first: stack vertical */
    .page { display:flex; flex-direction:column; gap:8px; padding:8px; }

    /* CONTROLS */
    .controls { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:8px 10px; display:flex; align-items:center; gap:7px; flex-wrap:wrap; }
    .btn { font-family:var(--fh); font-weight:700; font-size:12px; letter-spacing:1px; text-transform:uppercase; padding:6px 14px; border:none; border-radius:4px; cursor:pointer; transition:all .15s; white-space:nowrap; }
    .btn-red  { background:var(--accent); color:#fff; }
    .btn-red:hover { background:#ff1a52; }
    .btn-red:disabled { background:#3a1a22; color:#664; cursor:not-allowed; }
    .btn-sec { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
    .btn-sec:hover { border-color:var(--accent); color:var(--accent); }
    .btn-sec:disabled { opacity:.4; cursor:not-allowed; }
    .btn-gold { background:var(--surface2); color:var(--gold); border:1px solid #3a3a00; }
    .btn-gold.on { background:#2a2a00; border-color:var(--gold); }
    select.sel { font-family:var(--fh); font-size:13px; font-weight:600; background:var(--surface2); color:var(--text); border:1px solid var(--border); padding:5px 8px; border-radius:4px; outline:none; max-width:180px; }
    .spd { font-family:var(--fh); font-size:12px; color:var(--muted); }

    /* MAIN ROW — circuit + classement côte à côte sur desktop */
    .main-row { display:flex; gap:8px; }
    @media(max-width:650px) { .main-row { flex-direction:column; } }

    /* CIRCUIT PANEL */
    .circuit-panel { background:var(--surface); border:1px solid var(--border); border-radius:6px; overflow:hidden; flex:1; min-width:0; }
    .panel-head { background:var(--surface2); border-bottom:1px solid var(--border); padding:6px 12px; font-family:var(--fh); font-weight:700; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); display:flex; align-items:center; gap:6px; }
    .panel-head .dot { width:6px; height:6px; border-radius:50%; background:var(--accent); }

    /* SVG container — ratio fixe */
    .svg-wrap { position:relative; width:100%; padding-top:75%; /* ratio 4:3 */ background:#0d0d14; }
    .svg-wrap svg { position:absolute; top:0; left:0; width:100%; height:100%; }
    .svg-overlay { position:absolute; bottom:8px; right:10px; font-family:var(--fh); font-size:12px; color:var(--muted); }
    .svg-overlay span { color:var(--text); font-weight:700; font-size:15px; }

    /* PROGRESS */
    .prog-wrap { padding:6px 10px; }
    .prog-track { height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
    .prog-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--gold)); border-radius:2px; transition:width .4s; }

    /* CLASSEMENT PANEL */
    .stand-panel { background:var(--surface); border:1px solid var(--border); border-radius:6px; overflow:hidden; width:280px; flex-shrink:0; display:flex; flex-direction:column; }
    @media(max-width:650px) { .stand-panel { width:100%; } }
    .stand-scroll { overflow-y:auto; flex:1; }
    .s-head { display:grid; grid-template-columns:26px 22px 3px 1fr 60px 52px; gap:4px; padding:4px 8px; font-family:var(--fh); font-size:9px; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; border-bottom:1px solid var(--border); }
    .s-row  { display:grid; grid-template-columns:26px 22px 3px 1fr 60px 52px; align-items:center; gap:4px; padding:4px 8px; border-bottom:1px solid #12121e; transition:background .1s; }
    .s-row:hover { background:#14141e; }
    .s-row.lead { background:#191910; }
    .s-row.dnf  { opacity:.4; }
    .pos { font-family:var(--fh); font-weight:900; font-size:15px; color:var(--muted); text-align:center; }
    .pos.p1{color:var(--gold)} .pos.p2{color:#c0c0c0} .pos.p3{color:#cd7f32}
    .dnum { font-family:var(--fh); font-size:10px; color:var(--muted); text-align:center; }
    .tbar { width:3px; height:24px; border-radius:2px; }
    .dname { font-family:var(--fh); font-weight:700; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .dteam-s { font-family:var(--fh); font-size:9px; color:var(--muted); }
    .tyre-cell { display:flex; align-items:center; gap:3px; }
    .tyre-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .tyre-cond { width:28px; height:3px; background:#1a1a2a; border-radius:2px; overflow:hidden; }
    .tyre-bar  { height:100%; border-radius:2px; transition:width .3s; }
    .gap-cell  { font-family:var(--fh); font-size:11px; font-weight:600; color:var(--muted); text-align:right; }
    .gap-cell.ldr { color:var(--green); font-size:10px; }
    .last-cell { font-family:var(--fh); font-size:10px; color:var(--muted); text-align:right; }
    .pit-b { font-family:var(--fh); font-size:8px; font-weight:700; background:#2a1a00; color:var(--gold); border:1px solid #5a3a00; padding:1px 3px; border-radius:2px; }
    .dnf-b { font-family:var(--fh); font-size:8px; font-weight:700; background:#2a0a0a; color:#ff4444; border:1px solid #5a1a1a; padding:1px 3px; border-radius:2px; }

    /* BOTTOM ROW */
    .bottom-row { display:flex; gap:8px; }
    @media(max-width:650px) { .bottom-row { flex-direction:column; } }
    .events-panel { background:var(--surface); border:1px solid var(--border); border-radius:6px; overflow:hidden; flex:1; }
    .events-scroll { overflow-y:auto; max-height:160px; padding:4px 0; }
    .ev { padding:3px 10px; font-size:11px; border-bottom:1px solid #10101a; display:flex; gap:6px; animation:fadeIn .25s; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(-3px)} to{opacity:1;transform:none} }
    .ev-lap { font-family:var(--fh); font-weight:700; font-size:10px; color:var(--muted); min-width:32px; }
    .ev-dnf{color:#ff6666} .ev-pit{color:var(--gold)} .ev-weather{color:#88aaff}
    .ev-safety_car{color:var(--yellow)} .ev-safety_car_end{color:var(--green)}
    .ev-finish{color:var(--green);font-weight:700} .ev-penalty{color:#ff9944}

    .strat-panel { background:var(--surface); border:1px solid var(--border); border-radius:6px; overflow:hidden; width:220px; flex-shrink:0; }
    @media(max-width:650px) { .strat-panel { width:100%; } }
    .strat-body { padding:6px 10px; }
    .strat-row { display:flex; align-items:center; gap:5px; padding:3px 0; border-bottom:1px solid #10101a; }
    .strat-name { font-family:var(--fh); font-weight:700; font-size:12px; width:72px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .cpill { font-family:var(--fh); font-weight:700; font-size:9px; padding:1px 5px; border-radius:8px; background:rgba(255,255,255,.06); }

    /* RESULTS OVERLAY */
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,.88); z-index:200; display:flex; align-items:center; justify-content:center; padding:14px; }
    .res-card { background:var(--surface); border:1px solid var(--border); border-top:3px solid var(--accent); border-radius:8px; width:100%; max-width:480px; max-height:90vh; overflow-y:auto; padding:18px; }
    .res-title { font-family:var(--fh); font-weight:900; font-size:24px; color:var(--accent); letter-spacing:3px; text-transform:uppercase; }
    .res-sub   { font-family:var(--fh); font-size:12px; color:var(--muted); margin-bottom:14px; }
    .res-row   { display:grid; grid-template-columns:30px 24px 1fr 46px 56px; gap:6px; align-items:center; padding:6px 0; border-bottom:1px solid var(--border); }
    .rpos { font-family:var(--fh); font-weight:900; font-size:17px; color:var(--muted); }
    .rpos.p1{color:var(--gold)} .rpos.p2{color:#c0c0c0} .rpos.p3{color:#cd7f32}
    .rnum  { font-family:var(--fh); font-size:11px; color:var(--muted); }
    .rname { font-family:var(--fh); font-weight:700; font-size:13px; }
    .rpts  { font-family:var(--fh); font-weight:700; font-size:14px; color:var(--gold); text-align:right; }
    .rtime { font-family:var(--fh); font-size:10px; color:var(--muted); text-align:right; }
    .podium { background:rgba(255,215,0,.04); }

    ::-webkit-scrollbar{width:3px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

    /* FEUX DE DÉPART */
    .light-dot { width:22px; height:22px; border-radius:50%; background:#1a0000; border:2px solid #3a0000; transition:background .15s,box-shadow .15s; }
    .light-dot.on { background:#ff0000; box-shadow:0 0 12px #ff0000,0 0 24px #ff000066; border-color:#ff4444; }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">F1<span>Manager</span></div>
  <a href="index.html" class="nav-link">🏠 Équipe</a>
  <a href="race.html"  class="nav-link active">🏁 Course</a>
  <a href="standings.html" class="nav-link">🏆 Champ.</a>
  <div class="tb-right">
    <div class="lap-pill" id="tLap">Tour <b>0</b>/<span id="tTotal">—</span></div>
    <div id="wBadge" class="w-badge w-dry">☀️ SEC</div>
    <div id="scPill" class="sc-pill">🟡 SC</div>
  </div>
</div>

<!-- PAGE -->
<div class="page">

  <!-- CONTROLS -->
  <div class="controls">
    <select id="circSel" class="sel"></select>
    <button class="btn btn-red" id="btnStart" onclick="startRace()">▶ Démarrer</button>
    <button class="btn btn-sec" id="btnPause" onclick="togglePause()" disabled>⏸ Pause</button>
    <button class="btn btn-gold" id="btnSlow" onclick="toggleSlow()">🐢</button>
    <button class="btn btn-gold" id="btnFast" onclick="toggleFast()">⚡</button>
    <span class="spd" id="spdLbl">x1</span>
    <button class="btn btn-sec" id="btnSkip" onclick="skipEnd()" disabled>⏩ Fin</button>
  </div>

  <!-- MAIN ROW : circuit + classement -->
  <div class="main-row">

    <!-- CIRCUIT -->
    <div class="circuit-panel">
      <div class="panel-head"><div class="dot"></div> <span id="circLabel">Sélectionne un circuit</span></div>
      <div class="svg-wrap">
        <svg id="circSvg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
          <g id="trackG"></g>
          <g id="carsG"></g>
        </svg>
        <div class="svg-overlay">Tour <span id="svgLap">0</span> / <span id="svgTotal">—</span></div>
        <!-- FEUX DE DÉPART -->
        <div id="lightsOverlay" style="display:none;position:absolute;inset:0;align-items:center;justify-content:center;flex-direction:column;gap:10px;background:rgba(0,0,0,0.75);z-index:10;">
          <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px;letter-spacing:3px;color:#fff;text-transform:uppercase;">Prêt au départ</div>
          <div style="display:flex;gap:8px;" id="lightDots">
            <div class="light-dot"></div>
            <div class="light-dot"></div>
            <div class="light-dot"></div>
            <div class="light-dot"></div>
            <div class="light-dot"></div>
          </div>
          <div id="lightsMsg" style="font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--muted);letter-spacing:2px;margin-top:4px;"></div>
        </div>
      </div>
      <div class="prog-wrap">
        <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
      </div>
    </div>

    <!-- CLASSEMENT -->
    <div class="stand-panel">
      <div class="panel-head"><div class="dot"></div> Classement</div>
      <div class="s-head"><div>Pos</div><div>#</div><div></div><div>Pilote</div><div>Pneu/Gap</div><div>Dernier</div></div>
      <div id="standBody" class="stand-scroll"></div>
    </div>

  </div>

  <!-- BOTTOM ROW : events + stratégie -->
  <div class="bottom-row">
    <div class="events-panel">
      <div class="panel-head"><div class="dot"></div> Radio & Événements</div>
      <div id="evLog" class="events-scroll">
        <div style="padding:10px;color:var(--muted);font-size:11px;text-align:center">En attente du départ…</div>
      </div>
    </div>
    <div class="strat-panel">
      <div class="panel-head"><div class="dot"></div> Stratégie Top 5</div>
      <div id="stratBody" class="strat-body"><div style="color:var(--muted);font-size:11px;text-align:center">—</div></div>
    </div>
  </div>

</div>

<!-- RESULTS -->
<div id="resOverlay" class="overlay" style="display:none">
  <div class="res-card">
    <div class="res-title">🏁 Résultats</div>
    <div class="res-sub" id="resSub"></div>
    <div id="resBody"></div>
    <div style="margin-top:14px;display:flex;gap:8px">
      <button class="btn btn-red" onclick="closeRes()">Fermer</button>
      <button class="btn btn-sec" onclick="resetRace()">Nouvelle course</button>
    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/engine.js"></script>
<script src="js/race.js"></script>
<script src="js/save.js"></script>
<script>
// ══════════════════════════════════════════════
//  CIRCUITS — paths SVG ajustés pour remplir
//  le viewBox 400×300 au maximum
// ══════════════════════════════════════════════
const TRACKS = {
  bahrain: {
    d: "M60,40 L280,40 Q340,40 345,80 L345,100 Q345,120 325,120 L285,120 Q265,120 265,140 L265,160 Q265,178 282,178 L315,178 Q338,178 338,200 L338,228 Q338,258 308,260 L130,260 Q100,260 88,238 L75,210 Q64,190 44,190 L38,175 Q30,155 38,130 L38,100 Q38,60 60,40 Z",
    sl: {x:60,y:40}, w:10
  },
  monaco: {
    d: "M100,25 L295,25 Q350,25 362,65 L368,100 Q373,130 355,148 L318,162 Q295,172 288,195 L284,222 Q282,248 262,258 L175,268 Q140,272 118,252 L80,218 Q48,190 44,158 L40,115 Q36,68 72,45 L100,25 Z",
    sl: {x:100,y:25}, w:8
  },
  silverstone: {
    d: "M80,30 L295,30 Q368,30 372,95 L374,140 Q376,178 348,195 L308,210 Q345,222 352,255 L354,272 Q356,288 330,290 L110,290 Q68,288 52,262 L36,228 Q20,195 22,155 L20,95 Q20,45 58,32 L80,30 Z",
    sl: {x:80,y:30}, w:11
  },
  monza: {
    d: "M100,25 L270,25 Q355,25 368,82 L372,125 Q376,162 352,182 L388,195 Q395,215 382,235 L368,258 Q355,278 328,280 L108,280 Q68,278 52,252 L44,228 Q35,205 58,195 L30,178 Q12,158 14,122 L14,78 Q16,30 60,26 Z",
    sl: {x:100,y:25}, w:11
  },
  spa: {
    d: "M75,22 L285,22 Q360,22 375,75 L380,118 Q384,162 358,185 L318,205 Q355,220 368,255 L372,272 Q374,288 348,290 L95,290 Q52,288 36,260 L22,228 Q8,195 12,155 L10,88 Q12,38 52,24 L75,22 Z",
    sl: {x:75,y:22}, w:11
  },
  suzuka: {
    d: "M90,25 L268,25 Q348,25 362,78 L368,118 Q372,155 350,172 L318,185 Q352,198 364,232 L368,255 Q370,278 344,282 L95,282 Q55,280 40,255 L28,225 Q15,195 18,158 L16,88 Q18,40 58,27 L90,25 Z",
    sl: {x:90,y:25}, w:10
  },
};

// ══════════════════════════════════════════════
//  CIRCUIT RENDERER
// ══════════════════════════════════════════════
const CR = {
  pathEl: null,
  len: 0,
  carEls: [], // éléments SVG par INDEX de grille (pas position)
  raf: null,

  // Fraction du tour parcourue par chaque voiture (0..1), par index de grille
  fractions: [],

  init(circuitId) {
    const t = TRACKS[circuitId];
    if (!t) return;

    const tG = document.getElementById('trackG');
    const cG = document.getElementById('carsG');
    tG.innerHTML = '';
    cG.innerHTML = '';
    this.carEls  = [];
    this.fractions = [];
    this.targetFrac = [];
    if (this.raf) { cancelAnimationFrame(this.raf); this.raf = null; }

    // Halo
    const halo = this._path(t.d, 'none', 'rgba(255,255,255,0.05)', t.w + 8);
    tG.appendChild(halo);
    // Asphalte
    const road = this._path(t.d, 'none', '#252535', t.w);
    tG.appendChild(road);
    // Pointillés centre
    const dash = this._path(t.d, 'none', '#3a3a55', 1);
    dash.setAttribute('stroke-dasharray', '7 5');
    tG.appendChild(dash);
    // Ligne départ
    const sl = document.createElementNS('http://www.w3.org/2000/svg','rect');
    sl.setAttribute('x',  t.sl.x - 1.5);
    sl.setAttribute('y',  t.sl.y - t.w / 2);
    sl.setAttribute('width',  '3');
    sl.setAttribute('height', t.w);
    sl.setAttribute('fill','#ffffff');
    tG.appendChild(sl);

    this.pathEl = road;
    this.len    = road.getTotalLength();

    // Créer 1 élément SVG par voiture (triés par grille de départ)
    if (!Race.state) return;
    Race.state.grid.forEach((car, idx) => {
      const g = document.createElementNS('http://www.w3.org/2000/svg','g');

      // Couleur via F1Data pour être sûr
      const teamColor = F1Data.teams.find(t => t.id === car.driver.teamId)?.color || '#ffffff';

      const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
      c.setAttribute('r','5');
      c.setAttribute('fill', teamColor);
      c.setAttribute('stroke','rgba(255,255,255,0.5)');
      c.setAttribute('stroke-width','1');

      const tx = document.createElementNS('http://www.w3.org/2000/svg','text');
      tx.setAttribute('text-anchor','middle');
      tx.setAttribute('dominant-baseline','central');
      tx.setAttribute('fill','#fff');
      tx.setAttribute('font-size','3.5');
      tx.setAttribute('font-family','Barlow Condensed,sans-serif');
      tx.setAttribute('font-weight','700');
      tx.setAttribute('pointer-events','none');
      tx.textContent = car.driver.number;

      g.appendChild(c);
      g.appendChild(tx);
      cG.appendChild(g);

      this.carEls.push(g);

      // Position initiale : toutes sur la ligne de départ, serrées
      const startFrac = 0.001 * idx; // très peu d'écart, alignées au départ
      this.fractions.push(startFrac);
      this.targetFrac.push(startFrac);
    });
  },

  _path(d, fill, stroke, sw) {
    const el = document.createElementNS('http://www.w3.org/2000/svg','path');
    el.setAttribute('d', d);
    el.setAttribute('fill', fill);
    el.setAttribute('stroke', stroke);
    el.setAttribute('stroke-width', sw);
    el.setAttribute('stroke-linecap','round');
    el.setAttribute('stroke-linejoin','round');
    return el;
  },

  // Appelé à chaque tour simulé — met à jour les vitesses individuelles
  advanceLap() {
    if (!Race.state || !this.pathEl) return;

    const standings = Race.getStandings();

    standings.forEach((car) => {
      const idx = Race.state.grid.indexOf(car);
      if (idx < 0) return;
      if (car.status === 'dnf') {
        if (this.carEls[idx]) this.carEls[idx].style.display = 'none';
        this.carSpeed[idx] = 0;
        return;
      }
      // Vitesse de chaque voiture en tours/seconde VISUEL
      // Basée sur le dernier temps au tour réel
      // Le temps au tour réel est entre ~82s (Monza) et ~106s (Spa)
      // On normalise : vitesse de base = 1 tour / getInterval(ms) en visuel
      const lastLap = car.lapTimes.length > 0
        ? car.lapTimes[car.lapTimes.length - 1]
        : Race.state.circuit.baseLapTime;

      // La vitesse visuelle est proportionnelle au temps au tour
      // Voiture rapide (lap court) = tourne plus vite que voiture lente
      const baseSpeed = 1 / (getInterval() / 1000);
      const relSpeed  = Race.state.circuit.baseLapTime / lastLap;
      this.carSpeed[idx] = baseSpeed * relSpeed;
    });
  },

  // Animation RAF — vitesse constante et fluide pour chaque voiture
  startAnim() {
    if (!this.pathEl) return;
    let lastTime = performance.now();

    const loop = (now) => {
      const dt = (now - lastTime) / 1000;
      lastTime = now;

      if (Race.state && !isPaused && this._started) {
        Race.state.grid.forEach((car, idx) => {
          if (car.status === 'dnf') return;

          const speed = this.carSpeed[idx] || (1 / (getInterval() / 1000));

          // Avancer en continu à vitesse propre — JAMAIS de saut
          let cur = this._displayFrac[idx] !== undefined
            ? this._displayFrac[idx]
            : this.fractions[idx] || 0;

          cur = (cur + dt * speed) % 1;
          this._displayFrac[idx] = cur;

          const pt = this.pathEl.getPointAtLength(cur * this.len);
          if (this.carEls[idx]) {
            this.carEls[idx].setAttribute('transform', `translate(${pt.x},${pt.y})`);
            this.carEls[idx].style.display = '';
          }
        });

        // Compteur de tour synchronisé sur le leader visuel
        // Quand le leader passe la fraction 0 (ligne de départ), on incrémente
        this._syncLapCounter();
      }

      this.raf = requestAnimationFrame(loop);
    };

    this._displayFrac = [...this.fractions];
    this.targetFrac   = [...this.fractions];
    this.carSpeed     = new Array(Race.state.grid.length).fill(1 / (getInterval() / 1000));
    this._prevFrac    = [...this.fractions];
    this._visualLap   = 1;

    // Départ arrêté — les voitures restent immobiles pendant les feux
    this._started = false;
    this.raf = requestAnimationFrame(loop);
  },

  // Séquence de feux de départ
  startLights(onGo) {
    const lights = document.getElementById('lightsOverlay');
    if (!lights) { onGo(); return; }
    lights.style.display = 'flex';
    const dots = lights.querySelectorAll('.light-dot');

    // Allumer les feux un par un (5 rouges)
    let i = 0;
    const on = setInterval(() => {
      if (i < dots.length) {
        dots[i].classList.add('on');
        i++;
      } else {
        clearInterval(on);
        // Extinction après 800ms → DÉPART !
        setTimeout(() => {
          dots.forEach(d => d.classList.remove('on'));
          setTimeout(() => {
            lights.style.display = 'none';
            this._started = true;
            onGo();
          }, 300);
        }, 800);
      }
    }, 400);
  },

  // Détecte le passage de la ligne de départ du leader
  _syncLapCounter() {
    if (!Race.state) return;
    // Trouver le leader actuel (position 1)
    const leader = Race.state.grid.find(c => c.position === 1 && c.status === 'racing');
    if (!leader) return;
    const idx = Race.state.grid.indexOf(leader);
    if (idx < 0) return;

    const cur  = this._displayFrac[idx] || 0;
    const prev = this._prevFrac[idx]    || 0;

    // Passage de la ligne : la fraction passe de ~0.98+ à ~0.02 (wraparound)
    if (prev > 0.85 && cur < 0.15) {
      this._visualLap = Math.min((this._visualLap || 1) + 1, Race.state.totalLaps);
      // Mettre à jour le compteur affiché
      document.getElementById('svgLap').textContent = this._visualLap;
      document.getElementById('tLap').innerHTML =
        `Tour <b>${this._visualLap}</b>/<span>${Race.state.totalLaps}</span>`;
    }

    this._prevFrac[idx] = cur;
  },

  stopAnim() {
    if (this.raf) { cancelAnimationFrame(this.raf); this.raf = null; }
  },
};

// ══════════════════════════════════════════════
//  UI STATE
// ══════════════════════════════════════════════
let simInterval = null;
let isPaused    = false;
let isFast      = false;
let isSlow      = false;
let started     = false;

// Intervalles en ms par tour simulé
const SPEEDS = { slow: 6000, normal: 2500, fast: 80 };

function getInterval() {
  if (isSlow) return SPEEDS.slow;
  if (isFast) return SPEEDS.fast;
  return SPEEDS.normal;
}

function initSel() {
  const sel = document.getElementById('circSel');
  F1Data.circuits.forEach(c => {
    const o = document.createElement('option');
    o.value = c.id;
    o.textContent = `${c.name} (${c.laps} t.)`;
    sel.appendChild(o);
  });
}

function startRace() {
  const cid = document.getElementById('circSel').value;
  if (!cid) { alert('Choisis un circuit !'); return; }

  Race.init(cid);
  started = true;

  const cir = Race.state.circuit;
  document.getElementById('tTotal').textContent   = cir.laps;
  document.getElementById('svgTotal').textContent = cir.laps;
  document.getElementById('circLabel').textContent= cir.name.toUpperCase();
  document.getElementById('btnStart').disabled    = true;
  document.getElementById('btnPause').disabled    = false;
  document.getElementById('btnSkip').disabled     = false;
  document.getElementById('circSel').disabled     = true;

  CR.init(cid);
  CR.startAnim();

  renderStandings();
  renderStrat();

  // Séquence feux de départ → puis simulation
  CR.startLights(() => runSim());
}

function runSim() {
  clearInterval(simInterval);
  simInterval = setInterval(() => {
    if (isPaused || !Race.state || Race.state.finished) return;

    const res = Race.simulateLap();
    if (!res) return;

    CR.advanceLap();

    // Progress bar uniquement — compteur de tour géré par _syncLapCounter
    document.getElementById('progFill').style.width =
      (Race.state.currentLap / Race.state.totalLaps * 100) + '%';

    updateWeather();
    renderStandings();
    addEvents(res.events);
    renderStrat();

    if (Race.state.finished) {
      clearInterval(simInterval);
      setTimeout(showResults, 1000);
    }
  }, getInterval());
}

function togglePause() {
  isPaused = !isPaused;
  document.getElementById('btnPause').textContent = isPaused ? '▶ Reprendre' : '⏸ Pause';
}

function toggleSlow() {
  isSlow = !isSlow;
  if (isSlow) isFast = false;
  document.getElementById('btnSlow').classList.toggle('on', isSlow);
  document.getElementById('btnFast').classList.remove('on');
  document.getElementById('spdLbl').textContent = isSlow ? '🐢 Lent' : 'x1';
  if (started) runSim();
}

function toggleFast() {
  isFast = !isFast;
  if (isFast) isSlow = false;
  document.getElementById('btnFast').classList.toggle('on', isFast);
  document.getElementById('btnSlow').classList.remove('on');
  document.getElementById('spdLbl').textContent = isFast ? '⚡ x15' : 'x1';
  if (started) runSim();
}

function skipEnd() {
  clearInterval(simInterval);
  Race.simulateAll();
  CR.advanceLap();
  document.getElementById('svgLap').textContent = Race.state.currentLap;
  document.getElementById('progFill').style.width = '100%';
  renderStandings();
  addEvents(Race.state.events.slice(-15));
  showResults();
}

function updateWeather() {
  if (!Race.state) return;
  const w = Race.state.weather;
  const b = document.getElementById('wBadge');
  b.className = 'w-badge';
  if (w==='dry')        { b.classList.add('w-dry');   b.textContent='☀️ SEC'; }
  if (w==='light_rain') { b.classList.add('w-rain');  b.textContent='🌧️ PLUIE'; }
  if (w==='heavy_rain') { b.classList.add('w-heavy'); b.textContent='⛈️ FORT'; }
  document.getElementById('scPill').classList.toggle('on', Race.state.safetyCar.active);
}

function renderStandings() {
  if (!Race.state) return;
  const body = document.getElementById('standBody');
  body.innerHTML = '';

  Race.getStandings().forEach(car => {
    const tyre   = F1Data.tyres[car.tyre.compound];
    const isDnf  = car.status === 'dnf';
    const isLead = car.position === 1;
    const cond   = Math.round(car.tyre.condition * 100);
    const cc     = cond > 60 ? '#00e676' : cond > 30 ? '#ffea00' : '#ff4444';
    const last   = car.lapTimes.length > 0 ? fmtLap(car.lapTimes[car.lapTimes.length-1]) : '—';
    const gap    = isLead
      ? fmtTime(car.totalTime)
      : car.gap !== null ? '+'+car.gap.toFixed(1)+'s' : 'DNF';

    const badge = car.pitThisLap
      ? '<span class="pit-b">PIT</span>'
      : isDnf ? '<span class="dnf-b">DNF</span>' : '';

    const row = document.createElement('div');
    row.className = `s-row${isLead?' lead':''}${isDnf?' dnf':''}`;
    const pc = car.position<=3 ? `pos p${car.position}` : 'pos';
    row.innerHTML = `
      <div class="${pc}">${car.position}</div>
      <div class="dnum">${car.driver.number}</div>
      <div class="tbar" style="background:${car.team.color}"></div>
      <div>
        <div class="dname">${car.driver.name} ${badge}</div>
        <div class="dteam-s">${car.team.shortName}</div>
      </div>
      <div class="tyre-cell">
        <div class="tyre-dot" style="background:${tyre.color}"></div>
        <div>
          <div class="tyre-cond"><div class="tyre-bar" style="width:${cond}%;background:${cc}"></div></div>
          <div class="gap-cell ${isLead?'ldr':''}" style="margin-top:1px">${gap}</div>
        </div>
      </div>
      <div class="last-cell">${last}</div>
    `;
    body.appendChild(row);
  });
}

function addEvents(evs) {
  if (!evs || !evs.length) return;
  const log = document.getElementById('evLog');
  if (log.querySelector('div[style]')) log.innerHTML = '';
  evs.forEach(ev => {
    const d = document.createElement('div');
    d.className = `ev ev-${ev.type}`;
    d.innerHTML = `<span class="ev-lap">T.${ev.lap}</span><span>${ev.message}</span>`;
    log.insertBefore(d, log.firstChild);
  });
  while (log.children.length > 50) log.removeChild(log.lastChild);
}

function renderStrat() {
  if (!Race.state) return;
  const body = document.getElementById('stratBody');
  body.innerHTML = '';
  Race.getStandings().slice(0,5).forEach(car => {
    const row = document.createElement('div');
    row.className = 'strat-row';
    const pills = car.strategy.compounds.map((c,i) => {
      const t = F1Data.tyres[c];
      const active = i === car.currentCompoundIndex;
      return `<span class="cpill" style="color:${t.color};border:1px solid ${active?t.color:'transparent'}">${t.name}</span>`;
    }).join('');
    row.innerHTML = `<div class="strat-name">${car.driver.name}</div>${pills}`;
    body.appendChild(row);
  });
}

function showResults() {
  CR.stopAnim();
  const results = Race.assignPoints();
  document.getElementById('resSub').textContent = `Grand Prix de ${Race.state.circuit.name}`;
  const body = document.getElementById('resBody');
  body.innerHTML = '';
  results.forEach((r,i) => {
    const row = document.createElement('div');
    row.className = `res-row${i<3?' podium':''}`;
    const pc = i<3 ? `rpos p${i+1}` : 'rpos';
    const t  = r.status==='dnf'
      ? `DNF T.${r.dnfLap}`
      : i===0 ? fmtTime(r.totalTime) : '+'+r.gap.toFixed(3)+'s';
    row.innerHTML = `
      <div class="${pc}">${r.position}</div>
      <div class="rnum">${r.driver.number}</div>
      <div class="rname" style="color:${r.team.color}">${r.driver.firstName} ${r.driver.name}
        <div style="font-size:9px;color:var(--muted)">${r.team.name}</div></div>
      <div class="rpts">${r.points>0?r.points+' pts':'—'}</div>
      <div class="rtime">${t}</div>
    `;
    body.appendChild(row);
  });
  document.getElementById('resOverlay').style.display = 'flex';
}

function closeRes() { document.getElementById('resOverlay').style.display='none'; }

function resetRace() {
  closeRes();
  clearInterval(simInterval);
  CR.stopAnim();
  started = isPaused = false;
  document.getElementById('btnStart').disabled  = false;
  document.getElementById('btnPause').disabled  = true;
  document.getElementById('btnSkip').disabled   = true;
  document.getElementById('circSel').disabled   = false;
  document.getElementById('tLap').innerHTML     = 'Tour <b>0</b>/<span id="tTotal">—</span>';
  document.getElementById('svgLap').textContent = '0';
  document.getElementById('svgTotal').textContent = '—';
  document.getElementById('progFill').style.width = '0%';
  document.getElementById('standBody').innerHTML  = '';
  document.getElementById('evLog').innerHTML = '<div style="padding:10px;color:var(--muted);font-size:11px;text-align:center">En attente du départ…</div>';
  document.getElementById('stratBody').innerHTML  = '<div style="color:var(--muted);font-size:11px;text-align:center">—</div>';
  document.getElementById('trackG').innerHTML = '';
  document.getElementById('carsG').innerHTML  = '';
  document.getElementById('circLabel').textContent = 'Sélectionne un circuit';
}

// ── UTILS ─────────────────────────────────────
function fmtTime(s) {
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = Math.floor(s%60);
  if(h>0) return `${h}h${String(m).padStart(2,'0')}m${String(sec).padStart(2,'0')}s`;
  return `${m}m${String(sec).padStart(2,'0')}s`;
}
function fmtLap(s) {
  const m = Math.floor(s/60), sec = (s%60).toFixed(3);
  return `${m}:${String(parseFloat(sec).toFixed(3)).padStart(6,'0')}`;
}

initSel();
</script>
