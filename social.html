<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;0,900;1,700&family=Barlow:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#07070d">
<link rel="stylesheet" href="css/immersive-theme.css?v=20260508f">
<title>Social — F1 Manager</title>
<style>
*{box-sizing:border-box}
.wrap{max-width:680px;margin:0 auto;padding:0 14px 40px}

/* Cartes pilote */
.driver-social{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;position:relative;overflow:hidden}
.driver-social::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)}
.ds-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.ds-flag{font-size:24px}
.ds-info{flex:1}
.ds-name{font-family:var(--fh);font-weight:900;font-size:17px}
.ds-sub{font-size:11px;color:var(--muted);margin-top:2px}
.ds-number{font-family:var(--fh);font-weight:900;font-size:28px;color:var(--border)}

/* Jauges */
.gauges{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.gauge{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;text-align:center}
.gauge .g-val{font-family:var(--fh);font-weight:900;font-size:20px}
.gauge .g-lbl{font-family:var(--fh);font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-top:2px}
.gauge .g-bar{height:4px;border-radius:2px;margin-top:4px;overflow:hidden;background:rgba(255,255,255,.08)}
.gauge .g-fill{height:100%;border-radius:2px;transition:width .4s}

/* Messages en attente */
.pending-badge{position:absolute;top:14px;right:14px;background:var(--accent);color:#fff;font-family:var(--fh);font-size:10px;font-weight:900;padding:3px 8px;border-radius:10px}

/* Événements de discussion */
.discussion-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:8px;padding:12px 14px;margin-bottom:8px}
.dc-trigger{font-family:var(--fh);font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:6px}
.dc-text{font-size:13px;color:#ddd;line-height:1.5;margin-bottom:10px}
.dc-choices{display:flex;flex-direction:column;gap:6px}
.dc-choice{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 12px;cursor:pointer;font-family:var(--fh);font-size:12px;display:flex;justify-content:space-between;align-items:center;transition:all .15s}
.dc-choice:active{opacity:.7}
.dc-choice .cc-text{flex:1}
.dc-choice .cc-effect{font-size:10px;color:var(--muted);flex-shrink:0;margin-left:8px}
.dc-choice.positive{border-color:rgba(0,217,126,.3)}
.dc-choice.negative{border-color:rgba(232,0,61,.3)}
.dc-choice.neutral{border-color:rgba(245,200,66,.2)}

/* Historique */
.history-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.history-item:last-child{border:none}
.hi-icon{font-size:16px;flex-shrink:0;margin-top:2px}
.hi-text{font-size:12px;color:var(--muted);line-height:1.4}
.hi-date{font-family:var(--fh);font-size:10px;color:rgba(255,255,255,.2);margin-top:2px}

/* Toast */
.toast-social{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:8px;padding:10px 16px;font-family:var(--fh);font-size:13px;z-index:300;white-space:nowrap;opacity:0;transition:opacity .3s;pointer-events:none}
.toast-social.show{opacity:1}

/* Section titre */
.section{margin:14px 0}
.section-title{font-family:var(--fh);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* Atmosphère équipe */
.team-atmo{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px}
.ta-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);font-family:var(--fh);font-size:13px}
.ta-row:last-child{border:none}
.ta-row span{color:var(--muted);font-size:11px}
</style>
</head>
<body>
<div class="topbar">
  <span class="logo"><img src="img/f1.png" style="height:22px;vertical-align:middle;margin-right:4px" alt="F1"><span style="color:#ffffff !important">Manager</span></span>
  <a href="index.html" class="nav-back">← Accueil</a>
  <div class="top-pills" id="topPills"></div>
</div>

<div class="wrap">
  <div id="content"></div>
</div>

<div class="toast-social" id="toastSocial"></div>

<script src="js/data.js"></script>
<script src="js/save.js"></script>
<script src="js/theme.js"></script>

<script>
let save = Save.load();


// ── SYSTÈME DE DISCUSSION ─────────────────────────────────
function generateSocialEvents(save) {
  const events = [];
  const drivers = F1Data.drivers.filter(d => d.teamId === save.playerTeamId && !d.retired);
  const lastGP  = save.lastGpSummary;
  const race    = save.race || 0;
  const season  = save.season || 2025;
  const totalRaces = F1Data.circuits.length;

  // ── DISCUSSIONS PILOTES ──────────────────────────────────
  drivers.forEach(d => {
    const moral      = save.immersion?.driverMorale?.[d.id]?.value ?? 70;
    const confiance  = save.driverConfidence?.[d.id] ?? 50;
    const loyalty    = save.driverLoyalty?.[d.id] ?? 50;
    const contract   = save.contracts?.[d.id];
    const yearsLeft  = contract?.years ?? 2;
    const driverPts  = save.driverStandings?.[d.id] || 0;
    const allPts     = Object.values(save.driverStandings||{});
    const driverRank = allPts.filter(v=>v>driverPts).length + 1;
    const lastResult = lastGP?.playerResults?.find(r => r.driverName?.includes(d.name));

    const existing = (save.socialEvents||[]).find(e => e.driverId === d.id && !e.resolved);
    if (existing) return;

    // Victoire — gestion ego
    if (lastResult?.position === 1 && !save[`social_win_${d.id}_${race}`]) {
      events.push({ id:`win_${d.id}_${race}`, driverId:d.id, type:'victory', trigger:'Gestion post-victoire',
        text:`${d.firstName} ${d.name} est euphorique. En conférence de presse il a laissé entendre que les decisions strategies etaient parfois discutables. Comment reagissez-vous ?`,
        choices:[
          { text:"En public on celebre, en prive on recadre.", effect:{moral:+5,confiance:+5,loyalty:+3}, label:'🏆 Diplomatie', type:'positive' },
          { text:"Laisse-le profiter. Une victoire ca se celebre.", effect:{moral:+10,loyalty:+4,confiance:-2}, label:'🎉 Liberte', type:'neutral' },
          { text:"Ces declarations sont inacceptables. Je lui en parle.", effect:{moral:-5,confiance:+6,loyalty:-3}, label:'😤 Recadrage', type:'negative' },
        ]
      });
      save[`social_win_${d.id}_${race}`] = true;
    }
    // DNF recent
    else if (lastResult?.status === 'dnf' && !save[`social_dnf_${d.id}_${race}`]) {
      const msgs = [
        `${d.firstName} ${d.name} est dans le garage, casque encore sur la tete. L abandon pese lourd.`,
        `${d.firstName} ${d.name} n a pas dit un mot depuis l abandon. Les mecaniciens sont mal a l aise.`,
        `Abandon brutal pour ${d.firstName} ${d.name}. La frustration est visible. Comment gerez-vous ?`,
      ];
      events.push({ id:`dnf_${d.id}_${race}`, driverId:d.id, type:'dnf', trigger:'Abandon au dernier GP',
        text: msgs[Math.floor(Math.random()*msgs.length)],
        choices:[
          { text:"C etait mecanique, pas ta faute. On regle ca.", effect:{moral:+8,confiance:+5,loyalty:+3}, label:'🤝 Soutien', type:'positive' },
          { text:"Analysons les donnees. Tu aurais pu anticiper ?", effect:{moral:+2,confiance:+4}, label:'📊 Analyse', type:'neutral' },
          { text:"Ces abandons coutent cher aux sponsors. Sois prudent.", effect:{moral:-10,confiance:-6,loyalty:-3}, label:'😤 Pression', type:'negative' },
        ]
      });
      save[`social_dnf_${d.id}_${race}`] = true;
    }
    // Moral bas
    else if (moral < 35 && !save[`social_moral_${d.id}_${race}`]) {
      events.push({ id:`moralLow_${d.id}_${race}`, driverId:d.id, type:'moral', trigger:'Moral en baisse',
        text:`${d.firstName} ${d.name} semble distant. Ses reponses sont laconiques, ses debriefings bacles. Il faudrait lui parler.`,
        choices:[
          { text:"Je crois en toi. Tu es essentiel a ce projet.", effect:{moral:+14,confiance:+7,loyalty:+5}, label:'💪 Soutien', type:'positive' },
          { text:"Qu est-ce qui se passe ? Parle-moi franchement.", effect:{moral:+6,confiance:+10}, label:'🤝 Dialogue', type:'neutral' },
          { text:"Les resultats doivent s ameliorer ou on reconsidere.", effect:{moral:-8,confiance:-6,loyalty:-5,pace:+3}, label:'⚠️ Ultimatum', type:'negative' },
        ]
      });
      save[`social_moral_${d.id}_${race}`] = true;
    }
    // Contrat expire
    else if (yearsLeft <= 1 && !save[`social_contract_${d.id}_${season}`]) {
      events.push({ id:`contract_${d.id}_${season}`, driverId:d.id, type:'contract', trigger:'Contrat en fin de saison',
        text:`L agent de ${d.firstName} ${d.name} a contacte des equipes rivales. Il attend un signal de votre part.`,
        choices:[
          { text:"On te prolonge. Tu es central a notre projet.", effect:{moral:+12,confiance:+12,loyalty:+10,contractSignal:true}, label:'✅ Prolongation', type:'positive' },
          { text:"Je veux te garder, laisse-moi du temps.", effect:{moral:+3,confiance:+3,loyalty:-2}, label:'⏳ Patience', type:'neutral' },
          { text:"On evalue toutes les options. Rien n est decide.", effect:{moral:-8,confiance:-10,loyalty:-8}, label:'❄️ Ambiguite', type:'negative' },
        ]
      });
      save[`social_contract_${d.id}_${season}`] = true;
    }
    // Podium
    else if (lastResult?.position <= 3 && lastResult?.position && !save[`social_podium_${d.id}_${race}`]) {
      events.push({ id:`podium_${d.id}_${race}`, driverId:d.id, type:'podium', trigger:`Podium P${lastResult.position}`,
        text:`${d.firstName} ${d.name} rayonne apres son P${lastResult.position}. C est le moment d entretenir cette dynamique.`,
        choices:[
          { text:"Tu as ete parfait. Ce podium est entierement merite.", effect:{moral:+10,confiance:+7,loyalty:+5}, label:'🏆 Celebration', type:'positive' },
          { text:"Excellent. Maintenant on vise la victoire.", effect:{moral:+6,confiance:+5,pace:+2}, label:'🎯 Ambition', type:'neutral' },
          { text:"Bonne course mais le rythme en fin etait insuffisant.", effect:{moral:-3,confiance:+2,pace:+3}, label:'📊 Critique', type:'negative' },
        ]
      });
      save[`social_podium_${d.id}_${race}`] = true;
    }
    // Performance correcte
    else if (lastResult?.position <= 8 && lastResult?.position && !save[`social_good_${d.id}_${race}`]) {
      events.push({ id:`good_${d.id}_${race}`, driverId:d.id, type:'performance', trigger:`P${lastResult.position} au dernier GP`,
        text:`${d.firstName} ${d.name} est satisfait de son P${lastResult.position}. Il cherche votre validation avant le prochain GP.`,
        choices:[
          { text:"Tres bonne course. L equipe est fiere de toi.", effect:{moral:+7,confiance:+5,loyalty:+3}, label:'👍 Validation', type:'positive' },
          { text:"Points pris, c est l essentiel. On progresse.", effect:{moral:+3,confiance:+3}, label:'📈 Pragmatisme', type:'neutral' },
          { text:"On meritait mieux. Des erreurs a analyser.", effect:{moral:-4,confiance:-2,pace:+2}, label:'🔍 Exigence', type:'negative' },
        ]
      });
      save[`social_good_${d.id}_${race}`] = true;
    }
    // Rivalite interne
    else if (drivers.length >= 2 && race > 5 && !save[`social_rivalry_${season}`] && Math.random() < 0.3) {
      const d2 = drivers.find(x => x.id !== d.id);
      if (d2) {
        events.push({ id:`rivalry_${season}_${race}`, driverId:d.id, type:'rivalry', trigger:'Tension en interne',
          text:`${d.firstName} ${d.name} estime que ${d2.firstName} ${d2.name} recoit un traitement de faveur sur le setup et la strategie.`,
          choices:[
            { text:"Les deux pilotes sont traites a egalite. Je te le garantis.", effect:{moral:+8,confiance:+6,loyalty:+4}, label:'⚖️ Equite', type:'positive' },
            { text:"On analyse et on clarifie ensemble.", effect:{moral:+4,confiance:+5}, label:'📊 Transparence', type:'neutral' },
            { text:"C est moi qui decide. Concentre-toi sur ta course.", effect:{moral:-8,confiance:-8,loyalty:-5,pace:+3}, label:'✊ Autorite', type:'negative' },
          ]
        });
        save[`social_rivalry_${season}`] = true;
      }
    }
    // Anniversaire
    else if (!save[`social_bday_${d.id}_${season}`] && d.age && (race % 5 === 2)) {
      events.push({ id:`bday_${d.id}_${season}`, driverId:d.id, type:'birthday', trigger:'Anniversaire',
        text:`C est l anniversaire de ${d.firstName} ${d.name} ce week-end. Un petit geste humain peut faire beaucoup.`,
        choices:[
          { text:"Message personnel + cadeau de l equipe.", effect:{moral:+10,confiance:+6,loyalty:+8}, label:'🎂 Celebration', type:'positive' },
          { text:"Un mot rapide. Simple mais sincere.", effect:{moral:+5,confiance:+4,loyalty:+4}, label:'👋 Discret', type:'neutral' },
          { text:"On a une course a preparer.", effect:{moral:-3,confiance:-2,loyalty:-3}, label:'😐 Neutre', type:'negative' },
        ]
      });
      save[`social_bday_${d.id}_${season}`] = true;
    }
    // Demande augmentation
    else if (race > 10 && driverPts > 40 && !save[`social_salary_${d.id}_${season}`] && Math.random() < 0.4) {
      events.push({ id:`salary_${d.id}_${season}`, driverId:d.id, type:'salary', trigger:'Discussion financiere',
        text:`Avec ${driverPts} pts, l agent de ${d.firstName} ${d.name} estime que son salaire ne reflete plus sa valeur.`,
        choices:[
          { text:"Tu merites une revalorisation. On trouve un accord.", effect:{moral:+10,confiance:+8,loyalty:+6}, label:'💰 Accord', type:'positive' },
          { text:"On en parle en fin de saison.", effect:{moral:+2,confiance:+2,loyalty:-2}, label:'⏳ Report', type:'neutral' },
          { text:"Ton contrat court jusqu au bout. On verra apres.", effect:{moral:-8,confiance:-8,loyalty:-6}, label:'🚫 Refus', type:'negative' },
        ]
      });
      save[`social_salary_${d.id}_${season}`] = true;
    }
    // Rumeur top team
    else if (driverPts > 60 && !save[`social_rumor_${d.id}_${season}`] && Math.random() < 0.3) {
      const topTeams = ['Ferrari','McLaren','Red Bull','Mercedes'];
      const topTeam  = topTeams[Math.floor(Math.random()*topTeams.length)];
      events.push({ id:`rumor_${d.id}_${season}`, driverId:d.id, type:'rumor', trigger:'Rumeur de transfert',
        text:`La presse annonce que ${topTeam} s interesse a ${d.firstName} ${d.name}. Il attend votre reaction.`,
        choices:[
          { text:"Tu es intransfenable. On prolonge et on augmente.", effect:{moral:+12,confiance:+10,loyalty:+12}, label:'💎 Engagement', type:'positive' },
          { text:"Je comprends l interet mais notre projet est solide.", effect:{moral:+5,confiance:+5,loyalty:+4}, label:'🤝 Discussion', type:'neutral' },
          { text:"S il veut partir c est son choix.", effect:{moral:-12,confiance:-12,loyalty:-15}, label:'🚪 Indifference', type:'negative' },
        ]
      });
      save[`social_rumor_${d.id}_${season}`] = true;
    }
    // Plainte voiture
    else if (moral < 55 && !save[`social_carcomp_${d.id}_${race}`] && Math.random() < 0.3) {
      events.push({ id:`carcomp_${d.id}_${race}`, driverId:d.id, type:'complaint', trigger:'Insatisfaction voiture',
        text:`${d.firstName} ${d.name} exprime ses frustrations : la voiture manque d equilibre et il peine a extraire le maximum.`,
        choices:[
          { text:"On prend ca en compte. Reunion technique cette semaine.", effect:{moral:+8,confiance:+6}, label:'🔧 Action', type:'positive' },
          { text:"La voiture s ameliore. Encore un peu de patience.", effect:{moral:+2,confiance:+2}, label:'⏳ Patience', type:'neutral' },
          { text:"C est le mieux avec ce budget. Adapte-toi.", effect:{moral:-10,confiance:-8,loyalty:-4}, label:'😤 Dure realite', type:'negative' },
        ]
      });
      save[`social_carcomp_${d.id}_${race}`] = true;
    }
    // Blessure legere
    else if (!save[`social_injury_${d.id}_${season}`] && race > 5 && Math.random() < 0.12) {
      events.push({ id:`injury_${d.id}_${season}`, driverId:d.id, type:'injury', trigger:'Legere blessure',
        text:`${d.firstName} ${d.name} a signale une douleur cervicale. Rien de grave mais le medecin recommande du repos.`,
        choices:[
          { text:"Sa sante d abord. On evalue au jour le jour.", effect:{moral:+10,confiance:+8,loyalty:+8}, label:'❤️ Sante', type:'positive' },
          { text:"Traitement intensif et on l aligne si possible.", effect:{moral:+3,confiance:+3,loyalty:+2}, label:'💊 Traitement', type:'neutral' },
          { text:"Il roule sauf avis contraire. On a besoin de lui.", effect:{moral:-8,confiance:-6,loyalty:-5,pace:-2}, label:'⚠️ Risque', type:'negative' },
        ]
      });
      save[`social_injury_${d.id}_${season}`] = true;
    }
    // Demande simulateur
    else if (!save[`social_sim_${d.id}_${season}`] && race > 2 && race < 18 && Math.random() < 0.25) {
      events.push({ id:`sim_${d.id}_${season}`, driverId:d.id, type:'simulator', trigger:'Demande simulateur',
        text:`${d.firstName} ${d.name} demande plus de temps simulateur pour travailler son style de freinage.`,
        choices:[
          { text:"Accorde. On organise deux jours a l usine.", effect:{moral:+7,confiance:+5,pace:+2}, label:'✅ Accorde', type:'positive' },
          { text:"Une journee seulement. Le calendrier est serre.", effect:{moral:+3,confiance:+3,pace:+1}, label:'⏳ Partiel', type:'neutral' },
          { text:"Le simulateur est occupe. On verra apres.", effect:{moral:-4,confiance:-3}, label:'❌ Refuse', type:'negative' },
        ]
      });
      save[`social_sim_${d.id}_${season}`] = true;
    }
    // Demande statut N1
    else if (driverRank <= 5 && yearsLeft >= 2 && !save[`social_n1_${d.id}_${season}`] && Math.random() < 0.25) {
      events.push({ id:`n1_${d.id}_${season}`, driverId:d.id, type:'number1', trigger:'Demande statut numero 1',
        text:`${d.firstName} ${d.name} reclame le statut de premier pilote. Il veut la priorite setup et strategie.`,
        choices:[
          { text:"Tu l as merite. Tu es notre pilote numero 1.", effect:{moral:+12,confiance:+10,loyalty:+8,pace:+2}, label:'⭐ Accorde', type:'positive' },
          { text:"Les deux pilotes restent a egalite.", effect:{moral:-3,confiance:+2}, label:'⚖️ Egalite', type:'neutral' },
          { text:"Les resultats decidement. Prouve-le sur la piste.", effect:{moral:-5,confiance:-3,loyalty:-4,pace:+3}, label:'🏁 Merite', type:'negative' },
        ]
      });
      save[`social_n1_${d.id}_${season}`] = true;
    }
    // Fatigue fin de saison
    else if (race >= totalRaces - 4 && !save[`social_fatigue_${d.id}_${season}`]) {
      events.push({ id:`fatigue_${d.id}_${season}`, driverId:d.id, type:'fatigue', trigger:'Fatigue fin de saison',
        text:`${d.firstName} ${d.name} accuse le coup du calendrier. Apres ${race} GP, la fatigue se lit sur son visage.`,
        choices:[
          { text:"Prends soin de toi. On gere ensemble ces derniers GP.", effect:{moral:+8,confiance:+6,loyalty:+4}, label:'❤️ Bienveillance', type:'positive' },
          { text:"Encore quelques courses. Tu peux le faire.", effect:{moral:+4,confiance:+3}, label:'💪 Motivation', type:'neutral' },
          { text:"La fatigue ne peut pas etre une excuse.", effect:{moral:-6,confiance:-4,pace:+2}, label:'😤 Exigence', type:'negative' },
        ]
      });
      save[`social_fatigue_${d.id}_${season}`] = true;
    }
    // Mi-saison
    else if (race === Math.floor(totalRaces/2) && !save[`social_midseason_${d.id}_${season}`]) {
      events.push({ id:`midseason_${d.id}_${season}`, driverId:d.id, type:'midseason', trigger:'Point de mi-saison',
        text:`Mi-saison. ${d.firstName} ${d.name} est P${driverRank} avec ${driverPts} pts. Conversation de fond sur la suite.`,
        choices:[
          { text:"Tu es exactement ou on voulait. Continue.", effect:{moral:+8,confiance:+6,loyalty:+4}, label:'✅ Satisfait', type:'positive' },
          { text:"Objectif : doubler les points en seconde partie.", effect:{moral:+4,confiance:+4,pace:+2}, label:'🎯 Objectif', type:'neutral' },
          { text:"Franchement, on attendait mieux de ta part.", effect:{moral:-10,confiance:-7,pace:+4}, label:'😤 Deception', type:'negative' },
        ]
      });
      save[`social_midseason_${d.id}_${season}`] = true;
    }
  });

  // ── DISCUSSIONS INGENIEURS ───────────────────────────────
  const eng = save.staff?.find(s => s.role === 'race_engineer' || s.specialty === 'race_engineer');
  const engName = eng ? (eng.firstName ? `${eng.firstName} ${eng.name}` : eng.name) : 'Votre ingenieur';
  const engExisting = (save.socialEvents||[]).find(e => e.driverId === 'engineer' && !e.resolved);

  if (!engExisting) {
    const circuits = F1Data.circuits || [];
    const circuit  = circuits[race % Math.max(1, circuits.length)];

    if (race > 0 && !save[`eng_tyres_${race}_${season}`] && Math.random() < 0.45) {
      const highDeg = circuit?.tyreDegradation > 1.2;
      events.push({ id:`eng_tyres_${race}_${season}`, driverId:'engineer', type:'engineer', trigger:`Briefing pneus`,

        text:`Votre responsable technique signale de la fatigue au sein de l equipe apres un triple header. Un moment de cohesion est suggere avant les prochains GP.`,
        choices:[
          { text:"On organise un diner d equipe. On prend soin des gens.", effect:{moral:+5,tokenBonus:0,pace:+1}, label:'🍽️ Cohesion', type:'positive' },
          { text:"Une journee de repos supplementaire entre deux GP.", effect:{moral:+3,pace:+1}, label:'😴 Repos', type:'neutral' },
          { text:"On a un championnat a courir. Le repos attendra.", effect:{moral:-4,pace:-1}, label:'📋 Focus', type:'negative' },
        ]
      });
      save[`eng2_team_${race}_${season}`] = true;
    }
    // Analyse rivaux
    else if (!save[`eng2_rival_${race}_${season}`] && race > 3 && Math.random() < 0.35) {
      const rivals = F1Data.teams.filter(t => t.id !== save.playerTeamId).sort((a,b)=>b.performance-a.performance);
      const rival  = rivals[0];
      events.push({ id:`eng2_rival_${race}_${season}`, driverId:'engineer2', type:'engineer', trigger:'Analyse rivaux directs',
        text:`L equipe data a analyse les telemetries de ${rival?.name||'vos rivaux'}. Un point faible specifique a ete identifie que vous pouvez exploiter.`,
        choices:[
          { text:"On oriente notre setup pour exploiter cette faiblesse.", effect:{pace:+3,confiance:+4}, label:'🎯 Exploitation', type:'positive' },
          { text:"On note et on adapte notre strategie de course.", effect:{pace:+1,confiance:+2}, label:'📊 Adaptation', type:'neutral' },
          { text:"On se concentre sur nous. Les rivaux s occupent d eux.", effect:{pace:0,moral:+2}, label:'🔵 Focus interne', type:'negative' },
        ]
      });
      save[`eng2_rival_${race}_${season}`] = true;
    }
    // Incident technique mineur
    else if (!save[`eng2_minor_${race}_${season}`] && Math.random() < 0.3) {
      const issues = [
        "Une legere fuite hydraulique a ete detectee. Rien de critique mais ca demande une attention.",
        "Le DRS de la voiture 1 presente une anomalie d ouverture. Reparable en 2 heures.",
        "Des vibrations inhabituelles ont ete detectees sur la suspension avant gauche.",
      ];
      const issue = issues[Math.floor(Math.random()*issues.length)];
      events.push({ id:`eng2_minor_${race}_${season}`, driverId:'engineer2', type:'engineer', trigger:'Incident technique mineur',
        text:`${issue} ${eng2Name} attend votre validation pour lancer la procedure.`,
        choices:[
          { text:"On traite ca immediatement. Tolerence zero sur la technique.", effect:{confiance:+4,dnfRisk:false}, label:'🔧 Immediat', type:'positive' },
          { text:"On surveille et on intervient si ca empire.", effect:{confiance:+2}, label:'👁️ Surveillance', type:'neutral' },
          { text:"On n a pas le temps. On gere apres les qualifs.", effect:{dnfRisk:true,confiance:-2}, label:'⏰ Plus tard', type:'negative' },
        ]
      });
      save[`eng2_minor_${race}_${season}`] = true;
    }
    // Opportunite test jeune pilote
    else if (!save[`eng2_junior_${season}`] && race < 18 && save.immersion?.juniorAcademy?.length > 0 && Math.random() < 0.3) {
      const junior = save.immersion.juniorAcademy[0];
      events.push({ id:`eng2_junior_${season}`, driverId:'engineer2', type:'engineer', trigger:'Opportunite jeune pilote',
        text:`${junior?.firstName||'Un junior'} ${junior?.name||''} de l academie demande une session de debriefing avec l equipe senior. Cela peut accelerer son developpement.`,
        choices:[
          { text:"On integre le junior au debriefing complet. Investissement long terme.", effect:{tokenBonus:+1,moral:+3}, label:'🌱 Formation', type:'positive' },
          { text:"Une session limitee. On garde nos donnees sensibles.", effect:{tokenBonus:0,moral:+2}, label:'⚖️ Limite', type:'neutral' },
          { text:"Pas le moment. On reste concentres sur le GP actuel.", effect:{moral:+0}, label:'❌ Pas maintenant', type:'negative' },
        ]
      });
      save[`eng2_junior_${season}`] = true;
    }
  }

  return events;
}


function applyChoice(event, choice) {
  const e = choice.effect;
  const d = F1Data.drivers.find(x => x.id === event.driverId);
  const dName = d ? `${d.firstName} ${d.name}` : 'Pilote';

  // Moral
  if (e.moral) {
    if (!save.immersion) save.immersion = {};
    if (!save.immersion.driverMorale) save.immersion.driverMorale = {};
    if (!save.immersion.driverMorale[event.driverId]) save.immersion.driverMorale[event.driverId] = { value: 70 };
    const cur = save.immersion.driverMorale[event.driverId].value || 70;
    save.immersion.driverMorale[event.driverId].value = Math.max(0, Math.min(100, cur + e.moral));
  }

  // Confiance
  if (!save.driverConfidence) save.driverConfidence = {};
  if (e.confiance) {
    const cur = save.driverConfidence[event.driverId] || 50;
    save.driverConfidence[event.driverId] = Math.max(0, Math.min(100, cur + e.confiance));
  }

  // Loyauté
  if (!save.driverLoyalty) save.driverLoyalty = {};
  if (e.loyalty) {
    const cur = save.driverLoyalty[event.driverId] || 50;
    save.driverLoyalty[event.driverId] = Math.max(0, Math.min(100, cur + e.loyalty));
  }

  // Signal contrat
  if (e.contractSignal) {
    save[`contractSignal_${event.driverId}`] = true;
  }

  // Pace direct — stocké temporairement sur le save pour ce GP
  if (e.pace && event.driverId !== 'engineer') {
    if (!save.driverEffects) save.driverEffects = {};
    if (!save.driverEffects[event.driverId]) save.driverEffects[event.driverId] = {};
    const cur = save.driverEffects[event.driverId].paceDelta || 0;
    save.driverEffects[event.driverId].paceDelta = Math.max(-5, Math.min(5, cur + e.pace));
    save.driverEffects[event.driverId].paceExpiry = (save.race||0) + 2; // dure 2 GP
  }

  // Pénalité grille — stockée pour le prochain GP
  if (e.penaltyGrid) {
    if (!save.gridPenalties) save.gridPenalties = {};
    const driverKey = event.driverId;
    save.gridPenalties[driverKey] = (save.gridPenalties[driverKey]||0) + 5;
    if (save.news) save.news.push({ icon:'⚠️', category:'technique',
      title:'Pénalité grille', text:'Changement de pièce — pénalité de 5 places sur la grille au prochain GP.' });
  }

  // Risque DNF — augmente légèrement la probabilité d'abandon ce GP
  if (e.dnfRisk) {
    save._dnfRiskBoost = (save._dnfRiskBoost||0) + 0.04; // +4% de risque DNF
  }

  // Usure moteur accélérée
  if (e.engineWear) {
    save._engineWear = (save._engineWear||0) + e.engineWear;
    if ((save._engineWear||0) >= 5 && !save._enginePenaltyWarned) {
      save._enginePenaltyWarned = true;
      if (save.news) save.news.push({ icon:'⚠️', category:'technique',
        title:'Avertissement moteur', text:"Usure moteur élevée. Une pénalité moteur est possible dans les 3 prochains GP." });
    }
  }

  // Bonus qualif — setup orienté qualif
  if (e.qualiBonusPct) {
    save.weekendSetup = 'qualify';
    if (!save.driverEffects) save.driverEffects = {};
    Object.keys(save.driverEffects||{}).forEach(id => {
      save.driverEffects[id].qualBonus = e.qualiBonusPct;
    });
  }

  // Effets ingénieur
  if (e.tokenBonus && e.tokenBonus > 0) {
    save.tokens = (save.tokens||0) + e.tokenBonus;
  }
  if (e.rdBonus) {
    if (!save.carDev) save.carDev = {};
    if (!save.carDev[e.rdBonus]) save.carDev[e.rdBonus] = { level: 70, done: [], pending: [] };
    save.carDev[e.rdBonus].level = Math.min(100, (save.carDev[e.rdBonus].level||70) + 1);
  }
  if (e.setupBonus) {
    save.weekendSetup = e.setupBonus;
  }
  if (e.weatherBonus && e.weatherBonus > 0) {
    const drivers2 = F1Data.drivers.filter(d => d.teamId === save.playerTeamId && !d.retired);
    drivers2.forEach(d => {
      if (!save.immersion) save.immersion = {};
      if (!save.immersion.driverMorale) save.immersion.driverMorale = {};
      if (!save.immersion.driverMorale[d.id]) save.immersion.driverMorale[d.id] = { value: 70 };
      const cur = save.immersion.driverMorale[d.id].value || 70;
      save.immersion.driverMorale[d.id].value = Math.min(100, cur + e.weatherBonus);
    });
  }
  if (e.reliabilityBonus && e.reliabilityBonus > 0) {
    // Améliore la fiabilité de la voiture temporairement
    if (!save.carDev) save.carDev = {};
    if (!save.carDev.reliability) save.carDev.reliability = { level: 70, done: [], pending: [] };
    save.carDev.reliability.level = Math.min(100, (save.carDev.reliability.level||70) + e.reliabilityBonus);
  }
  if (e.pace && e.pace !== 0) {
    // Impact temporaire sur les pilotes de l'équipe
    const drivers3 = F1Data.drivers.filter(d => d.teamId === save.playerTeamId && !d.retired);
    if (!save.engineModeBonus) save.engineModeBonus = {};
    drivers3.forEach(d => { save.engineModeBonus[d.id] = (save.engineModeBonus[d.id]||0) + e.pace; });
  }
  if (e.upgradeNow) {
    // Signal d'installation immédiate — pris en compte dans rd.html
    save._upgradeNowSignal = true;
  }
  if (e.dnfRisk) {
    // Augmente légèrement le risque de DNF pour le prochain GP
    save._dnfRiskBonus = (save._dnfRiskBonus || 0) + 0.05;
  }

  // Marquer comme résolu
  if (!save.socialEvents) save.socialEvents = [];
  const existing = save.socialEvents.find(ev => ev.id === event.id);
  if (existing) {
    existing.resolved = true;
    existing.read = true;
    existing.choiceMade = choice.text;
  }

  // Ajouter à l'historique social
  if (!save.socialHistory) save.socialHistory = [];
  save.socialHistory.unshift({
    date: new Date().toISOString(),
    driverName: dName,
    trigger: event.trigger,
    choice: choice.text,
    effects: e,
    race: save.race || 0,
  });
  save.socialHistory = save.socialHistory.slice(0, 30);

  // News
  if (!save.news) save.news = [];
  save.news.push({
    icon: '💬', category: 'social',
    title: `Discussion — ${dName}`,
    text: `${event.trigger} : "${choice.text.substring(0, 60)}..."`,
    season: save.season, race: save.race,
  });

  Save.save(save);
  save = Save.load();

  showToast(`✅ ${dName} — ${choice.label}`);
  render();
}

function showToast(msg) {
  const t = document.getElementById('toastSocial');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function moralColor(v) { return v>=70?'var(--green)':v>=40?'var(--gold)':'var(--accent)'; }
function moralLabel(v) { return v>=70?'En forme':v>=40?'Correct':'Bas'; }

function render() {
  if (!save?.playerTeamId) {
    document.getElementById('content').innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted)">Aucune carrière. <a href="index.html" style="color:var(--accent)">Retour</a></div>';
    return;
  }

  const drivers  = F1Data.drivers.filter(d => d.teamId === save.playerTeamId && !d.retired);
  const season   = save.season || 2025;
  const race     = save.race || 0;
  const myTeam   = F1Data.teams.find(t => t.id === save.playerTeamId);

  // Générer les nouveaux événements sociaux
  const newEvents = generateSocialEvents(save);
  if (!save.socialEvents) save.socialEvents = [];
  newEvents.forEach(ev => {
    if (!save.socialEvents.find(e => e.id === ev.id)) {
      save.socialEvents.push({ ...ev, read: false, resolved: false });
    }
  });
  if (newEvents.length) Save.save(save);

  // Topbar
  const pending = save.socialEvents.filter(e => !e.resolved && !e.read).length;
  document.getElementById('topPills').innerHTML = `
    <span style="font-family:var(--fh);font-size:11px;color:var(--muted)">Saison ${season}</span>
    ${pending > 0 ? `<span style="font-family:var(--fh);font-size:11px;padding:3px 8px;background:rgba(232,0,61,.15);border:1px solid rgba(232,0,61,.3);border-radius:4px;color:var(--accent)">${pending} message${pending>1?'s':''}</span>` : ''}`;

  // Atmosphère équipe
  const avgMoral = Math.round(drivers.reduce((s,d) => s + (save.immersion?.driverMorale?.[d.id]?.value ?? 70), 0) / Math.max(1, drivers.length));
  const avgConf  = Math.round(drivers.reduce((s,d) => s + (save.driverConfidence?.[d.id] ?? 50), 0) / Math.max(1, drivers.length));
  const avgLoy   = Math.round(drivers.reduce((s,d) => s + (save.driverLoyalty?.[d.id] ?? 50), 0) / Math.max(1, drivers.length));
  const atmoLabel = avgMoral >= 70 && avgConf >= 60 ? '🔥 Excellente' : avgMoral >= 50 ? '👍 Bonne' : '😟 Tendue';

  // Discussions en attente
  const pendingEvents = save.socialEvents.filter(e => !e.resolved);

  let html = `
    <div class="section">
      <div class="section-title">🏢 Atmosphère équipe</div>
      <div class="team-atmo">
        <div class="ta-row"><span>Ambiance générale</span><b style="color:${moralColor(avgMoral)}">${atmoLabel}</b></div>
        <div class="ta-row"><span>Moral moyen</span><b style="color:${moralColor(avgMoral)}">${avgMoral}/100</b></div>
        <div class="ta-row"><span>Confiance moyenne</span><b style="color:${moralColor(avgConf)}">${avgConf}/100</b></div>
        <div class="ta-row"><span>Loyauté moyenne</span><b style="color:${moralColor(avgLoy)}">${avgLoy}/100</b></div>
      </div>
    </div>`;

  // Discussions en attente
  if (pendingEvents.length) {
    html += `<div class="section"><div class="section-title">💬 Discussions en attente (${pendingEvents.length})</div>`;
    pendingEvents.forEach(ev => {
      const d = F1Data.drivers.find(x => x.id === ev.driverId);
      html += `<div class="discussion-card">
        <div class="dc-trigger">${ev.trigger}</div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span style="font-size:18px">${ev.type==='engineer'?'🔧':(d?.flag||'🏁')}</span>
          <span style="font-family:var(--fh);font-weight:700">${ev.type==='engineer'?'Ingénieur de piste':(d?.firstName||'')+' '+(d?.name||ev.driverId)}</span>
        </div>
        <div class="dc-text">${ev.text}</div>
        <div class="dc-choices">
          ${ev.choices.map((c,i) => `
            <div class="dc-choice ${c.type}" onclick='handleChoice(${JSON.stringify(ev.id)}, ${i})'>
              <span class="cc-text">${c.text}</span>
              <span class="cc-effect">${c.label}</span>
            </div>
          `).join('')}
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  // Fiches pilotes
  html += `<div class="section"><div class="section-title">🏎️ Vos pilotes</div>`;
  drivers.forEach(d => {
    const moral    = save.immersion?.driverMorale?.[d.id]?.value ?? 70;
    const confiance= save.driverConfidence?.[d.id] ?? 50;
    const loyalty  = save.driverLoyalty?.[d.id] ?? 50;
    const contract = save.contracts?.[d.id];
    const years    = contract?.years ?? 2;
    const pts      = save.driverStandings?.[d.id] || 0;

    html += `<div class="driver-social" style="--accent:${F1Data.teams.find(t=>t.id===d.teamId)?.color||'#0090FF'}">
      <div class="ds-header">
        <div class="ds-flag">${d.flag||'🏁'}</div>
        <div class="ds-info">
          <div class="ds-name">${d.firstName} ${d.name}</div>
          <div class="ds-sub">${d.age} ans · Contrat : ${years} an${years!==1?'s':''} · ${pts} pts championship</div>
        </div>
        <div class="ds-number">${d.number}</div>
      </div>
      <div class="gauges">
        <div class="gauge">
          <div class="g-val" style="color:${moralColor(moral)}">${moral}</div>
          <div class="g-lbl">Moral</div>
          <div class="g-bar"><div class="g-fill" style="width:${moral}%;background:${moralColor(moral)}"></div></div>
        </div>
        <div class="gauge">
          <div class="g-val" style="color:${moralColor(confiance)}">${confiance}</div>
          <div class="g-lbl">Confiance</div>
          <div class="g-bar"><div class="g-fill" style="width:${confiance}%;background:${moralColor(confiance)}"></div></div>
        </div>
        <div class="gauge">
          <div class="g-val" style="color:${moralColor(loyalty)}">${loyalty}</div>
          <div class="g-lbl">Loyauté</div>
          <div class="g-bar"><div class="g-fill" style="width:${loyalty}%;background:${moralColor(loyalty)}"></div></div>
        </div>
      </div>
    </div>`;
  });
  html += `</div>`;

  // Historique des discussions
  const history = (save.socialHistory || []).slice(0, 10);
  if (history.length) {
    html += `<div class="section"><div class="section-title">📋 Historique</div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px">
        ${history.map(h => `
          <div class="history-item">
            <div class="hi-icon">💬</div>
            <div>
              <div class="hi-text"><b style="color:var(--text)">${h.driverName}</b> — ${h.trigger}<br><span style="color:rgba(255,255,255,.4)">"${h.choice.substring(0,50)}..."</span></div>
              <div class="hi-date">GP ${h.race || '—'} · Saison ${save.season||2025}</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>`;
  }

  document.getElementById('content').innerHTML = html;
}

function handleChoice(eventId, choiceIndex) {
  const ev = save.socialEvents.find(e => e.id === eventId);
  if (!ev) return;
  const choice = ev.choices[choiceIndex];
  if (!choice) return;
  applyChoice(ev, choice);
}

render();

</script>
</body>
</html>
