<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;0,900;1,700&family=Barlow:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#07070d">
<link rel="stylesheet" href="css/immersive-theme.css?v=20260508f">
<title>Social — F1 Manager</title>
<style>
*{box-sizing:border-box}
.wrap{max-width:680px;margin:0 auto;padding:0 14px 40px}

/* Cartes pilote */
.driver-social{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;position:relative;overflow:hidden}
.driver-social::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)}
.ds-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.ds-flag{font-size:24px}
.ds-info{flex:1}
.ds-name{font-family:var(--fh);font-weight:900;font-size:17px}
.ds-sub{font-size:11px;color:var(--muted);margin-top:2px}
.ds-number{font-family:var(--fh);font-weight:900;font-size:28px;color:var(--border)}

/* Jauges */
.gauges{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.gauge{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;text-align:center}
.gauge .g-val{font-family:var(--fh);font-weight:900;font-size:20px}
.gauge .g-lbl{font-family:var(--fh);font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-top:2px}
.gauge .g-bar{height:4px;border-radius:2px;margin-top:4px;overflow:hidden;background:rgba(255,255,255,.08)}
.gauge .g-fill{height:100%;border-radius:2px;transition:width .4s}

/* Messages en attente */
.pending-badge{position:absolute;top:14px;right:14px;background:var(--accent);color:#fff;font-family:var(--fh);font-size:10px;font-weight:900;padding:3px 8px;border-radius:10px}

/* Événements de discussion */
.discussion-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:8px;padding:12px 14px;margin-bottom:8px}
.dc-trigger{font-family:var(--fh);font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:6px}
.dc-text{font-size:13px;color:#ddd;line-height:1.5;margin-bottom:10px}
.dc-choices{display:flex;flex-direction:column;gap:6px}
.dc-choice{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 12px;cursor:pointer;font-family:var(--fh);font-size:12px;display:flex;justify-content:space-between;align-items:center;transition:all .15s}
.dc-choice:active{opacity:.7}
.dc-choice .cc-text{flex:1}
.dc-choice .cc-effect{font-size:10px;color:var(--muted);flex-shrink:0;margin-left:8px}
.dc-choice.positive{border-color:rgba(0,217,126,.3)}
.dc-choice.negative{border-color:rgba(232,0,61,.3)}
.dc-choice.neutral{border-color:rgba(245,200,66,.2)}

/* Historique */
.history-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.history-item:last-child{border:none}
.hi-icon{font-size:16px;flex-shrink:0;margin-top:2px}
.hi-text{font-size:12px;color:var(--muted);line-height:1.4}
.hi-date{font-family:var(--fh);font-size:10px;color:rgba(255,255,255,.2);margin-top:2px}

/* Toast */
.toast-social{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:8px;padding:10px 16px;font-family:var(--fh);font-size:13px;z-index:300;white-space:nowrap;opacity:0;transition:opacity .3s;pointer-events:none}
.toast-social.show{opacity:1}

/* Section titre */
.section{margin:14px 0}
.section-title{font-family:var(--fh);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* Atmosphère équipe */
.team-atmo{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px}
.media-effects{background:linear-gradient(135deg,rgba(0,144,255,.08),rgba(255,255,255,.02));border:1px solid rgba(0,144,255,.25);border-radius:10px;padding:12px 14px;margin-bottom:14px}
.me-row{display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);font-family:var(--fh);font-size:12px}
.me-row:last-child{border:none}.me-row span{color:var(--muted)}
.ta-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);font-family:var(--fh);font-size:13px}
.ta-row:last-child{border:none}
.ta-row span{color:var(--muted);font-size:11px}
</style>
</head>
<body>
<div class="topbar">
  <span class="logo"><img src="img/f1.png" style="height:22px;vertical-align:middle;margin-right:4px" alt="F1"><span style="color:#ffffff !important">Manager</span></span>
  <a href="index.html" class="nav-back">← Accueil</a>
  <div class="top-pills" id="topPills"></div>
</div>

<div class="wrap">
  <div id="content"></div>
</div>

<div class="toast-social" id="toastSocial"></div>

<script src="js/data.js"></script>
<script src="js/save.js"></script>
<script src="js/theme.js"></script>

<script>
let save = Save.load();

//  MÉMOIRE DES INTERACTIONS 
// Analyse l historique pour adapter le ton et les conséquences
function getSocialMemory(save, driverId) {
  const driverName = F1Data.drivers.find(d=>d.id===driverId)?.name || '';
  const history = (save.socialHistory || []).filter(h => h.driverName?.includes(driverName));
  const lastChoices = history.slice(0, 5).map(h => h.choiceType || 'neutral');
  const hardCount   = lastChoices.filter(c => c === 'negative').length;
  const softCount   = lastChoices.filter(c => c === 'positive').length;
  return {
    wasHard:    hardCount >= 2,      // TP a été dur récemment
    wasSoft:    softCount >= 3,      // TP a été très accommodant
    lastType:   lastChoices[0] || 'none',
    count:      history.length,
    recentDnf:  history.slice(0,3).some(h => h.trigger?.includes('Abandon')),
    recentGood: history.slice(0,3).some(h => h.trigger?.includes('Podium') || h.trigger?.includes('P1') || h.trigger?.includes('P2')),
  };
}

//  ESCALADE NARRATIVE 
// Déclenche des situations en cascade selon les événements précédents
function checkEscalation(save, driverId, race, season) {
  const mem = getSocialMemory(save, driverId);
  const loyalty = save.driverLoyalty?.[driverId] ?? 50;
  const moral   = save.immersion?.driverMorale?.[driverId]?.value ?? 70;
  const d = F1Data.drivers.find(x=>x.id===driverId);
  if (!d) return null;

  // Escalade 1 : TP dur plusieurs fois → pilote menace de partir
  if (mem.wasHard && loyalty < 35 && !save[`esc_threat_${driverId}_${season}`]) {
    save[`esc_threat_${driverId}_${season}`] = true;
    return {
      id: `esc_threat_${driverId}_${season}`,
      driverId, type:'escalation',
      trigger:'⚠️ Situation critique',
      urgent: true,
      text:`URGENT — ${d.firstName} ${d.name} a mandaté son agent pour explorer d'autres options. Vos dernières interactions ont sérieusement entamé la relation. Il faut agir maintenant ou le perdre.`,
      choices:[
        { text:"Réunion privée immédiate. On repart sur des bases saines.", effect:{moral:+15,confiance:+12,loyalty:+15}, label:'🚨 Sauvetage', type:'positive' },
        { text:"On lui propose une prolongation avec augmentation.", effect:{moral:+10,confiance:+8,loyalty:+10,contractSignal:true}, label:'💰 Offre', type:'neutral' },
        { text:"S'il veut partir, on le remplace. On ne supplie pas.", effect:{moral:-15,confiance:-15,loyalty:-20}, label:'🚪 Adieu', type:'negative' },
      ]
    };
  }

  // Escalade 2 : Moral très bas depuis 3 GP → pilote demande un changement radical
  if (moral < 30 && mem.count >= 2 && !save[`esc_crisis_${driverId}_${race}`]) {
    save[`esc_crisis_${driverId}_${race}`] = true;
    return {
      id: `esc_crisis_${driverId}_${race}`,
      driverId, type:'escalation',
      trigger:'🆘 Crise de confiance',
      urgent: true,
      text:`${d.firstName} ${d.name} demande un entretien d'urgence. Son moral est au plus bas depuis plusieurs GP. Il envisage sérieusement de demander une thérapie du sport ou un congé.`,
      choices:[
        { text:"On fait venir un psychologue du sport. Sa santé mentale prime.", effect:{moral:+20,confiance:+10,loyalty:+12}, label:'❤️ Soutien total', type:'positive' },
        { text:"On allège son programme et on en parle régulièrement.", effect:{moral:+12,confiance:+8,loyalty:+8}, label:'🤝 Aménagement', type:'neutral' },
        { text:"Le sport de haut niveau c'est mental. Il doit se dépasser.", effect:{moral:-10,confiance:-8,loyalty:-8,pace:+2}, label:'💪 Dureté', type:'negative' },
      ]
    };
  }

  // Escalade 3 : Série de bons résultats + TP accommodant → demande de leadership
  if (mem.recentGood && mem.wasSoft && !save[`esc_leader_${driverId}_${season}`]) {
    save[`esc_leader_${driverId}_${season}`] = true;
    return {
      id: `esc_leader_${driverId}_${season}`,
      driverId, type:'escalation',
      trigger:'🌟 Demande de leadership',
      text:`Fort de vos relations excellentes et de ses récents résultats, ${d.firstName} ${d.name} propose de devenir le porte-parole de l'équipe et de prendre plus de responsabilités en développement voiture.`,
      choices:[
        { text:"Oui. Tu deviens l'ambassadeur technique et commercial de l'équipe.", effect:{moral:+10,confiance:+10,loyalty:+10,pace:+2,tokenBonus:+1}, label:'👑 Rôle élargi', type:'positive' },
        { text:"Ton rôle principal c'est de conduire vite. Le reste on gère.", effect:{moral:-3,confiance:+2,pace:+3}, label:'🏎️ Focus piste', type:'neutral' },
        { text:"On verra ça en fin de saison selon les résultats finaux.", effect:{moral:+2,confiance:+2}, label:'⏳ Report', type:'negative' },
      ]
    };
  }

  return null;
}

//  ARC NARRATIF DE SAISON 
// Situations spécifiques selon la phase de saison
function getSeasonArcEvent(save, d, race, season, totalRaces) {
  const pct = race / totalRaces; // 0 = début, 1 = fin
  const driverPts = save.driverStandings?.[d.id] || 0;
  const existing = (save.socialEvents||[]).find(e => e.driverId === d.id && !e.resolved);
  if (existing) return null;

  // ACTE 1 — Début de saison (GP 1-5) : ambitions et objectifs
  if (pct < 0.22 && !save[`arc_start_${d.id}_${season}`]) {
    save[`arc_start_${d.id}_${season}`] = true;
    return {
      id:`arc_start_${d.id}_${season}`, driverId:d.id, type:'season_arc',
      trigger:'🏁 Début de saison — objectifs',
      text:`${d.firstName} ${d.name} veut définir vos objectifs communs pour cette saison. C'est le moment de poser les bases de votre collaboration et de fixer les ambitions.`,
      choices:[
        { text:"Minimum 3 podiums et le top 6 constructeurs.", effect:{moral:+8,confiance:+6,loyalty:+5,pace:+1}, label:'🎯 Ambitieux', type:'positive' },
        { text:"On progresse GP après GP. Pas d'objectif chiffré.", effect:{moral:+4,confiance:+4,loyalty:+3}, label:'📈 Progressif', type:'neutral' },
        { text:"L'objectif c'est de maximiser chaque point disponible.", effect:{moral:+2,confiance:+3,pace:+2}, label:'🧮 Pragmatique', type:'negative' },
      ]
    };
  }

  // ACTE 2 — Montée en puissance (GP 6-11) : premiers vrais tests
  if (pct >= 0.22 && pct < 0.48 && !save[`arc_build_${d.id}_${season}`]) {
    save[`arc_build_${d.id}_${season}`] = true;
    const onTrack = driverPts >= 20;
    return {
      id:`arc_build_${d.id}_${season}`, driverId:d.id, type:'season_arc',
      trigger:'📊 Bilan du premier tiers',
      text:`${d.firstName} ${d.name} fait le point avec vous. ${onTrack ? `Avec ${driverPts} points, la dynamique est bonne. Il veut maintenant viser plus haut.` : `Seulement ${driverPts} points. Il faut analyser ce qui coince et trouver les solutions ensemble.`}`,
      choices:[
        { text: onTrack ? "On vise le top 5 constructeurs d'ici la fin." : "On repart de zéro. Nouveaux réglages, nouvelle approche.", effect:{moral:+8,confiance:+7,loyalty:+5,pace:+2}, label: onTrack?'🚀 Ambition':'🔄 Reset', type:'positive' },
        { text:"On continue dans la même direction en optimisant.", effect:{moral:+4,confiance:+4}, label:'🔧 Optimisation', type:'neutral' },
        { text: onTrack ? "Garde la tête froide. Le championnat est long." : "Les résultats doivent changer rapidement.", effect:{moral:-2,confiance:+2,pace:+2}, label: onTrack?'🧊 Prudence':'⚠️ Pression', type:'negative' },
      ]
    };
  }

  // ACTE 3 — Tension mi-saison (GP 12-16) : décisions cruciales
  if (pct >= 0.48 && pct < 0.70 && !save[`arc_tension_${d.id}_${season}`]) {
    save[`arc_tension_${d.id}_${season}`] = true;
    return {
      id:`arc_tension_${d.id}_${season}`, driverId:d.id, type:'season_arc',
      trigger:'⚡ Phase cruciale de la saison',
      text:`${d.firstName} ${d.name} sent que les prochains GP sont décisifs. C'est maintenant que se jouent les positions finales. Il veut savoir ce qu'on est prêts à risquer.`,
      choices:[
        { text:"On joue l'attaque totale. Setup agressif, stratégie audacieuse.", effect:{moral:+6,confiance:+5,pace:+3,dnfRisk:true}, label:'🔥 Tout ou rien', type:'positive' },
        { text:"On joue nos forces. Régularité et opportunisme.", effect:{moral:+4,confiance:+5,pace:+1}, label:'🎯 Régularité', type:'neutral' },
        { text:"On sécurise les points. Pas de risque inutile.", effect:{moral:+2,confiance:+3,pace:-1}, label:'🛡️ Sécurité', type:'negative' },
      ]
    };
  }

  // ACTE 4 — Sprint final (GP 17-20) : tout donner
  if (pct >= 0.70 && pct < 0.87 && !save[`arc_sprint_${d.id}_${season}`]) {
    save[`arc_sprint_${d.id}_${season}`] = true;
    return {
      id:`arc_sprint_${d.id}_${season}`, driverId:d.id, type:'season_arc',
      trigger:'🏃 Sprint final',
      text:`Plus que ${Math.round(totalRaces - race)} GP. ${d.firstName} ${d.name} veut tout donner sur ce finish de saison. Il demande carte blanche sur son style de pilotage.`,
      choices:[
        { text:"Carte blanche. Tu sais ce que tu as à faire. On te fait confiance.", effect:{moral:+12,confiance:+10,loyalty:+8,pace:+3}, label:'🃏 Carte blanche', type:'positive' },
        { text:"On attaque mais dans les limites du raisonnable.", effect:{moral:+6,confiance:+6,pace:+2}, label:'⚡ Contrôlé', type:'neutral' },
        { text:"On maintient le cap. Pas de changement de stratégie.", effect:{moral:-2,confiance:+2,pace:+1}, label:'📋 Discipline', type:'negative' },
      ]
    };
  }

  // ACTE 5 — Épilogue (GP 21-23) : bilan et futur
  if (pct >= 0.87 && !save[`arc_end_${d.id}_${season}`]) {
    save[`arc_end_${d.id}_${season}`] = true;
    return {
      id:`arc_end_${d.id}_${season}`, driverId:d.id, type:'season_arc',
      trigger:'🏆 Fin de saison — bilan',
      text:`${d.firstName} ${d.name} veut faire le bilan de cette saison ensemble avant le dernier GP. ${driverPts} points. C'est le moment de regarder en arrière... et vers l'avenir.`,
      choices:[
        { text:"Une saison qui nous a beaucoup appris. On repart plus forts.", effect:{moral:+10,confiance:+8,loyalty:+8,contractSignal:true}, label:'🌟 Positif', type:'positive' },
        { text:"Des hauts et des bas. On analyse et on améliore.", effect:{moral:+5,confiance:+5,loyalty:+4}, label:'📊 Objectif', type:'neutral' },
        { text:"Franchement, on attendait mieux. On en parle cet hiver.", effect:{moral:-5,confiance:-3,loyalty:-4}, label:'😤 Déception', type:'negative' },
      ]
    };
  }

  return null;
}

//  GÉNÉRATEUR PRINCIPAL 
function generateSocialEvents(save) {
  const events = [];
  const drivers    = F1Data.drivers.filter(d => d.teamId && d.teamId === save.playerTeamId && !d.retired);
  const lastGP     = save.lastGpSummary;
  const race       = save.race || 0;
  const season     = save.season || 2025;
  const totalRaces = F1Data.circuits.length;
  const circuits   = F1Data.circuits || [];
  const circuit    = circuits[race % Math.max(1, circuits.length)];

  //  VÉRIFICATION ESCALADES D'ABORD 
  // Les escalades sont prioritaires — elles écrasent les situations normales
  drivers.forEach(d => {
    const existing = (save.socialEvents||[]).find(e => e.driverId === d.id && !e.resolved);
    if (existing) return;
    const escalation = checkEscalation(save, d.id, race, season);
    if (escalation) events.push(escalation);
  });

  //  ARC NARRATIF 
  drivers.forEach(d => {
    const existing = (save.socialEvents||[]).find(e => e.driverId === d.id && !e.resolved);
    if (existing) return;
    const arcEvent = getSeasonArcEvent(save, d, race, season, totalRaces);
    if (arcEvent) events.push(arcEvent);
  });

  //  SITUATIONS CONTEXTUELLES 
  drivers.forEach(d => {
    const mem        = getSocialMemory(save, d.id);
    const moral      = save.immersion?.driverMorale?.[d.id]?.value ?? 70;
    const confiance  = save.driverConfidence?.[d.id] ?? 50;
    const loyalty    = save.driverLoyalty?.[d.id] ?? 50;
    const contract   = save.contracts?.[d.id];
    const yearsLeft  = contract?.years ?? 2;
    const driverPts  = save.driverStandings?.[d.id] || 0;
    const allPts     = Object.values(save.driverStandings||{});
    const driverRank = allPts.filter(v=>v>driverPts).length + 1;
    const lastResult = lastGP?.playerResults?.find(r => r.driverName?.includes(d.name));

    const existing = (save.socialEvents||[]).find(e => e.driverId === d.id && !e.resolved);
    if (existing) return;

    // Adapter le ton selon la mémoire
    const tonePrefix = mem.wasHard
      ? `Malgré les tensions récentes, `
      : mem.wasSoft
      ? `Dans le sillage de vos bonnes relations, `
      : '';

    // DNF récent — ton adapté à l historique
    if (lastResult?.status === 'dnf' && !save[`social_dnf_${d.id}_${race}`]) {
      const baseTexts = [
        `${d.firstName} ${d.name} est dans le garage, casque encore sur la tête.`,
        `${d.firstName} ${d.name} n'a pas dit un mot depuis l'abandon.`,
        `Abandon brutal pour ${d.firstName} ${d.name}. La frustration est visible.`,
        `${d.firstName} ${d.name} est assis seul dans le motorhome depuis 20 minutes.`,
        `Le mécanicien en chef vous prévient : ${d.firstName} ${d.name} est dans un état difficile.`,
      ];
      const text = tonePrefix + baseTexts[race % baseTexts.length] + (mem.wasHard ? ' Après vos dernières discussions tendues, cette conversation va être délicate.' : ' Comment gérez-vous la situation ?');
      events.push({ id:`dnf_${d.id}_${race}`, driverId:d.id, type:'dnf', trigger:'Abandon au dernier GP',
        text,
        choices: mem.wasHard ? [
          { text:"On met de côté nos tensions. Je suis là pour toi.", effect:{moral:+12,confiance:+10,loyalty:+8}, label:'🤝 Réconciliation', type:'positive' },
          { text:"C'était mécanique. On regarde les données ensemble.", effect:{moral:+5,confiance:+6}, label:'📊 Analyse', type:'neutral' },
          { text:"Un abandon de plus. C'est inacceptable.", effect:{moral:-15,confiance:-10,loyalty:-8}, label:'😤 Colère', type:'negative' },
        ] : [
          { text:"C'était mécanique, pas ta faute. On règle ça en usine.", effect:{moral:+8,confiance:+5,loyalty:+3}, label:'🤝 Soutien', type:'positive' },
          { text:"Analysons ensemble. Tu aurais pu anticiper ?", effect:{moral:+2,confiance:+4}, label:'📊 Analyse', type:'neutral' },
          { text:"Ces abandons coûtent cher aux sponsors.", effect:{moral:-10,confiance:-6,loyalty:-3,pace:+2}, label:'😤 Pression', type:'negative' },
        ]
      });
      save[`social_dnf_${d.id}_${race}`] = true;
    }
    // Moral bas — textes variés
    else if (moral < 35 && !save[`social_moral_${d.id}_${race}`]) {
      const moralTexts = [
        `${d.firstName} ${d.name} semble absent. Ses réponses sont laconiques.`,
        `Le staff rapporte que ${d.firstName} ${d.name} quitte le garage sans débriefing.`,
        `${d.firstName} ${d.name} a été photographié dans un restaurant rival.`,
        `Les journalistes notent la mine fermée de ${d.firstName} ${d.name} en conférence.`,
        `${d.firstName} ${d.name} a sauté deux sessions de debriefing cette semaine.`,
      ];
      events.push({ id:`moralLow_${d.id}_${race}`, driverId:d.id, type:'moral', trigger:'Moral en baisse',
        text: moralTexts[race % moralTexts.length],
        choices:[
          { text:"Je crois en toi. Tu es essentiel à ce projet.", effect:{moral:+14,confiance:+7,loyalty:+5}, label:'💪 Soutien', type:'positive' },
          { text:"Qu'est-ce qui se passe vraiment ? Parle-moi.", effect:{moral:+6,confiance:+10}, label:'🤝 Dialogue', type:'neutral' },
          { text:"Les résultats doivent s'améliorer ou on reconsidère.", effect:{moral:-8,confiance:-6,loyalty:-5,pace:+3}, label:'⚠️ Ultimatum', type:'negative' },
        ]
      });
      save[`social_moral_${d.id}_${race}`] = true;
    }
    // Contrat expire
    else if (yearsLeft <= 1 && !save[`social_contract_${d.id}_${season}`]) {
      const contractTexts = [
        `L'agent de ${d.firstName} ${d.name} a contacté deux équipes rivales.`,
        `${d.firstName} ${d.name} vous demande un entretien. Son contrat expire et il veut savoir où il en est.`,
        `La presse spécule sur l'avenir de ${d.firstName} ${d.name}. Des offres sont sur la table.`,
        `${d.firstName} ${d.name} n'a pas encore signé nulle part mais les discussions avancent ailleurs.`,
      ];
      events.push({ id:`contract_${d.id}_${season}`, driverId:d.id, type:'contract', trigger:'Contrat en fin de saison',
        text: contractTexts[season % contractTexts.length],

function clampMedia(v, min, max) { return Math.max(min, Math.min(max, Number(v)||0)); }
function ensureMediaEffects(save) {
  if (!save.mediaEffects || save.mediaEffects.race !== (save.race||0) || save.mediaEffects.season !== (save.season||2025)) {
    save.mediaEffects = { race: save.race||0, season: save.season||2025, team:{}, drivers:{}, log:[] };
  }
  save.mediaEffects.team = save.mediaEffects.team || {};
  save.mediaEffects.drivers = save.mediaEffects.drivers || {};
  save.mediaEffects.log = save.mediaEffects.log || [];
  return save.mediaEffects;
}
function addMediaTeamEffect(key, delta, limit=6) {
  const media = ensureMediaEffects(save);
  media.team[key] = clampMedia((media.team[key]||0) + delta, -limit, limit);
}
function addMediaDriverEffect(driverId, key, delta, limit=5) {
  const media = ensureMediaEffects(save);
  if (!media.drivers[driverId]) media.drivers[driverId] = {};
  media.drivers[driverId][key] = clampMedia((media.drivers[driverId][key]||0) + delta, -limit, limit);
}
function mediaEffectLabel(effect={}) {
  const parts=[];
  if (effect.moral) parts.push(`Moral ${effect.moral>0?'+':''}${effect.moral}`);
  if (effect.confiance) parts.push(`Confiance ${effect.confiance>0?'+':''}${effect.confiance}`);
  if (effect.loyalty) parts.push(`Loyauté ${effect.loyalty>0?'+':''}${effect.loyalty}`);
  if (effect.pace) parts.push(`Rythme ${effect.pace>0?'+':''}${effect.pace}`);
  if (effect.raceBonus) parts.push(`Course ${effect.raceBonus>0?'+':''}${effect.raceBonus}`);
  if (effect.qualiBonusPct) parts.push(`Qualif ${effect.qualiBonusPct>0?'+':''}${effect.qualiBonusPct}`);
  if (effect.tyreBonus) parts.push(`Pneus ${effect.tyreBonus>0?'+':''}${effect.tyreBonus}`);
  if (effect.tyreMalus) parts.push(`Usure pneus +${effect.tyreMalus}`);
  if (effect.weatherBonus) parts.push(`Météo +${effect.weatherBonus}`);
  if (effect.tokenBonus) parts.push(`R&D +${effect.tokenBonus}`);
  if (effect.rdBonus) parts.push(`R&D ${effect.rdBonus} +1`);
  if (effect.penaltyGrid) parts.push(`Pénalité grille`);
  if (effect.dnfRisk) parts.push(`Risque DNF`);
  if (effect.engineWear) parts.push(`Usure moteur +${effect.engineWear}`);
  return parts.join(' · ') || 'Impact narratif';
}

function applyChoice(event, choice) {
  const e = choice.effect || {};
  const d = F1Data.drivers.find(x => x.id === event.driverId);
  const dName = event.type === 'engineer' ? 'Équipe technique' : (d ? `${d.firstName} ${d.name}` : 'Pilote');
  const media = ensureMediaEffects(save);

  // Moral
  if (e.moral) {
    if (!save.immersion) save.immersion = {};
    if (!save.immersion.driverMorale) save.immersion.driverMorale = {};
    const targets = event.type === 'engineer'
      ? F1Data.drivers.filter(x => x.teamId === save.playerTeamId && !x.retired).map(x => x.id)
      : [event.driverId];
    targets.forEach(id => {
      if (!save.immersion.driverMorale[id]) save.immersion.driverMorale[id] = { value: 70 };
      const cur = save.immersion.driverMorale[id].value || 70;
      save.immersion.driverMorale[id].value = Math.max(0, Math.min(100, cur + e.moral));
    });
  }

  // Confiance
  if (!save.driverConfidence) save.driverConfidence = {};
  if (e.confiance) {
    const targets = event.type === 'engineer'
      ? F1Data.drivers.filter(x => x.teamId === save.playerTeamId && !x.retired).map(x => x.id)
      : [event.driverId];
    targets.forEach(id => {
      const cur = save.driverConfidence[id] || 50;
      save.driverConfidence[id] = Math.max(0, Math.min(100, cur + e.confiance));
    });
  }

  // Loyauté
  if (!save.driverLoyalty) save.driverLoyalty = {};
  if (e.loyalty && event.type !== 'engineer') {
    const cur = save.driverLoyalty[event.driverId] || 50;
    save.driverLoyalty[event.driverId] = Math.max(0, Math.min(100, cur + e.loyalty));
  }

  // Signal contrat réellement exploitable par contracts.html / IA future
  if (e.contractSignal && event.type !== 'engineer') {
    save[`contractSignal_${event.driverId}`] = true;
    save.contractSignals = save.contractSignals || {};
    save.contractSignals[event.driverId] = {
      race: save.race||0,
      season: save.season||2025,
      reason: event.trigger,
      mood: choice.type || 'neutral'
    };
  }

  // Effets performance : centralisés dans mediaEffects, puis consommés par race.js/engine.js
  if (e.pace) {
    if (event.type === 'engineer' || event.driverId === 'engineer' || event.driverId === 'engineer2') {
      addMediaTeamEffect('pace', e.pace, 6);
    } else {
      addMediaDriverEffect(event.driverId, 'pace', e.pace, 5);
      if (!save.driverEffects) save.driverEffects = {};
      if (!save.driverEffects[event.driverId]) save.driverEffects[event.driverId] = {};
      const cur = save.driverEffects[event.driverId].paceDelta || 0;
      save.driverEffects[event.driverId].paceDelta = Math.max(-5, Math.min(5, cur + e.pace));
      save.driverEffects[event.driverId].paceExpiry = (save.race||0) + 2;
      save.driverEffects[event.driverId].label = mediaEffectLabel(e);
    }
  }
  if (e.raceBonus) addMediaTeamEffect('race', e.raceBonus, 6);
  if (e.qualiBonusPct) { addMediaTeamEffect('qualifying', e.qualiBonusPct, 6); save.weekendSetup = 'qualify'; }
  if (e.tyreBonus) addMediaTeamEffect('tyres', e.tyreBonus, 6);
  if (e.tyreMalus) addMediaTeamEffect('tyreMalus', e.tyreMalus, 12);
  if (e.weatherBonus) addMediaTeamEffect('weather', e.weatherBonus, 6);
  if (e.dnfRisk) addMediaTeamEffect('dnfRisk', 1, 5);
  if (e.engineWear) addMediaTeamEffect('engineWear', e.engineWear, 8);

  // Pénalité grille — stockée pour le prochain GP
  if (e.penaltyGrid) {
    if (!save.gridPenalties) save.gridPenalties = {};
    const drivers = F1Data.drivers.filter(x => x.teamId === save.playerTeamId && !x.retired);
    drivers.forEach(x => { save.gridPenalties[x.id] = (save.gridPenalties[x.id]||0) + 5; });
    if (save.news) save.news.push({ icon:'⚠️', category:'technique', title:'Pénalité grille', text:'Changement de pièce — pénalité de 5 places sur la grille au prochain GP.' });
  }

  // Compatibilité avec anciennes mécaniques
  if (e.dnfRisk) save._dnfRiskBoost = (save._dnfRiskBoost||0) + 0.04;
  if (e.engineWear) {
    save._engineWear = (save._engineWear||0) + e.engineWear;
    if ((save._engineWear||0) >= 5 && !save._enginePenaltyWarned) {
      save._enginePenaltyWarned = true;
      if (save.news) save.news.push({ icon:'⚠️', category:'technique', title:'Avertissement moteur', text:"Usure moteur élevée. Une pénalité moteur est possible dans les 3 prochains GP." });
    }
  }
  if (e.tokenBonus && e.tokenBonus > 0) save.tokens = (save.tokens||0) + e.tokenBonus;
  if (e.rdBonus) {
    if (!save.carDev) save.carDev = {};
    if (!save.carDev[e.rdBonus]) save.carDev[e.rdBonus] = { level: 70, done: [], pending: [] };
    save.carDev[e.rdBonus].level = Math.min(100, (save.carDev[e.rdBonus].level||70) + 1);
  }
  if (e.setupBonus) save.weekendSetup = e.setupBonus;
  if (e.reliabilityBonus && e.reliabilityBonus > 0) {
    if (!save.carDev) save.carDev = {};
    if (!save.carDev.reliability) save.carDev.reliability = { level: 70, done: [], pending: [] };
    save.carDev.reliability.level = Math.min(100, (save.carDev.reliability.level||70) + e.reliabilityBonus);
  }
  if (e.upgradeNow) save._upgradeNowSignal = true;

  // Marquer comme résolu
  if (!save.socialEvents) save.socialEvents = [];
  const existing = save.socialEvents.find(ev => ev.id === event.id);
  if (existing) {
    existing.resolved = true;
    existing.read = true;
    existing.choiceMade = choice.text;
    existing.appliedEffects = mediaEffectLabel(e);
  }

  media.log.unshift({
    date: new Date().toISOString(),
    race: save.race||0,
    season: save.season||2025,
    source: event.trigger,
    target: dName,
    choice: choice.text,
    effects: mediaEffectLabel(e)
  });
  media.log = media.log.slice(0, 12);

  // Ajouter à l historique social
  if (!save.socialHistory) save.socialHistory = [];
  save.socialHistory.unshift({
    date: new Date().toISOString(),
    driverName: dName,
    trigger: event.trigger,
    choice: choice.text,
    choiceType: choice.type || 'neutral',
    effects: e,
    effectsText: mediaEffectLabel(e),
    race: save.race || 0,
  });
  save.socialHistory = save.socialHistory.slice(0, 30);

  // News
  if (!save.news) save.news = [];
  save.news.push({
    icon: '💬', category: 'social',
    title: `Décision média — ${dName}`,
    text: `${event.trigger} : ${mediaEffectLabel(e)}`,
    season: save.season, race: save.race,
  });

  Save.save(save);
  save = Save.load();

  showToast(`✅ ${dName} — ${mediaEffectLabel(e)}`);
  render();
}

function showToast(msg) {
  const t = document.getElementById('toastSocial');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function moralColor(v) { return v>=70?'var(--green)':v>=40?'var(--gold)':'var(--accent)'; }
function moralLabel(v) { return v>=70?'En forme':v>=40?'Correct':'Bas'; }

function render() {
  if (!save?.playerTeamId) {
    document.getElementById('content').innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted)">Aucune carrière. <a href="index.html" style="color:var(--accent)">Retour</a></div>';
    return;
  }

  const drivers  = F1Data.drivers.filter(d => d.teamId && d.teamId === save.playerTeamId && !d.retired);
  const season   = save.season || 2025;
  const race     = save.race || 0;
  const myTeam   = F1Data.teams.find(t => t.id === save.playerTeamId);

  // Générer les nouveaux événements sociaux
  const newEvents = generateSocialEvents(save);
  if (!save.socialEvents) save.socialEvents = [];
  newEvents.forEach(ev => {
    if (!save.socialEvents.find(e => e.id === ev.id)) {
      save.socialEvents.push({ ...ev, read: false, resolved: false });
    }
  });
  if (newEvents.length) Save.save(save);

  // Topbar
  const pending = save.socialEvents.filter(e => !e.resolved && !e.read).length;
  document.getElementById('topPills').innerHTML = `
    <span style="font-family:var(--fh);font-size:11px;color:var(--muted)">Saison ${season}</span>
    ${pending > 0 ? `<span style="font-family:var(--fh);font-size:11px;padding:3px 8px;background:rgba(232,0,61,.15);border:1px solid rgba(232,0,61,.3);border-radius:4px;color:var(--accent)">${pending} message${pending>1?'s':''}</span>` : ''}`;

  // Atmosphère équipe
  const avgMoral = Math.round(drivers.reduce((s,d) => s + (save.immersion?.driverMorale?.[d.id]?.value ?? 70), 0) / Math.max(1, drivers.length));
  const avgConf  = Math.round(drivers.reduce((s,d) => s + (save.driverConfidence?.[d.id] ?? 50), 0) / Math.max(1, drivers.length));
  const avgLoy   = Math.round(drivers.reduce((s,d) => s + (save.driverLoyalty?.[d.id] ?? 50), 0) / Math.max(1, drivers.length));
  const atmoLabel = avgMoral >= 70 && avgConf >= 60 ? '🔥 Excellente' : avgMoral >= 50 ? '👍 Bonne' : '😟 Tendue';

  // Discussions en attente
  const pendingEvents = save.socialEvents.filter(e => !e.resolved);
  const media = ensureMediaEffects(save);
  const mediaTeam = media.team || {};
  const mediaRows = [];
  if (mediaTeam.pace) mediaRows.push(['Rythme voiture', (mediaTeam.pace>0?'+':'')+mediaTeam.pace]);
  if (mediaTeam.race) mediaRows.push(['Bonus course', (mediaTeam.race>0?'+':'')+mediaTeam.race]);
  if (mediaTeam.qualifying) mediaRows.push(['Bonus qualification', (mediaTeam.qualifying>0?'+':'')+mediaTeam.qualifying]);
  if (mediaTeam.tyres) mediaRows.push(['Gestion pneus', (mediaTeam.tyres>0?'+':'')+mediaTeam.tyres]);
  if (mediaTeam.tyreMalus) mediaRows.push(['Usure pneus supplémentaire', '+'+mediaTeam.tyreMalus]);
  if (mediaTeam.weather) mediaRows.push(['Préparation météo', '+'+mediaTeam.weather]);
  if (mediaTeam.dnfRisk) mediaRows.push(['Risque fiabilité', '+'+mediaTeam.dnfRisk]);
  if (mediaTeam.engineWear) mediaRows.push(['Usure moteur', '+'+mediaTeam.engineWear]);

  let html = `
    <div class="section">
      <div class="section-title">🏢 Atmosphère équipe</div>
      <div class="team-atmo">
        <div class="ta-row"><span>Ambiance générale</span><b style="color:${moralColor(avgMoral)}">${atmoLabel}</b></div>
        <div class="ta-row"><span>Moral moyen</span><b style="color:${moralColor(avgMoral)}">${avgMoral}/100</b></div>
        <div class="ta-row"><span>Confiance moyenne</span><b style="color:${moralColor(avgConf)}">${avgConf}/100</b></div>
        <div class="ta-row"><span>Loyauté moyenne</span><b style="color:${moralColor(avgLoy)}">${avgLoy}/100</b></div>
      </div>
      ${mediaRows.length ? `<div class="media-effects">
        <div style="font-family:var(--fh);font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:6px">Effets média actifs sur ce GP</div>
        ${mediaRows.map(r=>`<div class="me-row"><span>${r[0]}</span><b>${r[1]}</b></div>`).join('')}
      </div>` : ''}
    </div>`;

  // Discussions en attente
  if (pendingEvents.length) {
    html += `<div class="section"><div class="section-title">💬 Discussions en attente (${pendingEvents.length})</div>`;
    pendingEvents.forEach(ev => {
      const d = F1Data.drivers.find(x => x.id === ev.driverId);
      html += `<div class="discussion-card">
        <div class="dc-trigger">${ev.trigger}</div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span style="font-size:18px">${ev.type==='engineer'?'🔧':(d?.flag||'🏁')}</span>
          <span style="font-family:var(--fh);font-weight:700">${ev.type==='engineer'?'Ingénieur de piste':(d?.firstName||'')+' '+(d?.name||ev.driverId)}</span>
        </div>
        <div class="dc-text">${ev.text}</div>
        <div class="dc-choices">
          ${ev.choices.map((c,i) => `
            <div class="dc-choice ${c.type}" onclick='handleChoice(${JSON.stringify(ev.id)}, ${i})'>
              <span class="cc-text">${c.text}</span>
              <span class="cc-effect">${c.label}<br><small>${mediaEffectLabel(c.effect)}</small></span>
            </div>
          `).join('')}
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  // Fiches pilotes
  html += `<div class="section"><div class="section-title">🏎️ Vos pilotes</div>`;
  drivers.forEach(d => {
    const moral    = save.immersion?.driverMorale?.[d.id]?.value ?? 70;
    const confiance= save.driverConfidence?.[d.id] ?? 50;
    const loyalty  = save.driverLoyalty?.[d.id] ?? 50;
    const contract = save.contracts?.[d.id];
    const years    = contract?.years ?? 2;
    const pts      = save.driverStandings?.[d.id] || 0;

    html += `<div class="driver-social" style="--accent:${F1Data.teams.find(t=>t.id===d.teamId)?.color||'#0090FF'}">
      <div class="ds-header">
        <div class="ds-flag">${d.flag||'🏁'}</div>
        <div class="ds-info">
          <div class="ds-name">${d.firstName} ${d.name}</div>
          <div class="ds-sub">${d.age} ans · Contrat : ${years} an${years!==1?'s':''} · ${pts} pts championship</div>
        </div>
        <div class="ds-number">${d.number}</div>
      </div>
      <div class="gauges">
        <div class="gauge">
          <div class="g-val" style="color:${moralColor(moral)}">${moral}</div>
          <div class="g-lbl">Moral</div>
          <div class="g-bar"><div class="g-fill" style="width:${moral}%;background:${moralColor(moral)}"></div></div>
        </div>
        <div class="gauge">
          <div class="g-val" style="color:${moralColor(confiance)}">${confiance}</div>
          <div class="g-lbl">Confiance</div>
          <div class="g-bar"><div class="g-fill" style="width:${confiance}%;background:${moralColor(confiance)}"></div></div>
        </div>
        <div class="gauge">
          <div class="g-val" style="color:${moralColor(loyalty)}">${loyalty}</div>
          <div class="g-lbl">Loyauté</div>
          <div class="g-bar"><div class="g-fill" style="width:${loyalty}%;background:${moralColor(loyalty)}"></div></div>
        </div>
      </div>
    </div>`;
  });
  html += `</div>`;

  // Historique des discussions
  const history = (save.socialHistory || []).slice(0, 10);
  if (history.length) {
    html += `<div class="section"><div class="section-title">📋 Historique</div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px">
        ${history.map(h => `
          <div class="history-item">
            <div class="hi-icon">💬</div>
            <div>
              <div class="hi-text"><b style="color:var(--text)">${h.driverName}</b> — ${h.trigger}<br><span style="color:rgba(255,255,255,.4)">"${h.choice.substring(0,50)}..."</span>${h.effectsText ? `<br><span style="color:var(--green)">${h.effectsText}</span>` : ``}</div>
              <div class="hi-date">GP ${h.race || '—'} · Saison ${save.season||2025}</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>`;
  }

  document.getElementById('content').innerHTML = html;
}

function handleChoice(eventId, choiceIndex) {
  const ev = save.socialEvents.find(e => e.id === eventId);
  if (!ev) return;
  const choice = ev.choices[choiceIndex];
  if (!choice) return;
  applyChoice(ev, choice);
}

render();

</script>
</body>
</html>
