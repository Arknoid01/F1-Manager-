<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;0,900;1,700&family=Barlow:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#07070d">
<link rel="stylesheet" href="css/immersive-theme.css?v=20260508f">
<title>Social — F1 Manager</title>
<style>
*{box-sizing:border-box}
.wrap{max-width:680px;margin:0 auto;padding:0 14px 40px}

/* Cartes pilote */
.driver-social{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;position:relative;overflow:hidden}
.driver-social::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)}
.ds-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.ds-flag{font-size:24px}
.ds-info{flex:1}
.ds-name{font-family:var(--fh);font-weight:900;font-size:17px}
.ds-sub{font-size:11px;color:var(--muted);margin-top:2px}
.ds-number{font-family:var(--fh);font-weight:900;font-size:28px;color:var(--border)}

/* Jauges */
.gauges{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.gauge{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;text-align:center}
.gauge .g-val{font-family:var(--fh);font-weight:900;font-size:20px}
.gauge .g-lbl{font-family:var(--fh);font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-top:2px}
.gauge .g-bar{height:4px;border-radius:2px;margin-top:4px;overflow:hidden;background:rgba(255,255,255,.08)}
.gauge .g-fill{height:100%;border-radius:2px;transition:width .4s}

/* Messages en attente */
.pending-badge{position:absolute;top:14px;right:14px;background:var(--accent);color:#fff;font-family:var(--fh);font-size:10px;font-weight:900;padding:3px 8px;border-radius:10px}

/* Événements de discussion */
.discussion-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:8px;padding:12px 14px;margin-bottom:8px}
.dc-trigger{font-family:var(--fh);font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:6px}
.dc-text{font-size:13px;color:#ddd;line-height:1.5;margin-bottom:10px}
.dc-choices{display:flex;flex-direction:column;gap:6px}
.dc-choice{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 12px;cursor:pointer;font-family:var(--fh);font-size:12px;display:flex;justify-content:space-between;align-items:center;transition:all .15s}
.dc-choice:active{opacity:.7}
.dc-choice .cc-text{flex:1}
.dc-choice .cc-effect{font-size:10px;color:var(--muted);flex-shrink:0;margin-left:8px}
.dc-choice.positive{border-color:rgba(0,217,126,.3)}
.dc-choice.negative{border-color:rgba(232,0,61,.3)}
.dc-choice.neutral{border-color:rgba(245,200,66,.2)}

/* Historique */
.history-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.history-item:last-child{border:none}
.hi-icon{font-size:16px;flex-shrink:0;margin-top:2px}
.hi-text{font-size:12px;color:var(--muted);line-height:1.4}
.hi-date{font-family:var(--fh);font-size:10px;color:rgba(255,255,255,.2);margin-top:2px}

/* Toast */
.toast-social{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:8px;padding:10px 16px;font-family:var(--fh);font-size:13px;z-index:300;white-space:nowrap;opacity:0;transition:opacity .3s;pointer-events:none}
.toast-social.show{opacity:1}

/* Section titre */
.section{margin:14px 0}
.section-title{font-family:var(--fh);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* Atmosphère équipe */
.team-atmo{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px}
.ta-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);font-family:var(--fh);font-size:13px}
.ta-row:last-child{border:none}
.ta-row span{color:var(--muted);font-size:11px}
</style>
</head>
<body>
<div class="topbar">
  <span class="logo"><img src="img/f1.png" style="height:22px;vertical-align:middle;margin-right:4px" alt="F1"><span style="color:#ffffff !important">Manager</span></span>
  <a href="index.html" class="nav-back">← Accueil</a>
  <div class="top-pills" id="topPills"></div>
</div>

<div class="wrap">
  <div id="content"></div>
</div>

<div class="toast-social" id="toastSocial"></div>

<script src="js/data.js"></script>
<script src="js/save.js"></script>
<script src="js/theme.js"></script>
<script>
let save = Save.load();

// ── SYSTÈME DE DISCUSSION ─────────────────────────────────

// Générateur d'événements de discussion selon le contexte
function generateSocialEvents(save) {
  const events = [];
  const drivers = F1Data.drivers.filter(d => d.teamId === save.playerTeamId && !d.retired);
  const lastGP  = save.lastGpSummary;
  const race    = save.race || 0;
  const season  = save.season || 2025;
  const totalRaces = F1Data.circuits.length;

  drivers.forEach(d => {
    const moral      = save.immersion?.driverMorale?.[d.id]?.value ?? 70;
    const confiance  = save.driverConfidence?.[d.id] ?? 50;
    const loyalty    = save.driverLoyalty?.[d.id] ?? 50;
    const contract   = save.contracts?.[d.id];
    const yearsLeft  = contract?.years ?? 2;
    const driverPts  = save.driverStandings?.[d.id] || 0;
    const driverRank = Object.entries(save.driverStandings||{}).filter(([,v])=>v>driverPts).length + 1;

    // Un seul event en attente par pilote max
    const existing = (save.socialEvents||[]).find(e => e.driverId === d.id && !e.resolved);
    if (existing) return;

    const lastResult = lastGP?.playerResults?.find(r => r.driverName?.includes(d.name));

    // ── Victoire — gestion ego ─────────────────────────────
    if (lastResult?.position === 1 && !save[`social_win_${d.id}_${race}`]) {
      const msgs = [
        `${d.firstName} ${d.name} est en mode champion après sa victoire. Les interviews s'enchaînent et il commence à remettre en question certaines décisions stratégiques. Comment gérez-vous ?`,
        `${d.firstName} ${d.name} a gagné et il le sait. Son attitude en débriefing a changé — plus sûr de lui, moins à l'écoute. C'est le bon moment pour cadrer les choses.`,
        `Victoire de ${d.firstName} ${d.name}. Fantastique pour l'équipe, mais son agent appelle déjà pour renegocier le contrat. Il faut gérer ça intelligemment.`,
      ];
      events.push({ id:`win_${d.id}_${race}`, driverId:d.id, type:'victory', trigger:'Gestion post-victoire',
        text: msgs[Math.floor(Math.random()*msgs.length)],
        choices: [
          { text:"Tu as été parfait. Profite de ce moment, tu le mérites.", effect:{moral:+10,confiance:+8,loyalty:+6}, label:'🏆 Célébration', type:'positive' },
          { text:"Belle victoire. Maintenant on reste concentrés sur la suite.", effect:{moral:+5,confiance:+5,pace:+1}, label:'🎯 Focus', type:'neutral' },
          { text:"Une victoire ne change rien. On reste exigeants.", effect:{moral:-3,confiance:+2,pace:+3}, label:'📋 Rigueur', type:'negative' },
        ]
      });
      save[`social_win_${d.id}_${race}`] = true;
    }

    // ── Ordre d'équipe subi ──────────────────────────────────
    else if (save[`teamOrderGiven_${d.id}_${race}`] && !save[`social_order_${d.id}_${race}`]) {
      events.push({ id:`order_${d.id}_${race}`, driverId:d.id, type:'team_order', trigger:"Ordre d'équipe subi",
        text: `${d.firstName} ${d.name} a respecté l'ordre d'équipe mais il est clairement frustré. Il voulait attaquer mais a dû laisser passer son équipier. La tension est palpable dans le garage.`,
        choices: [
          { text:"C'était la bonne décision pour l'équipe. Tu as bien fait.", effect:{moral:+6,confiance:+4,loyalty:+5}, label:'🤝 Explication', type:'positive' },
          { text:"Je sais que c'était dur. On te donnera la priorité au prochain GP.", effect:{moral:+8,confiance:+6,loyalty:+8}, label:'✅ Promesse', type:'neutral' },
          { text:"C'est moi qui décide. On n'en parle plus.", effect:{moral:-10,confiance:-8,loyalty:-6}, label:'✊ Autorité', type:'negative' },
        ]
      });
      save[`social_order_${d.id}_${race}`] = true;
    }

    // ── Accrochage en course ─────────────────────────────────
    else if (lastResult?.hadContact && !save[`social_contact_${d.id}_${race}`]) {
      const rival = F1Data.drivers.find(x=>x.id!==d.id&&x.teamId!==save.playerTeamId&&x.pace>85);
      const rivalName = rival ? `${rival.firstName} ${rival.name}` : 'un rival';
      events.push({ id:`contact_${d.id}_${race}`, driverId:d.id, type:'contact', trigger:'Accrochage en course',
        text: `${d.firstName} ${d.name} a été impliqué dans un contact avec ${rivalName}. Les médias s'emparent de l'incident. Il attend votre soutien public — ou votre condamnation.`,
        choices: [
          { text:"Je le soutiens publiquement. C'était un incident de course.", effect:{moral:+10,confiance:+8,loyalty:+6}, label:'🛡️ Défense', type:'positive' },
          { text:"On analyse les données avant de se prononcer.", effect:{moral:+3,confiance:+3}, label:'📊 Prudence', type:'neutral' },
          { text:"C'était une erreur. Il doit s'excuser publiquement.", effect:{moral:-12,confiance:-8,loyalty:-6}, label:'⚠️ Condamnation', type:'negative' },
        ]
      });
      save[`social_contact_${d.id}_${race}`] = true;
    }

    // ── Anniversaire pilote ──────────────────────────────────
    else if (!save[`social_bday_${d.id}_${season}`] && d.age && (race % 5 === 2)) {
      events.push({ id:`bday_${d.id}_${season}`, driverId:d.id, type:'birthday', trigger:'Anniversaire',
        text: `C'est l'anniversaire de ${d.firstName} ${d.name} ce week-end. Un petit geste humain peut faire beaucoup pour la relation pilote-TP. Comment marquez-vous l'occasion ?`,
        choices: [
          { text:"Message personnel + cadeau de l'équipe. On célèbre.", effect:{moral:+10,confiance:+6,loyalty:+8}, label:'🎂 Célébration', type:'positive' },
          { text:"Un mot rapide entre deux sessions. Simple mais sincère.", effect:{moral:+5,confiance:+4,loyalty:+4}, label:'👋 Discret', type:'neutral' },
          { text:"On a une course à préparer. Les anniversaires peuvent attendre.", effect:{moral:-3,confiance:-2,loyalty:-3}, label:'😐 Neutre', type:'negative' },
        ]
      });
      save[`social_bday_${d.id}_${season}`] = true;
    }

    // ── Interview polémique ──────────────────────────────────
    else if (!save[`social_media_${d.id}_${race}`] && race > 3 && Math.random() < 0.2) {
      const controverses = [
        `${d.firstName} ${d.name} a déclaré en conférence de presse que la voiture "n'est pas à la hauteur de son talent". Les médias s'en donnent à cœur joie.`,
        `${d.firstName} ${d.name} a critiqué ouvertement la stratégie du dernier GP dans une interview. L'équipe est gênée par ces propos publics.`,
        `Des propos de ${d.firstName} ${d.name} sur les réseaux sociaux font polémique. Il a commenté la voiture d'un rival de façon très directe.`,
      ];
      events.push({ id:`media_${d.id}_${race}`, driverId:d.id, type:'media', trigger:'Interview polémique',
        text: controverses[Math.floor(Math.random()*controverses.length)],
        choices: [
          { text:"On gère en interne. Je le défends publiquement.", effect:{moral:+5,confiance:+5,loyalty:+4}, label:'🛡️ Soutien', type:'positive' },
          { text:"Discussion privée. Il doit choisir ses mots avec plus de soin.", effect:{moral:-2,confiance:+3}, label:'💬 Recadrage', type:'neutral' },
          { text:"Conférence de presse imposée pour s'excuser. Immédiatement.", effect:{moral:-12,confiance:-8,loyalty:-5}, label:'😤 Sanctions', type:'negative' },
        ]
      });
      save[`social_media_${d.id}_${race}`] = true;
    }

    // ── Demande temps simulateur ─────────────────────────────
    else if (!save[`social_sim_${d.id}_${season}`] && race > 2 && race < 18 && Math.random() < 0.25) {
      events.push({ id:`sim_${d.id}_${season}`, driverId:d.id, type:'simulator', trigger:'Demande simulateur',
        text: `${d.firstName} ${d.name} demande plus de temps sur le simulateur pour travailler sur son style de freinage. Ça implique un déplacement à l'usine entre deux GP.`,
        choices: [
          { text:"Accordé. On organise deux jours à l'usine.", effect:{moral:+7,confiance:+5,pace:+2}, label:'✅ Accordé', type:'positive' },
          { text:"Une journée seulement. Le calendrier est serré.", effect:{moral:+3,confiance:+3,pace:+1}, label:'⏳ Partiel', type:'neutral' },
          { text:"Le simulateur est occupé. On verra après la pause.", effect:{moral:-4,confiance:-3}, label:'❌ Refusé', type:'negative' },
        ]
      });
      save[`social_sim_${d.id}_${season}`] = true;
    }

    // ── Rumeur top team ──────────────────────────────────────
    else if (driverPts > 60 && !save[`social_rumor_${d.id}_${season}`] && Math.random() < 0.3) {
      const topTeams = ['Ferrari', 'McLaren', 'Red Bull', 'Mercedes'];
      const topTeam  = topTeams[Math.floor(Math.random()*topTeams.length)];
      events.push({ id:`rumor_${d.id}_${season}`, driverId:d.id, type:'rumor', trigger:'Rumeur de transfert',
        text: `La presse annonce que ${topTeam} s'intéresse à ${d.firstName} ${d.name}. Des sources proches du pilote confirment un contact informel. L'équipe est sous pression.`,
        choices: [
          { text:"Tu es intransférable. On prolonge et on augmente ton salaire.", effect:{moral:+12,confiance:+10,loyalty:+12}, label:'💎 Engagement fort', type:'positive' },
          { text:"Je comprends l'intérêt mais notre projet est solide.", effect:{moral:+5,confiance:+5,loyalty:+4}, label:'🤝 Discussion', type:'neutral' },
          { text:"S'il veut partir, c'est son choix. On a d'autres options.", effect:{moral:-12,confiance:-12,loyalty:-15}, label:'🚪 Indifférence', type:'negative' },
        ]
      });
      save[`social_rumor_${d.id}_${season}`] = true;
    }

    // ── Plainte sur la voiture ───────────────────────────────
    else if (moral < 55 && !save[`social_carcomp_${d.id}_${race}`] && Math.random() < 0.3) {
      events.push({ id:`carcomp_${d.id}_${race}`, driverId:d.id, type:'complaint', trigger:'Insatisfaction voiture',
        text: `${d.firstName} ${d.name} exprime ses frustrations en privé : la voiture manque d'équilibre et il peine à extraire le maximum. Il attend des réponses concrètes de l'équipe technique.`,
        choices: [
          { text:"On prend ça en compte. Réunion avec les ingénieurs cette semaine.", effect:{moral:+8,confiance:+6}, label:'🔧 Action', type:'positive' },
          { text:"La voiture s'améliore. Encore un peu de patience.", effect:{moral:+2,confiance:+2}, label:'⏳ Patience', type:'neutral' },
          { text:"C'est le meilleur qu'on peut faire avec ce budget. Adapte-toi.", effect:{moral:-10,confiance:-8,loyalty:-4}, label:'😤 Dure réalité', type:'negative' },
        ]
      });
      save[`social_carcomp_${d.id}_${race}`] = true;
    }

    // ── Légère blessure ──────────────────────────────────────
    else if (!save[`social_injury_${d.id}_${season}`] && race > 5 && Math.random() < 0.12) {
      events.push({ id:`injury_${d.id}_${season}`, driverId:d.id, type:'injury', trigger:'Légère blessure',
        text: `${d.firstName} ${d.name} a signalé une douleur cervicale après les EL. Rien de grave mais le médecin recommande du repos. Le prochain GP est dans 5 jours. Décision ?`,
        choices: [
          { text:"Sa santé d'abord. On évalue au jour le jour.", effect:{moral:+10,confiance:+8,loyalty:+8}, label:'❤️ Santé prioritaire', type:'positive' },
          { text:"Traitement intensif et on l'aligne si possible.", effect:{moral:+3,confiance:+3,loyalty:+2}, label:'💊 Traitement', type:'neutral' },
          { text:"On a besoin de lui. Il roule sauf avis médical contraire.", effect:{moral:-8,confiance:-6,loyalty:-5,pace:-2}, label:'⚠️ Risqué', type:'negative' },
        ]
      });
      save[`social_injury_${d.id}_${season}`] = true;
    }

    // ── Demande statut numéro 1 ──────────────────────────────
    else if (driverRank <= 5 && yearsLeft >= 2 && !save[`social_n1_${d.id}_${season}`] && Math.random() < 0.25) {
      events.push({ id:`n1_${d.id}_${season}`, driverId:d.id, type:'number1', trigger:'Demande statut numéro 1',
        text: `Fort de ses résultats, ${d.firstName} ${d.name} réclame le statut de premier pilote officiel. Il veut la priorité sur les pièces, le setup et la stratégie. Ça impactera son équipier.`,
        choices: [
          { text:"Tu l'as mérité. Tu es notre pilote numéro 1.", effect:{moral:+12,confiance:+10,loyalty:+8,pace:+2}, label:'⭐ Accordé', type:'positive' },
          { text:"Les deux pilotes restent à égalité. C'est notre philosophie.", effect:{moral:-3,confiance:+2}, label:'⚖️ Égalité', type:'neutral' },
          { text:"Les résultats décident. Prouve-le sur la piste.", effect:{moral:-5,confiance:-3,loyalty:-4,pace:+3}, label:'🏁 Mérite', type:'negative' },
        ]
      });
      save[`social_n1_${d.id}_${season}`] = true;
    }

    // ── DNF récent ──────────────────────────────────────────
    if (lastResult?.status === 'dnf' && !save[`social_dnf_${d.id}_${race}`]) {
      const msgs = [
        `${d.firstName} ${d.name} est dans le garage, casque encore sur la tête. L'abandon du dernier GP pèse lourd. Il faudrait lui parler.`,
        `${d.firstName} ${d.name} n'a pas dit un mot depuis l'abandon. Les mécaniciens sont mal à l'aise. En tant que Team Principal, c'est à vous d'intervenir.`,
        `Abandon brutal pour ${d.firstName} ${d.name}. La frustration est visible sur son visage. Comment gérez-vous la situation ?`,
      ];
      events.push({ id:`dnf_${d.id}_${race}`, driverId:d.id, type:'dnf', trigger:'Abandon au dernier GP',
        text: msgs[Math.floor(Math.random()*msgs.length)],
        choices: [
          { text:"C'était mécanique, pas ta faute. On règle ça en usine.", effect:{moral:+8,confiance:+5,loyalty:+3}, label:'🤝 Soutien', type:'positive' },
          { text:"Analysons les données ensemble. Tu aurais pu anticiper ?", effect:{moral:+2,confiance:+4}, label:'📊 Analyse', type:'neutral' },
          { text:"Ces abandons coûtent des millions aux sponsors. Sois plus prudent.", effect:{moral:-10,confiance:-6,loyalty:-3,pace:+2}, label:'😤 Pression', type:'negative' },
        ]
      });
      save[`social_dnf_${d.id}_${race}`] = true;
    }

    // ── Moral très bas ───────────────────────────────────────
    else if (moral < 35 && !save[`social_moral_${d.id}_${race}`]) {
      const msgs = [
        `${d.firstName} ${d.name} semble distant ces derniers jours. Ses réponses en conférence de presse sont laconiques, ses tours de chauffe moins engagés.`,
        `Le staff technique rapporte que ${d.firstName} ${d.name} quitte le garage dès la fin des sessions sans débriefing. Quelque chose ne va pas.`,
        `${d.firstName} ${d.name} a été photographié dans un restaurant rival hier soir. La rumeur court. Il faudrait clarifier la situation.`,
      ];
      events.push({ id:`moralLow_${d.id}_${race}`, driverId:d.id, type:'moral', trigger:'Moral en baisse',
        text: msgs[Math.floor(Math.random()*msgs.length)],
        choices: [
          { text:"Je crois en toi et en ce projet. Tu es essentiel ici.", effect:{moral:+14,confiance:+7,loyalty:+5}, label:'💪 Soutien fort', type:'positive' },
          { text:"Qu'est-ce qui se passe vraiment ? Parle-moi franchement.", effect:{moral:+6,confiance:+10}, label:'🤝 Dialogue', type:'neutral' },
          { text:"Les résultats doivent s'améliorer ou on reconsidère tout.", effect:{moral:-8,confiance:-6,loyalty:-5,pace:+3}, label:'⚠️ Ultimatum', type:'negative' },
        ]
      });
      save[`social_moral_${d.id}_${race}`] = true;
    }

    // ── Contrat qui expire bientôt ───────────────────────────
    else if (yearsLeft <= 1 && !save[`social_contract_${d.id}_${season}`]) {
      const msgs = [
        `L'agent de ${d.firstName} ${d.name} a contacté deux équipes rivales. Le pilote attend un signal de votre part avant de prendre une décision.`,
        `${d.firstName} ${d.name} vous a demandé un entretien. Son contrat expire en fin de saison et il veut savoir où il en est dans vos plans.`,
        `La presse spécule sur l'avenir de ${d.firstName} ${d.name}. Son entourage confirme que des offres sont sur la table. À vous de jouer.`,
      ];
      events.push({ id:`contract_${d.id}_${season}`, driverId:d.id, type:'contract', trigger:'Contrat en fin de saison',
        text: msgs[Math.floor(Math.random()*msgs.length)],
        choices: [
          { text:"On te prolonge. Tu es central à notre projet long terme.", effect:{moral:+12,confiance:+12,loyalty:+10,contractSignal:true}, label:'✅ Prolongation', type:'positive' },
          { text:"Je veux te garder mais j'ai besoin d'un peu de temps.", effect:{moral:+3,confiance:+3,loyalty:-2}, label:'⏳ Patience', type:'neutral' },
          { text:"On évalue toutes les options. Rien n'est décidé.", effect:{moral:-8,confiance:-10,loyalty:-8}, label:'❄️ Ambiguïté', type:'negative' },
        ]
      });
      save[`social_contract_${d.id}_${season}`] = true;
    }

    // ── Excellente performance ───────────────────────────────
    else if (lastResult?.position <= 3 && lastResult?.position && !save[`social_podium_${d.id}_${race}`]) {
      const msgs = [
        `${d.firstName} ${d.name} est sur un nuage après son P${lastResult.position}. Le garage était en feu à l'arrivée. C'est le moment de capitaliser sur cette énergie.`,

  else if (!save[`eng_engine_${race}_${season}`] && race > 4 && Math.random() < 0.25) {
    const totalTokens = save.tokens || 0;
    events.push({
      id: `eng_engine_${race}_${season}`,
      driverId: 'engineer',
      type: 'engineer',
      trigger: 'Mode moteur — performance vs préservation',
      text: `${engName} vous propose de passer temporairement en mode moteur performance. Gain de 2-3 dixièmes par tour mais usure accrue. Un compromis à valider selon les objectifs du week-end.`,
      choices: [
        { text: "Mode performance. On a besoin de tout pour ce GP.", effect: { engineMode: 'performance', pace: 2, reliability: -2 }, label: '🔥 Tout feu', type: 'positive' },
        { text: "Mode standard. On reste sur notre réglage habituel.", effect: { engineMode: 'standard' }, label: '⚙️ Standard', type: 'neutral' },
        { text: "Mode économie. On préserve le moteur pour les prochains GP.", effect: { engineMode: 'save', pace: -1, reliability: 3 }, label: '🛡️ Préservation', type: 'negative' },
      ]
    });
    save[`eng_engine_${race}_${season}`] = true;
  }

  // Upgrade en livraison — installer maintenant ou attendre
  else if (!save[`eng_upgrade_${race}_${season}`] && (save.carDev?.aero?.pending?.length > 0 || save.carDev?.chassis?.pending?.length > 0) && Math.random() < 0.5) {
    const pendingDomain = save.carDev?.aero?.pending?.length > 0 ? 'aéro' : 'châssis';
    events.push({
      id: `eng_upgrade_${race}_${season}`,
      driverId: 'engineer',
      type: 'engineer',
      trigger: 'Upgrade disponible — timing installation',
      text: `L'upgrade ${pendingDomain} est prêt. ${engName} peut l'installer maintenant avec peu de données de corrélation, ou attendre le prochain GP pour une intégration optimale.`,
      choices: [
        { text: "On l'installe maintenant. Chaque GP avec la nouvelle pièce compte.", effect: { upgradeNow: true, setupRisk: 1 }, label: '🔩 Installer maintenant', type: 'positive' },
        { text: "On attend le prochain GP pour une corrélation complète.", effect: { upgradeNow: false }, label: '⏳ Attendre', type: 'neutral' },
        { text: "On installe sur une seule voiture pour tester en conditions réelles.", effect: { upgradeNow: true, upgradeTest: true }, label: '🧪 Test sur une voiture', type: 'negative' },
      ]
    });
    save[`eng_upgrade_${race}_${season}`] = true;
  }

  return events;
}

function applyChoice(event, choice) {
  const e = choice.effect;
  const d = F1Data.drivers.find(x => x.id === event.driverId);
  const dName = d ? `${d.firstName} ${d.name}` : 'Pilote';

  // Moral
  if (e.moral) {
    if (!save.immersion) save.immersion = {};
    if (!save.immersion.driverMorale) save.immersion.driverMorale = {};
    if (!save.immersion.driverMorale[event.driverId]) save.immersion.driverMorale[event.driverId] = { value: 70 };
    const cur = save.immersion.driverMorale[event.driverId].value || 70;
    save.immersion.driverMorale[event.driverId].value = Math.max(0, Math.min(100, cur + e.moral));
  }

  // Confiance
  if (!save.driverConfidence) save.driverConfidence = {};
  if (e.confiance) {
    const cur = save.driverConfidence[event.driverId] || 50;
    save.driverConfidence[event.driverId] = Math.max(0, Math.min(100, cur + e.confiance));
  }

  // Loyauté
  if (!save.driverLoyalty) save.driverLoyalty = {};
  if (e.loyalty) {
    const cur = save.driverLoyalty[event.driverId] || 50;
    save.driverLoyalty[event.driverId] = Math.max(0, Math.min(100, cur + e.loyalty));
  }

  // Signal contrat
  if (e.contractSignal) {
    save[`contractSignal_${event.driverId}`] = true;
  }

  // Effets ingénieur
  if (e.tokenBonus && e.tokenBonus > 0) {
    save.tokens = (save.tokens||0) + e.tokenBonus;
  }
  if (e.rdBonus) {
    if (!save.carDev) save.carDev = {};
    if (!save.carDev[e.rdBonus]) save.carDev[e.rdBonus] = { level: 70, done: [], pending: [] };
    save.carDev[e.rdBonus].level = Math.min(100, (save.carDev[e.rdBonus].level||70) + 1);
  }
  if (e.setupBonus) {
    save.weekendSetup = e.setupBonus;
  }
  if (e.weatherBonus && e.weatherBonus > 0) {
    const drivers2 = F1Data.drivers.filter(d => d.teamId === save.playerTeamId && !d.retired);
    drivers2.forEach(d => {
      if (!save.immersion) save.immersion = {};
      if (!save.immersion.driverMorale) save.immersion.driverMorale = {};
      if (!save.immersion.driverMorale[d.id]) save.immersion.driverMorale[d.id] = { value: 70 };
      const cur = save.immersion.driverMorale[d.id].value || 70;
      save.immersion.driverMorale[d.id].value = Math.min(100, cur + e.weatherBonus);
    });
  }
  if (e.reliabilityBonus && e.reliabilityBonus > 0) {
    // Améliore la fiabilité de la voiture temporairement
    if (!save.carDev) save.carDev = {};
    if (!save.carDev.reliability) save.carDev.reliability = { level: 70, done: [], pending: [] };
    save.carDev.reliability.level = Math.min(100, (save.carDev.reliability.level||70) + e.reliabilityBonus);
  }
  if (e.pace && e.pace !== 0) {
    // Impact temporaire sur les pilotes de l'équipe
    const drivers3 = F1Data.drivers.filter(d => d.teamId === save.playerTeamId && !d.retired);
    if (!save.engineModeBonus) save.engineModeBonus = {};
    drivers3.forEach(d => { save.engineModeBonus[d.id] = (save.engineModeBonus[d.id]||0) + e.pace; });
  }
  if (e.upgradeNow) {
    // Signal d'installation immédiate — pris en compte dans rd.html
    save._upgradeNowSignal = true;
  }
  if (e.dnfRisk) {
    // Augmente légèrement le risque de DNF pour le prochain GP
    save._dnfRiskBonus = (save._dnfRiskBonus || 0) + 0.05;
  }

  // Marquer comme résolu
  if (!save.socialEvents) save.socialEvents = [];
  const existing = save.socialEvents.find(ev => ev.id === event.id);
  if (existing) {
    existing.resolved = true;
    existing.read = true;
    existing.choiceMade = choice.text;
  }

  // Ajouter à l'historique social
  if (!save.socialHistory) save.socialHistory = [];
  save.socialHistory.unshift({
    date: new Date().toISOString(),
    driverName: dName,
    trigger: event.trigger,
    choice: choice.text,
    effects: e,
    race: save.race || 0,
  });
  save.socialHistory = save.socialHistory.slice(0, 30);

  // News
  if (!save.news) save.news = [];
  save.news.push({
    icon: '💬', category: 'social',
    title: `Discussion — ${dName}`,
    text: `${event.trigger} : "${choice.text.substring(0, 60)}..."`,
    season: save.season, race: save.race,
  });

  Save.save(save);
  save = Save.load();

  showToast(`✅ ${dName} — ${choice.label}`);
  render();
}

function showToast(msg) {
  const t = document.getElementById('toastSocial');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function moralColor(v) { return v>=70?'var(--green)':v>=40?'var(--gold)':'var(--accent)'; }
function moralLabel(v) { return v>=70?'En forme':v>=40?'Correct':'Bas'; }

function render() {
  if (!save?.playerTeamId) {
    document.getElementById('content').innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted)">Aucune carrière. <a href="index.html" style="color:var(--accent)">Retour</a></div>';
    return;
  }

  const drivers  = F1Data.drivers.filter(d => d.teamId === save.playerTeamId && !d.retired);
  const season   = save.season || 2025;
  const race     = save.race || 0;
  const myTeam   = F1Data.teams.find(t => t.id === save.playerTeamId);

  // Générer les nouveaux événements sociaux
  const newEvents = generateSocialEvents(save);
  if (!save.socialEvents) save.socialEvents = [];
  newEvents.forEach(ev => {
    if (!save.socialEvents.find(e => e.id === ev.id)) {
      save.socialEvents.push({ ...ev, read: false, resolved: false });
    }
  });
  if (newEvents.length) Save.save(save);

  // Topbar
  const pending = save.socialEvents.filter(e => !e.resolved && !e.read).length;
  document.getElementById('topPills').innerHTML = `
    <span style="font-family:var(--fh);font-size:11px;color:var(--muted)">Saison ${season}</span>
    ${pending > 0 ? `<span style="font-family:var(--fh);font-size:11px;padding:3px 8px;background:rgba(232,0,61,.15);border:1px solid rgba(232,0,61,.3);border-radius:4px;color:var(--accent)">${pending} message${pending>1?'s':''}</span>` : ''}`;

  // Atmosphère équipe
  const avgMoral = Math.round(drivers.reduce((s,d) => s + (save.immersion?.driverMorale?.[d.id]?.value ?? 70), 0) / Math.max(1, drivers.length));
  const avgConf  = Math.round(drivers.reduce((s,d) => s + (save.driverConfidence?.[d.id] ?? 50), 0) / Math.max(1, drivers.length));
  const avgLoy   = Math.round(drivers.reduce((s,d) => s + (save.driverLoyalty?.[d.id] ?? 50), 0) / Math.max(1, drivers.length));
  const atmoLabel = avgMoral >= 70 && avgConf >= 60 ? '🔥 Excellente' : avgMoral >= 50 ? '👍 Bonne' : '😟 Tendue';

  // Discussions en attente
  const pendingEvents = save.socialEvents.filter(e => !e.resolved);

  let html = `
    <div class="section">
      <div class="section-title">🏢 Atmosphère équipe</div>
      <div class="team-atmo">
        <div class="ta-row"><span>Ambiance générale</span><b style="color:${moralColor(avgMoral)}">${atmoLabel}</b></div>
        <div class="ta-row"><span>Moral moyen</span><b style="color:${moralColor(avgMoral)}">${avgMoral}/100</b></div>
        <div class="ta-row"><span>Confiance moyenne</span><b style="color:${moralColor(avgConf)}">${avgConf}/100</b></div>
        <div class="ta-row"><span>Loyauté moyenne</span><b style="color:${moralColor(avgLoy)}">${avgLoy}/100</b></div>
      </div>
    </div>`;

  // Discussions en attente
  if (pendingEvents.length) {
    html += `<div class="section"><div class="section-title">💬 Discussions en attente (${pendingEvents.length})</div>`;
    pendingEvents.forEach(ev => {
      const d = F1Data.drivers.find(x => x.id === ev.driverId);
      html += `<div class="discussion-card">
        <div class="dc-trigger">${ev.trigger}</div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span style="font-size:18px">${ev.type==='engineer'?'🔧':(d?.flag||'🏁')}</span>
          <span style="font-family:var(--fh);font-weight:700">${ev.type==='engineer'?'Ingénieur de piste':(d?.firstName||'')+' '+(d?.name||ev.driverId)}</span>
        </div>
        <div class="dc-text">${ev.text}</div>
        <div class="dc-choices">
          ${ev.choices.map((c,i) => `
            <div class="dc-choice ${c.type}" onclick='handleChoice(${JSON.stringify(ev.id)}, ${i})'>
              <span class="cc-text">${c.text}</span>
              <span class="cc-effect">${c.label}</span>
            </div>
          `).join('')}
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  // Fiches pilotes
  html += `<div class="section"><div class="section-title">🏎️ Vos pilotes</div>`;
  drivers.forEach(d => {
    const moral    = save.immersion?.driverMorale?.[d.id]?.value ?? 70;
    const confiance= save.driverConfidence?.[d.id] ?? 50;
    const loyalty  = save.driverLoyalty?.[d.id] ?? 50;
    const contract = save.contracts?.[d.id];
    const years    = contract?.years ?? 2;
    const pts      = save.driverStandings?.[d.id] || 0;

    html += `<div class="driver-social" style="--accent:${F1Data.teams.find(t=>t.id===d.teamId)?.color||'#0090FF'}">
      <div class="ds-header">
        <div class="ds-flag">${d.flag||'🏁'}</div>
        <div class="ds-info">
          <div class="ds-name">${d.firstName} ${d.name}</div>
          <div class="ds-sub">${d.age} ans · Contrat : ${years} an${years!==1?'s':''} · ${pts} pts championship</div>
        </div>
        <div class="ds-number">${d.number}</div>
      </div>
      <div class="gauges">
        <div class="gauge">
          <div class="g-val" style="color:${moralColor(moral)}">${moral}</div>
          <div class="g-lbl">Moral</div>
          <div class="g-bar"><div class="g-fill" style="width:${moral}%;background:${moralColor(moral)}"></div></div>
        </div>
        <div class="gauge">
          <div class="g-val" style="color:${moralColor(confiance)}">${confiance}</div>
          <div class="g-lbl">Confiance</div>
          <div class="g-bar"><div class="g-fill" style="width:${confiance}%;background:${moralColor(confiance)}"></div></div>
        </div>
        <div class="gauge">
          <div class="g-val" style="color:${moralColor(loyalty)}">${loyalty}</div>
          <div class="g-lbl">Loyauté</div>
          <div class="g-bar"><div class="g-fill" style="width:${loyalty}%;background:${moralColor(loyalty)}"></div></div>
        </div>
      </div>
    </div>`;
  });
  html += `</div>`;

  // Historique des discussions
  const history = (save.socialHistory || []).slice(0, 10);
  if (history.length) {
    html += `<div class="section"><div class="section-title">📋 Historique</div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px">
        ${history.map(h => `
          <div class="history-item">
            <div class="hi-icon">💬</div>
            <div>
              <div class="hi-text"><b style="color:var(--text)">${h.driverName}</b> — ${h.trigger}<br><span style="color:rgba(255,255,255,.4)">"${h.choice.substring(0,50)}..."</span></div>
              <div class="hi-date">GP ${h.race || '—'} · Saison ${save.season||2025}</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>`;
  }

  document.getElementById('content').innerHTML = html;
}

function handleChoice(eventId, choiceIndex) {
  const ev = save.socialEvents.find(e => e.id === eventId);
  if (!ev) return;
  const choice = ev.choices[choiceIndex];
  if (!choice) return;
  applyChoice(ev, choice);
}

render();
</script>
</body>
</html>
