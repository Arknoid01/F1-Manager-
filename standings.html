<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F1 Manager — Championnat</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;0,900;1,700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;0,900;1,700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070d;--surface:#0f0f18;--surface2:#161622;--border:#22223a;
  --text:#e4e4f0;--muted:#55556a;--accent:#e8003d;--gold:#f5c842;
  --green:#00d97e;--blue:#3d7eff;--orange:#ff8c42;--purple:#a855f7;
  --fh:'Barlow Condensed',sans-serif;--fb:'Barlow',sans-serif;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--fb);font-size:14px}
.topbar{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;position:sticky;top:0;z-index:100}
.logo{font-family:var(--fh);font-weight:900;font-size:22px;letter-spacing:3px;color:var(--accent)}
.logo span{color:var(--text)}
.top-pills{margin-left:auto;display:flex;gap:8px;align-items:center}
.pill{font-family:var(--fh);font-weight:700;font-size:13px;padding:4px 12px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);white-space:nowrap}
.pill-gold{color:var(--gold);border-color:#3a3400;background:#161200}
.pill-muted{color:var(--muted)}
.page{padding:12px;display:flex;flex-direction:column;gap:12px;max-width:800px;margin:0 auto}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.ph{background:var(--surface2);border-bottom:1px solid var(--border);padding:8px 14px;font-family:var(--fh);font-weight:700;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:8px}
.ph .dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
.ph .ml{margin-left:auto;font-weight:400;letter-spacing:0;font-size:11px}
.sec-lbl{font-family:var(--fh);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);padding-bottom:6px;border-bottom:1px solid var(--border)}
.btn{font-family:var(--fh);font-weight:700;font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:6px 14px;border:none;border-radius:4px;cursor:pointer;text-decoration:none;display:inline-block;transition:all .15s}
.btn-red{background:var(--accent);color:#fff}.btn-red:hover{background:#ff1a52}.btn-red:disabled{background:#3a1a22;color:#664;cursor:not-allowed}
.btn-gold{background:#161200;color:var(--gold);border:1px solid #3a3400}.btn-gold:hover{background:#2a2400}
.btn-sec{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.btn-sec:hover{border-color:var(--accent);color:var(--accent)}
.btn-green{background:#001a0a;color:var(--green);border:1px solid #003a18}
.sbar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.sbar-fill{height:100%;border-radius:2px;transition:width .5s}
.tile{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:13px;text-decoration:none;color:inherit;display:block;transition:background .1s}
.tile:active{background:var(--surface2)}
.tile-icon{font-size:20px;margin-bottom:6px;display:block}
.tile-lbl{font-family:var(--fh);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.tile-val{font-family:var(--fh);font-weight:900;font-size:20px;line-height:1;margin-bottom:3px}
.tile-sub{font-family:var(--fh);font-size:11px;color:var(--muted);line-height:1.4}
.tiles-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:6px;padding:10px 18px;font-family:var(--fh);font-size:13px;z-index:500;transition:transform .3s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.error{border-left-color:var(--accent)}
select{background:var(--surface);color:var(--text);border:1px solid var(--border);padding:5px 8px;border-radius:4px;font-family:var(--fh);font-size:12px;outline:none}
input[type=number],input[type=text]{background:var(--surface);color:var(--text);border:1px solid var(--border);padding:5px 8px;border-radius:4px;font-family:var(--fh);font-size:12px;outline:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
/* === Page standings === */
.page{padding:14px;display:flex;flex-direction:column;gap:14px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:760px){.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">F1<span>Manager</span></div>
  <a href="index.html" style="font-family:var(--fh);font-size:12px;color:var(--muted);text-decoration:none;padding:4px 8px;border:1px solid var(--border);border-radius:4px">← Accueil</a>
  <div class="top-pills">
    <div class="pill pill-muted" id="seasonBadge">—</div>
    <div class="pill pill-gold" id="budgetBadge">—</div>
  </div>
</div>
  <div class="topbar-right"><div class="season-badge" id="seasonBadge">Saison 2025</div></div>
</div>
<div class="page">
  <div class="panel"><div class="ph"><div class="dot"></div>Résumé de carrière</div><div class="summary" id="summary"></div></div>
  <div class="grid2">
    <div class="panel"><div class="ph"><div class="dot"></div>Classement pilotes</div><div class="table" id="driversTable"></div></div>
    <div class="panel"><div class="ph"><div class="dot"></div>Classement constructeurs</div><div class="table" id="teamsTable"></div></div>
  </div>
  <div class="panel"><div class="ph"><div class="dot"></div>Calendrier complet</div><div class="history" id="calendar"></div></div>
  <div class="panel"><div class="ph"><div class="dot"></div>Historique des Grands Prix</div><div class="history" id="history"></div></div>
</div>
<script src="js/data.js"></script>
<script src="js/save.js"></script>
<script src="js/career.js"></script>
<script src="js/profiles.js"></script>
<script src="js/career.js"></script>
<script src="js/events.js"></script>
<script>
function pts(map, id){ return (map && map[id]) || 0; }
function render() {
  const save = Save.load();
  if (save && window.Profiles) Profiles.restoreDrivers(save);
  if (!save || !save.playerTeamId) {
    document.getElementById('summary').innerHTML = '<div class="empty">Aucune carrière trouvée. Choisis d’abord une équipe.</div>';
    document.getElementById('driversTable').innerHTML = '';
    document.getElementById('teamsTable').innerHTML = '';
    document.getElementById('history').innerHTML = '<a class="btn" href="index.html">Créer une carrière</a>';
    return;
  }
  const playerTeam = F1Data.teams.find(t => t.id === save.playerTeamId);
  const racesDone = (save.raceResults || []).length;
  const nextCircuit = F1Data.circuits[(save.race || 0) % F1Data.circuits.length];
  document.getElementById('seasonBadge').textContent = `Saison ${save.season || 2025}`;
  document.getElementById('summary').innerHTML = `
    <div class="card"><div class="label">Équipe</div><div class="value" style="color:${playerTeam.color}">${playerTeam.shortName}</div></div>
    <div class="card"><div class="label">Budget</div><div class="value">${save.budget || 0}M €</div></div>
    <div class="card"><div class="label">Tokens</div><div class="value">${save.tokens || 0}</div></div>
    <div class="card"><div class="label">Prochain GP</div><div class="value">${nextCircuit.name}</div></div>`;

  const driverRows = F1Data.drivers.filter(d=>!d.retired && (d.teamId || pts(save.driverStandings,d.id) > 0)).sort((a,b)=>pts(save.driverStandings,b.id)-pts(save.driverStandings,a.id));
  document.getElementById('driversTable').innerHTML = '<div class="row header"><div>Pos</div><div>Pilote</div><div style="text-align:right">Pts</div></div>' + driverRows.map((d,i)=>{
    const t=F1Data.teams.find(x=>x.id===d.teamId);
    return `<div class="row"><div class="pos">${i+1}</div><div><div class="name" style="color:${t?.color || '#fff'}">${Profiles.linkDriver(d)}</div><div class="team">${t?Profiles.linkTeam(t):'Agent libre'}</div></div><div class="pts">${pts(save.driverStandings,d.id)}</div></div>`;
  }).join('');

  const teamRows = [...F1Data.teams].sort((a,b)=>pts(save.teamStandings,b.id)-pts(save.teamStandings,a.id));
  document.getElementById('teamsTable').innerHTML = '<div class="row header"><div>Pos</div><div>Équipe</div><div style="text-align:right">Pts</div></div>' + teamRows.map((t,i)=>
    `<div class="row"><div class="pos">${i+1}</div><div><div class="name" style="color:${t?.color || '#fff'}">${Profiles.linkTeam(t)}</div><div class="team">${t.shortName}</div></div><div class="pts">${pts(save.teamStandings,t.id)}</div></div>`
  ).join('');

  const currentRaceIndex = Number(save.race) || 0;
  document.getElementById('calendar').innerHTML = F1Data.circuits.map((c,i) => {
    const status = i < currentRaceIndex ? '✅ Disputé' : i === currentRaceIndex ? '➡️ Prochain' : '—';
    return `<div class="race"><div><div class="race-title">${i+1}. GP de ${c.name}</div><div class="race-sub">${c.fullName} · ${c.laps} tours · ${c.lapDistance} km/tour</div></div><div class="pts" style="font-size:14px">${status}</div></div>`;
  }).join('');

  const hist = [...(save.raceResults || [])].reverse();
  document.getElementById('history').innerHTML = hist.length ? hist.map(r => {
    const winner = r.results && r.results[0];
    const d = winner ? F1Data.drivers.find(x=>x.id===winner.driverId) : null;
    return `<div class="race"><div><div class="race-title">GP de ${r.circuitName}</div><div class="race-sub">Vainqueur : ${d ? Profiles.linkDriver(d) : '—'} · Gains : +${r.reward || 0}M € · +${r.tokens || 0} token(s)</div></div><div class="pts">#${(r.raceIndex || 0)+1}</div></div>`;
  }).join('') : '<div class="empty">Aucune course disputée pour l’instant.</div>';
}
render();

// ── Restaurer les états pilotes depuis la save ─────────────
function restoreDriverStates() {
  const save = Save.load();
  if (!save) return;

  // Restaurer les états sauvegardés (teamId, âge, stats, retraite...)
  if (save.driverStates) {
    F1Data.drivers.forEach(d => {
      const state = save.driverStates[d.id];
      if (!state) return;
      d.age         = state.age         ?? d.age;
      d.pace        = state.pace        ?? d.pace;
      d.consistency = state.consistency ?? d.consistency;
      d.wetSkill    = state.wetSkill    ?? d.wetSkill;
      d.overtaking  = state.overtaking  ?? d.overtaking;
      d.defending   = state.defending   ?? d.defending;
      d.salary      = state.salary      ?? d.salary;
      d.trait       = state.trait       ?? d.trait;
      d.potential   = state.potential   ?? d.potential;
      d.retired     = state.retired     ?? false;
      d.teamId      = state.teamId;  // ← crucial : teamId depuis la save
      d.seasons     = state.seasons  ?? 0;
    });
  }

  // Restaurer les pilotes générés
  if (save.generatedDrivers?.length) {
    save.generatedDrivers.forEach(gd => {
      if (!F1Data.drivers.find(d => d.id === gd.id)) {
        F1Data.drivers.push(gd);
      } else {
        const idx = F1Data.drivers.findIndex(d => d.id === gd.id);
        if (save.driverStates?.[gd.id]) {
          Object.assign(F1Data.drivers[idx], save.driverStates[gd.id]);
        }
      }
    });
  }
}
restoreDriverStates();

</script>
</body>
</html>
