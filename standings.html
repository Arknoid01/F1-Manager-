<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F1 Manager — Championnat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;--border:#2a2a3e;--text:#e8e8f0;--muted:#6a6a8a;--accent:#e8003d;--gold:#ffd700;--green:#00e676;--font-h:'Barlow Condensed',sans-serif;--font-b:'Barlow',sans-serif}
    body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:14px}
    .topbar{background:var(--surface);border-bottom:2px solid var(--accent);padding:0 14px;height:50px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}.logo{font-family:var(--font-h);font-weight:900;font-size:20px;color:var(--accent);letter-spacing:2px;text-transform:uppercase}.logo span{color:var(--text)}.nav-link{font-family:var(--font-h);font-size:13px;font-weight:700;color:var(--muted);text-decoration:none;letter-spacing:1px;text-transform:uppercase;padding:4px 8px;border-radius:3px}.nav-link:hover,.nav-link.active{color:var(--accent)}.topbar-right{margin-left:auto}.season-badge{font-family:var(--font-h);font-weight:700;font-size:14px;color:var(--gold);background:#1a1a00;border:1px solid #3a3a00;padding:4px 12px;border-radius:4px}
    .page{padding:14px;display:flex;flex-direction:column;gap:14px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:760px){.grid2{grid-template-columns:1fr}}
    .panel{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden}.ph{background:var(--surface2);border-bottom:1px solid var(--border);padding:8px 14px;font-family:var(--font-h);font-weight:700;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:8px}.dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
    .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:14px}@media(max-width:760px){.summary{grid-template-columns:1fr 1fr}}.card{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:12px}.card .label{font-family:var(--font-h);font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}.card .value{font-family:var(--font-h);font-weight:900;font-size:25px;color:var(--gold);margin-top:3px}.table{display:flex;flex-direction:column}.row{display:grid;grid-template-columns:44px 1fr 70px;gap:10px;align-items:center;padding:9px 12px;border-bottom:1px solid var(--border)}.row.header{font-family:var(--font-h);font-size:11px;color:var(--muted);text-transform:uppercase;background:#0e0e16}.pos{font-family:var(--font-h);font-size:18px;font-weight:900;color:var(--gold)}.name{font-family:var(--font-h);font-size:16px;font-weight:700}.team{font-size:10px;color:var(--muted);margin-top:2px}.pts{font-family:var(--font-h);font-size:18px;font-weight:900;text-align:right}.empty{padding:22px;text-align:center;color:var(--muted);font-family:var(--font-h);font-size:14px}.history{padding:12px;display:flex;flex-direction:column;gap:8px}.race{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:10px;display:flex;justify-content:space-between;gap:12px}.race-title{font-family:var(--font-h);font-weight:700;font-size:15px}.race-sub{font-size:11px;color:var(--muted);margin-top:3px}.btn{font-family:var(--font-h);font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;padding:6px 12px;border-radius:4px;text-decoration:none;background:var(--accent);color:#fff;display:inline-block}
  </style>
</head>
<body>
<div class="topbar">
  <div class="logo">F1<span>Manager</span></div>
  <a href="index.html" class="nav-link">🏠 Équipe</a>
  <a href="race.html" class="nav-link">🏁 Course</a>
  <a href="standings.html" class="nav-link active">🏆 Championnat</a>
  <div class="topbar-right"><div class="season-badge" id="seasonBadge">Saison 2025</div></div>
</div>
<div class="page">
  <div class="panel"><div class="ph"><div class="dot"></div>Résumé de carrière</div><div class="summary" id="summary"></div></div>
  <div class="grid2">
    <div class="panel"><div class="ph"><div class="dot"></div>Classement pilotes</div><div class="table" id="driversTable"></div></div>
    <div class="panel"><div class="ph"><div class="dot"></div>Classement constructeurs</div><div class="table" id="teamsTable"></div></div>
  </div>
  <div class="panel"><div class="ph"><div class="dot"></div>Historique des Grands Prix</div><div class="history" id="history"></div></div>
</div>
<script src="js/data.js"></script>
<script src="js/save.js"></script>
<script>
function pts(map, id){ return (map && map[id]) || 0; }
function render() {
  const save = Save.load();
  if (!save || !save.playerTeamId) {
    document.getElementById('summary').innerHTML = '<div class="empty">Aucune carrière trouvée. Choisis d’abord une équipe.</div>';
    document.getElementById('driversTable').innerHTML = '';
    document.getElementById('teamsTable').innerHTML = '';
    document.getElementById('history').innerHTML = '<a class="btn" href="index.html">Créer une carrière</a>';
    return;
  }
  const playerTeam = F1Data.teams.find(t => t.id === save.playerTeamId);
  const racesDone = (save.raceResults || []).length;
  const nextCircuit = F1Data.circuits[(save.race || 0) % F1Data.circuits.length];
  document.getElementById('seasonBadge').textContent = `Saison ${save.season || 2025}`;
  document.getElementById('summary').innerHTML = `
    <div class="card"><div class="label">Équipe</div><div class="value" style="color:${playerTeam.color}">${playerTeam.shortName}</div></div>
    <div class="card"><div class="label">Budget</div><div class="value">${save.budget || 0}M €</div></div>
    <div class="card"><div class="label">Tokens</div><div class="value">${save.tokens || 0}</div></div>
    <div class="card"><div class="label">Prochain GP</div><div class="value">${nextCircuit.name}</div></div>`;

  const driverRows = [...F1Data.drivers].sort((a,b)=>pts(save.driverStandings,b.id)-pts(save.driverStandings,a.id));
  document.getElementById('driversTable').innerHTML = '<div class="row header"><div>Pos</div><div>Pilote</div><div style="text-align:right">Pts</div></div>' + driverRows.map((d,i)=>{
    const t=F1Data.teams.find(x=>x.id===d.teamId);
    return `<div class="row"><div class="pos">${i+1}</div><div><div class="name" style="color:${t.color}">${d.firstName} ${d.name}</div><div class="team">${t.name}</div></div><div class="pts">${pts(save.driverStandings,d.id)}</div></div>`;
  }).join('');

  const teamRows = [...F1Data.teams].sort((a,b)=>pts(save.teamStandings,b.id)-pts(save.teamStandings,a.id));
  document.getElementById('teamsTable').innerHTML = '<div class="row header"><div>Pos</div><div>Équipe</div><div style="text-align:right">Pts</div></div>' + teamRows.map((t,i)=>
    `<div class="row"><div class="pos">${i+1}</div><div><div class="name" style="color:${t.color}">${t.name}</div><div class="team">${t.shortName}</div></div><div class="pts">${pts(save.teamStandings,t.id)}</div></div>`
  ).join('');

  const hist = [...(save.raceResults || [])].reverse();
  document.getElementById('history').innerHTML = hist.length ? hist.map(r => {
    const winner = r.results && r.results[0];
    const d = winner ? F1Data.drivers.find(x=>x.id===winner.driverId) : null;
    return `<div class="race"><div><div class="race-title">GP de ${r.circuitName}</div><div class="race-sub">Vainqueur : ${d ? d.firstName + ' ' + d.name : '—'} · Gains : +${r.reward || 0}M € · +${r.tokens || 0} token(s)</div></div><div class="pts">#${(r.raceIndex || 0)+1}</div></div>`;
  }).join('') : '<div class="empty">Aucune course disputée pour l’instant.</div>';
}
render();
</script>
</body>
</html>
