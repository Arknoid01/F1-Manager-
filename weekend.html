  <style>/* TEAM SELECT */

<script>

// ══════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════
let save       = null;
let circuit    = null;
let myDrivers  = [];
let phase      = 'fp'; // fp | quali | race_briefing

// Résultats accumulés
let fpResults  = [];   // résultats EL
let qualiResult= null; // résultat qualifs

const CIRCUIT_FLAGS = {
  bahrain:'🇧🇭',jeddah:'🇸🇦',melbourne:'🇦🇺',imola:'🇮🇹',miami:'🇺🇸',monaco:'🇲🇨',
  canada:'🇨🇦',barcelona:'🇪🇸',austria:'🇦🇹',silverstone:'🇬🇧',hungary:'🇭🇺',
  spa:'🇧🇪',zandvoort:'🇳🇱',monza:'🇮🇹',baku:'🇦🇿',singapore:'🇸🇬',suzuka:'🇯🇵',
  qatar:'🇶🇦',cota:'🇺🇸',mexico:'🇲🇽',brazil:'🇧🇷',vegas:'🇺🇸',abudhabi:'🇦🇪',
};

// ══════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════
function init() {
  save = Save.load();
  if (!save || !save.playerTeamId) {
    document.querySelector('.page').innerHTML = `<div style="padding:40px;text-align:center;color:var(--muted);font-family:var(--fh)"><div style="font-size:22px;margin-bottom:12px">Aucune carrière trouvée</div><a href="index.html" class="btn btn-red">Créer une carrière</a></div>`;
    return;
  }

  // Restaurer pilotes
  if (save.driverStates) {
    F1Data.drivers.forEach(d => {
      const st = save.driverStates[d.id];
      if (st) Object.assign(d, st);
    });
  }
  if (save.generatedDrivers?.length) {
    save.generatedDrivers.forEach(gd => {
      if (!F1Data.drivers.find(d => d.id === gd.id)) F1Data.drivers.push(gd);
    });
  }

  circuit   = F1Data.circuits[(save.race || 0) % F1Data.circuits.length];
  myDrivers = F1Data.drivers.filter(d => d.teamId === save.playerTeamId && !d.retired);

  // Générer météo + événement paddock si nouveau circuit
  const evKey = `paddock_${save.season}-${save.race}`;
  if (!save.weekendWeather || save.weekendCircuit !== circuit.id) {
    save.weekendWeather   = Weekend.generateWeekendWeather(circuit);
    save.weekendCircuit   = circuit.id;
    save.weekendFPDone    = 0;
    save.weekendQualiDone = false;
    save.weekendSetup     = 'balanced';
    save.qualiGrid        = null;
    save.qualiStrategy    = {};
    save.weekendPaddockEvent = null;
    delete save[evKey]; // forcer la régénération pour ce GP
  }

  // Générer l'événement paddock une seule fois par GP
  if (!save[evKey]) {
    console.log('[PaddockEvent] Génération pour', evKey);
    try {
      if (typeof CareerEvents === 'undefined') {
        console.warn('[PaddockEvent] CareerEvents non défini !');
        save.weekendPaddockEvent = null;
      } else {
        save.weekendPaddockEvent = CareerEvents.triggerPreRace(save) || null;
        console.log('[PaddockEvent] Résultat:', save.weekendPaddockEvent);
      }
    } catch(e) {
      save.weekendPaddockEvent = null;
      console.error('[PaddockEvent] Erreur:', e);
    }
    save[evKey] = true;
    Save.save(save);
  } else {
    console.log('[PaddockEvent] Déjà généré pour', evKey, '→', save.weekendPaddockEvent?.title || 'null');
  }

  // Restaurer état weekend
  fpResults   = save.weekendFPResults || [];
  qualiResult = save.qualiGrid ? { grid: save.qualiGrid, poleTime: save.qualiGrid[0]?.qualiTime } : null;

  // Déterminer la phase courante
  if (save.weekendQualiDone) phase = 'race_briefing';
  else if (save.weekendFPDone >= 3) phase = 'quali';
  else phase = 'fp';

  document.getElementById('seasonBadge').textContent = `Saison ${save.season || 2025}`;
  document.getElementById('raceBadge').textContent   = `GP ${(save.race || 0) + 1} — ${circuit.name}`;

  renderPhases();
  renderContent();
}

// ══════════════════════════════════════════════════════════
//  CARTE ÉVÉNEMENT PADDOCK PRÉ-COURSE
// ══════════════════════════════════════════════════════════
function buildPaddockEventCard() {
  const ev = save.weekendPaddockEvent;
  if (!ev || !ev.title) return null;

  // Couleur bordure selon catégorie
  const positiveCategories = ['performance','financial','technical'];
  const negativeCategories = ['medical','regulatory','mercato'];
  const cat = ev.category || '';
  const borderColor = positiveCategories.includes(cat) ? 'var(--green)' : negativeCategories.includes(cat) ? '#ff4444' : 'var(--gold)';
  const icon = ev.icon || '📰';

  // Label d'impact selon catégorie
  const catLabels = {
    medical:'Impact pilote', performance:'Boost performance', financial:'Impact budget',
    technical:'Impact technique', regulatory:'Décision FIA', mercato:'Situation contrats',
    competitor:'Rival en forme', board:'Signal direction', general:'Info paddock',
  };
  const catLabel = catLabels[cat] || 'Événement paddock';
  const sign = positiveCategories.includes(cat) ? '▲' : negativeCategories.includes(cat) ? '▼' : '●';
  const col  = positiveCategories.includes(cat) ? 'var(--green)' : negativeCategories.includes(cat) ? '#ff6666' : 'var(--muted)';

  const el = document.createElement('div');
  el.className = 'panel';
  el.innerHTML = `
    <div class="ph"><div class="dot" style="background:${borderColor}"></div>📰 Nouvelles du paddock</div>
    <div class="content">
      <div class="paddock-event" style="border-left-color:${borderColor}">
        <div class="paddock-event-kicker">${icon} Avant le Grand Prix · ${circuit.name}</div>
        <div class="paddock-event-title">${ev.title}</div>
        <div class="paddock-event-text">${ev.text}</div>
        <div class="paddock-event-effect" style="color:${col}">${sign} ${catLabel}</div>
      </div>
    </div>`;
  return el;
}

// ══════════════════════════════════════════════════════════
//  PHASES BAR
// ══════════════════════════════════════════════════════════
function renderPhases() {
  const phases = [
    { id:'fp',            icon:'🔧', label:'Essais Libres', done: save.weekendFPDone >= 3 },
    { id:'quali',         icon:'⚡', label:'Qualifications', done: save.weekendQualiDone },
    { id:'race_briefing', icon:'🏁', label:'Course',        done: false },
  ];

  document.getElementById('phasesBar').innerHTML = phases.map(p => {
    const isDone   = p.done;
    const isActive = p.id === phase;
    const isLocked = (p.id === 'quali' && save.weekendFPDone < 3) || (p.id === 'race_briefing' && !save.weekendQualiDone);
    const cls = isDone ? 'done' : isActive ? 'active' : isLocked ? 'locked' : '';
    return `<div class="phase ${cls}" onclick="goPhase('${p.id}')">
      <span class="phase-icon">${isDone ? '✅' : p.icon}</span>${p.label}
    </div>`;
  }).join('');
}

function goPhase(p) {
  if (p === 'quali' && save.weekendFPDone < 3) { toast('❌ Termine les 3 séances d\'essais libres d\'abord !', true); return; }
  if (p === 'race_briefing' && !save.weekendQualiDone) { toast('❌ Fais les qualifications d\'abord !', true); return; }
  // Redirection vers les pages briefing
  if (p === 'quali') { location.href = 'quali-briefing.html'; return; }
  if (p === 'race_briefing') { location.href = 'race-briefing.html'; return; }
  phase = p;
  renderPhases();
  renderContent();
}

// ══════════════════════════════════════════════════════════
//  DISPATCH CONTENU
// ══════════════════════════════════════════════════════════
function renderContent() {
  const content = document.getElementById('weekendContent');
  content.innerHTML = '';
  content.appendChild(buildCircuitHero());

  // Flow immersif : uniquement des cartes de transition qui lisent les vraies données sauvegardées.
  // Elles ne modifient pas la simulation et ne décident jamais des résultats.
  if (phase === 'fp' && (save.weekendFPDone || 0) === 0) {
    content.appendChild(buildArrivalBriefing());
    const pevCard = buildPaddockEventCard();
    if (pevCard) content.appendChild(pevCard);
  }
  if (phase === 'fp' && (save.weekendFPDone || 0) > 0) content.appendChild(buildFPDebriefCard());
  if (phase === 'quali') content.appendChild(buildPreQualiStoryCard());
  if (phase === 'race_briefing') content.appendChild(buildQualiStoryCard());

  if (phase === 'fp')            content.appendChild(buildFPSection());
  else if (phase === 'quali')    content.appendChild(buildQualiSection());
  else                           content.appendChild(buildRaceBriefing());
}

// ══════════════════════════════════════════════════════════
//  FLOW IMMERSIF WEEK-END — CARTES NARRATIVES BASÉES DONNÉES
// ══════════════════════════════════════════════════════════
function makeFlowCard(title, html, icon='🎙️') {
  const el = document.createElement('div');
  el.className = 'flow-card';
  el.innerHTML = `<div class="flow-head"><span>${icon}</span>${title}</div><div class="flow-body">${html}</div>`;
  return el;
}

function getPlayerTeam() {
  return F1Data.teams.find(t => t.id === save.playerTeamId) || null;
}

function flowWeatherLabel() {
  const w = save.weekendWeather || 'dry';
  if (w === 'heavy_rain') return 'Forte pluie';
  if (w === 'light_rain') return 'Pluie légère';
  return 'Sec';
}


function circuitTypeLabel(type) {
  const labels = {
    balanced: 'Équilibré',
    power: 'Puissance moteur',
    high_speed: 'Haute vitesse',
    technical: 'Technique',
    street: 'Urbain',
    mixed: 'Mixte'
  };
  return labels[type] || 'Équilibré';
}

function circuitProfileLine() {
  const deg = circuit.tyreDegradation || 1;
  const ovt = circuit.overtakingDifficulty || 0.5;
  const tyreTxt = deg >= 1.35 ? 'dégradation très élevée' : deg >= 1.15 ? 'dégradation sensible' : deg <= 0.9 ? 'pneus assez protégés' : 'dégradation normale';
  const ovtTxt = ovt >= 0.75 ? 'dépassements difficiles' : ovt <= 0.4 ? 'dépassements accessibles' : 'dépassements moyens';
  return `${tyreTxt} · ${ovtTxt} · ${circuit.drsZones || 0} zone${(circuit.drsZones||0)>1?'s':''} DRS`;
}

function getBestFPRun(results) {
  if (!results?.length) return null;
  return [...results].sort((a,b)=>a.bestLap-b.bestLap)[0];
}

function buildArrivalBriefing() {
  const team = getPlayerTeam();
  const driversLine = myDrivers.map(d => `${d.firstName} ${d.name}`).join(' / ') || 'Pilotes non définis';
  const expected = team?.performance >= 90 ? 'jouer la victoire' : team?.performance >= 78 ? 'viser les gros points' : team?.performance >= 65 ? 'se battre pour les points' : 'surprendre avec la stratégie';
  return makeFlowCard('Arrivée au Grand Prix', `
    <div style="font-size:13px;color:var(--muted);line-height:1.5">
      Le garage <strong style="color:var(--text)">${team?.name || 'de ton équipe'}</strong> s'installe à ${circuit.fullName || circuit.name}. Objectif logique d'après la performance actuelle : <strong style="color:var(--gold)">${expected}</strong>.
    </div>
    <div class="flow-grid">
      <div class="flow-mini"><div class="flow-k">Météo week-end</div><div class="flow-v">${flowWeatherLabel()}</div><div class="flow-sub">Valeur issue de la météo générée pour ce GP.</div></div>
      <div class="flow-mini"><div class="flow-k">Profil piste</div><div class="flow-v">${circuitTypeLabel(circuit.circuitType)}</div><div class="flow-sub">${circuitProfileLine()}</div></div>
      <div class="flow-mini"><div class="flow-k">Tes pilotes</div><div class="flow-v">${myDrivers.length} engagés</div><div class="flow-sub">${driversLine}</div></div>
    </div>
    <div class="flow-cta"><button class="btn btn-gold" onclick="document.getElementById('fpConfig')?.scrollIntoView({behavior:'smooth'})">Préparer EL1</button></div>
  `, '🛬');
}

function buildFPDebriefCard() {
  const done = save.weekendFPDone || 0;
  const last = fpResults.slice(-myDrivers.length);
  const best = getBestFPRun(fpResults);
  const knowledge = Weekend.calcKnowledgeBonus(fpResults);
  const bestDriver = best ? F1Data.drivers.find(d => d.id === best.driver) : null;
  const tested = [...new Set(fpResults.map(r => r.compound))].map(c => F1Data.tyres[c]?.name || c).join(', ') || '—';
  const avgWear = last.length ? (last.reduce((s,r)=>s+(r.finalWear||0),0)/last.length).toFixed(0) : '0';
  return makeFlowCard(`Débrief EL${done}`, `
    <div style="font-size:13px;color:var(--muted);line-height:1.5">
      Les données affichées viennent uniquement des runs simulés en essais libres : pneus choisis, programmes, chronos et usure réelle de tes pilotes.
    </div>
    <div class="flow-grid">
      <div class="flow-mini"><div class="flow-k">Meilleur tour équipe</div><div class="flow-v">${best ? Weekend.fmtTime(best.bestLap) : '—'}</div><div class="flow-sub">${bestDriver ? `${bestDriver.firstName} ${bestDriver.name}` : 'Aucun run'} · ${best ? (F1Data.tyres[best.compound]?.name || best.compound) : ''}</div></div>
      <div class="flow-mini"><div class="flow-k">Pneus testés</div><div class="flow-v">${tested}</div><div class="flow-sub">Mélange basé sur tes choix d'EL.</div></div>
      <div class="flow-mini"><div class="flow-k">Usure moyenne dernière séance</div><div class="flow-v">${avgWear}%</div><div class="flow-sub">Bonus pneus acquis : -${(knowledge.tyreBonus*100).toFixed(0)}% dégradation.</div></div>
    </div>
  `, '📊');
}

function buildPreQualiStoryCard() {
  const knowledge = Weekend.calcKnowledgeBonus(fpResults);
  const best = getBestFPRun(fpResults);
  const bestDriver = best ? F1Data.drivers.find(d => d.id === best.driver) : null;
  return makeFlowCard('Briefing qualifications', `
    <div style="font-size:13px;color:var(--muted);line-height:1.5">
      Les essais libres sont terminés. Ton rythme de qualification sera influencé par les vrais bonus acquis via les programmes EL.
    </div>
    <div class="flow-grid">
      <div class="flow-mini"><div class="flow-k">Préparation</div><div class="flow-v">${knowledge.label}</div><div class="flow-sub">${save.weekendFPDone || 0}/3 séances effectuées.</div></div>
      <div class="flow-mini"><div class="flow-k">Bonus pace</div><div class="flow-v">+${(knowledge.paceBonus*100).toFixed(0)}%</div><div class="flow-sub">Issu des programmes quali sim.</div></div>
      <div class="flow-mini"><div class="flow-k">Référence EL</div><div class="flow-v">${best ? Weekend.fmtTime(best.bestLap) : '—'}</div><div class="flow-sub">${bestDriver ? `${bestDriver.firstName} ${bestDriver.name}` : 'Aucun run disponible'}.</div></div>
    </div>
  `, '⚡');
}

function buildQualiStoryCard() {
  const grid = save.qualiGrid || [];
  const pole = grid[0];
  const player = grid.filter(g => g.isPlayer);
  const bestPlayer = player.length ? [...player].sort((a,b)=>a.gridPos-b.gridPos)[0] : null;
  const poleName = pole ? getDriverName(pole.driverId) : '—';
  const playerLine = player.length ? player.map(p=>`${getDriverName(p.driverId)} P${p.gridPos}`).join(' · ') : '—';
  const gap = bestPlayer && pole ? (bestPlayer.gridPos===1 ? 'Pole position' : Weekend.fmtGap(pole.qualiTime, bestPlayer.qualiTime)) : '—';
  return makeFlowCard('Transition vers la course', `
    <div style="font-size:13px;color:var(--muted);line-height:1.5">
      La grille ci-dessous vient directement des qualifications sauvegardées. La stratégie pré-course utilise ensuite cette grille, la météo et les données pneus des EL.
    </div>
    <div class="flow-grid">
      <div class="flow-mini"><div class="flow-k">Pole position</div><div class="flow-v">${poleName}</div><div class="flow-sub">${pole ? Weekend.fmtTime(pole.qualiTime) : 'Qualification non disponible'}.</div></div>
      <div class="flow-mini"><div class="flow-k">Meilleur pilote équipe</div><div class="flow-v">${bestPlayer ? `P${bestPlayer.gridPos}` : '—'}</div><div class="flow-sub">${bestPlayer ? `${getDriverName(bestPlayer.driverId)} · ${gap}` : 'Aucun pilote joueur dans la grille'}.</div></div>
      <div class="flow-mini"><div class="flow-k">Tes positions</div><div class="flow-v">${player.map(p=>`P${p.gridPos}`).join(' / ') || '—'}</div><div class="flow-sub">${playerLine}</div></div>
    </div>
  `, '🏁');
}

function getAvailableJuniors() {
  // Retourne les juniors promouvables qui ont encore des sessions EL disponibles cette saison
  const im = save?.immersion;
  if (!im || !Array.isArray(im.juniorAcademy)) return [];
  const maxFP = (typeof Immersion !== 'undefined' && Immersion.FP_PER_SEASON) ? Immersion.FP_PER_SEASON : 2;
  const currentSeason = save.season || 2025;
  return im.juniorAcademy.filter(j => {
    if (!j.promotable || j.promoted) return false;
    const sameYear   = (j.fpSeasonYear||0) === currentSeason;
    const usedSess   = sameYear ? (j.fpSeasonCount||0) : 0;
    return true; // on les montre tous, avec leur quota restant
  });
}

function buildFPConfig() {
  const compounds = Object.keys(F1Data.tyres);
  const juniors   = getAvailableJuniors();
  const maxFP     = (typeof Immersion !== 'undefined' && Immersion.FP_PER_SEASON) ? Immersion.FP_PER_SEASON : 2;
  const currentSeason = save.season || 2025;

  // Construire les options junior pour le select
  const juniorOptions = juniors.map(j => {
    const sameYear  = (j.fpSeasonYear||0) === currentSeason;
    const usedSess  = sameYear ? (j.fpSeasonCount||0) : 0;
    const sessLeft  = Math.max(0, maxFP - usedSess);
    const disabled  = sessLeft <= 0 ? 'disabled' : '';
    const label     = `${j.flag} ${j.firstName} ${j.name} · Potentiel ${j.potential} · ${sessLeft}/${maxFP} EL restante${sessLeft!==1?'s':''}`;
    return `<option value="${j.id}" ${disabled}>${label}</option>`;
  }).join('');

  const juniorBlock = juniors.length ? `
    <div style="margin-bottom:12px;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:6px">
      <div style="font-family:var(--fh);font-weight:700;font-size:12px;color:var(--gold);margin-bottom:8px">🌱 JUNIOR EN ESSAIS LIBRES (max ${maxFP}/saison)</div>
      <div style="font-family:var(--fh);font-size:11px;color:var(--muted);margin-bottom:8px">
        Sélectionne un junior promouvable pour qu'il conduise à la place d'un de tes titulaires lors de cette session.
      </div>
      <div class="select-row" style="margin-bottom:6px">
        <span class="lbl">Junior</span>
        <select class="sel" id="fp-junior-select">
          <option value="">— Aucun (titulaires uniquement) —</option>
          ${juniorOptions}
        </select>
      </div>
      <div id="fp-junior-replace-row" style="display:none">
        <div class="select-row">
          <span class="lbl">Remplace</span>
          <select class="sel" id="fp-junior-replace">
            ${myDrivers.map(d => `<option value="${d.id}">${d.firstName} ${d.name}</option>`).join('')}
          </select>
        </div>
      </div>
    </div>
  ` : '';

  return juniorBlock + myDrivers.map(driver => `
    <div class="fp-card" id="fp-card-${driver.id}">
      <div class="fp-title">${driver.firstName} ${driver.name}</div>
      <div class="fp-driver">${F1Data.teams.find(t=>t.id===driver.teamId)?.name || '—'}</div>
      <div class="select-row">
        <span class="lbl">Pneu</span>
        <select class="sel" id="fp-compound-${driver.id}">
          ${compounds.filter(c=>!['INTER','WET'].includes(c) || save.weekendWeather !== 'dry').map(c =>
            `<option value="${c}" ${c==='MEDIUM'?'selected':''}>${F1Data.tyres[c].name}</option>`
          ).join('')}
        </select>
      </div>
      <div class="select-row">
        <span class="lbl">Programme</span>
        <select class="sel" id="fp-program-${driver.id}">
          ${Weekend.PROGRAM_OPTIONS.map(p =>
            `<option value="${p.id}">${p.label} — ${p.desc}</option>`
          ).join('')}
        </select>
      </div>
    </div>
  `).join('') + `
    <div style="margin-top:10px">
      <div class="select-row" style="margin-bottom:6px">
        <span class="lbl">Setup global</span>
        <select class="sel" id="fp-setup" onchange="updateSetupHint(this.value)">
          ${Weekend.SETUP_OPTIONS.map(s =>
            `<option value="${s.id}" ${s.id===save.weekendSetup?'selected':''}>${s.label} — ${s.desc}</option>`
          ).join('')}
        </select>
      </div>
      <div id="setup-hint" style="font-family:var(--fh);font-size:11px;padding:6px 10px;border-radius:5px;margin-bottom:10px;${save.weekendSetup==='quali_mode'?'background:rgba(245,200,66,.08);color:var(--gold);border:1px solid rgba(245,200,66,.15)':save.weekendSetup==='race_mode'?'background:rgba(0,217,126,.08);color:var(--green);border:1px solid rgba(0,217,126,.15)':'background:var(--surface2);color:var(--muted);border:1px solid var(--border)'}">
        ${({
          balanced:   '⚖️ Neutre — aucun bonus ni malus en course.',
          low_drag:   '💨 +vitesse ligne droite, -grip en virage. Circuits rapides (Monza, Baku).',
          high_df:    '🔄 +grip en virage, -vitesse max. Circuits techniques (Monaco, Suzuka).',
          quali_mode: '⚡ -0.08s/tour en course MAIS +12% dégradation pneus. Stratégie 1 arrêt risquée.',
          race_mode:  '🏁 +0.05s/tour MAIS -10% dégradation. Idéal pour stratégie 2 arrêts ou pluie.',
        })[save.weekendSetup] || '⚖️ Neutre — aucun bonus ni malus.'}
      </div>
      <button class="btn btn-red" onclick="runFP()">🚦 Lancer la séance</button>
    </div>
  `;
}

// Afficher/cacher le select "remplacer par" selon si un junior est choisi
document.addEventListener('change', function(e){
  if(e.target && e.target.id === 'fp-junior-select'){
    const row = document.getElementById('fp-junior-replace-row');

function buildFPResults(results) {
  return results.map(r => {
    const driver  = F1Data.drivers.find(d => d.id === r.driver);
    const tyre    = F1Data.tyres[r.compound];
    const minLap  = Math.min(...r.lapTimes);
    const tyreClr = r.finalWear > 60 ? '#ff4444' : r.finalWear > 35 ? '#ffea00' : '#00e676';

    return `
      <div class="fp-card done" style="margin-bottom:8px">
        <div class="fp-title">${driver?.firstName} ${driver?.name} — <span style="color:${tyre.color}">${tyre.name}</span></div>

let _fpRunning = false;
function runFP() {
  if (_fpRunning) return; // anti double-clic
  _fpRunning = true;
  setTimeout(() => _fpRunning = false, 2000);
  save = Save.load(); // recharger le save
  if (save.weekendFPDone >= 3) { toast('Les 3 séances sont déjà terminées !', true); _fpRunning=false; return; }

  const setup = document.getElementById('fp-setup')?.value || 'balanced';
  save.weekendSetup = setup;

  const sessionResults = [];

  // Vérifier si un junior est sélectionné pour cette session
  const juniorId      = document.getElementById('fp-junior-select')?.value || '';
  const replaceId     = document.getElementById('fp-junior-replace')?.value || '';
  let juniorResult    = null;

  if(juniorId && replaceId){
    // Lancer la session junior via Immersion (limite 2/saison vérifiée là-bas)
    const sessionName = ['fp1','fp2','fp3'][save.weekendFPDone] || 'fp1';
    juniorResult = (typeof Immersion !== 'undefined') ? Immersion.juniorFP(save, juniorId, sessionName) : null;
    if(juniorResult && !juniorResult.ok){
      toast(`⚠️ ${juniorResult.msg}`, true);
      return;
    }
    if(juniorResult?.ok){
      // Afficher une notification de résultat junior
      const notif = document.createElement('div');
      notif.style.cssText='position:fixed;bottom:60px;right:16px;background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:6px;padding:10px 14px;font-family:var(--fh);font-size:13px;z-index:200;max-width:300px';
      const crash = juniorResult.crash;
      notif.textContent = crash
        ? `💥 Junior — Crash en piste ! Quota restant : ${juniorResult.sessionsLeft}/saison`
        : `🌱 Junior — ${juniorResult.timeStr} vs leader · ${juniorResult.sessionsLeft} session${juniorResult.sessionsLeft!==1?'s':''} EL restante${juniorResult.sessionsLeft!==1?'s':''}`;
      document.body.appendChild(notif);
      setTimeout(() => notif.remove(), 4000);
    }
  }

  // Sessions des titulaires (ou du titulaire non remplacé)
  myDrivers.forEach(driver => {
    // Si ce pilote est remplacé par le junior, on saute sa session normale
    if(juniorId && replaceId === driver.id) return;
    const compound = document.getElementById(`fp-compound-${driver.id}`)?.value || 'MEDIUM';
    const program  = document.getElementById(`fp-program-${driver.id}`)?.value  || 'quali_sim';
    const result   = Weekend.simulateFP(save, circuit, driver, compound, program, setup);
    if (result) sessionResults.push(result);
  });

  fpResults = [...fpResults, ...sessionResults];
  save.weekendFPResults = fpResults;
  save.weekendFPDone    = (save.weekendFPDone || 0) + 1;
  Save.save(save);

  const sessionLabel = juniorId && replaceId && juniorResult?.ok
    ? `✅ Séance EL${save.weekendFPDone} terminée avec junior en piste !`
    : `✅ Séance EL${save.weekendFPDone} terminée !`;
  toast(sessionLabel);

  renderPhases();
  renderContent();
}

// Stocke les options calculées pour y accéder via index
let _stratOptions = [];

function calcStrategyOptions(tyreEst) {
  const L       = circuit.laps;
  const lifeMap = {};
  tyreEst.forEach(e => lifeMap[e.compound] = e.life);
  ['SOFT','MEDIUM','HARD'].forEach(c => {
    if (!lifeMap[c]) {
      const t = F1Data.tyres[c];
      lifeMap[c] = Math.min(Math.round(80 / (t.degradationRate * circuit.tyreDegradation * 100)), L-2);
    }
  });

  const options = [];

  // 1 arrêt
  [['MEDIUM','HARD'],['HARD','MEDIUM'],['SOFT','HARD'],['MEDIUM','MEDIUM']].forEach(([c1,c2])=>{
    const l1=lifeMap[c1]||20, l2=lifeMap[c2]||30;
    const p1=Math.min(l1,Math.round(L*0.48));
    if(p1>=5&&p1<=L-5&&(L-p1)<=l2+6){
      options.push({ stops:1, compounds:[c1,c2], pitLaps:[p1], feasible:p1<=l1+3&&(L-p1)<=l2+6 });
    }
  });
  // 2 arrêts
  [['SOFT','MEDIUM','HARD'],['SOFT','HARD','MEDIUM'],['MEDIUM','SOFT','HARD'],['SOFT','SOFT','HARD']].forEach(([c1,c2,c3])=>{
    const l1=lifeMap[c1]||15, l2=lifeMap[c2]||20, l3=lifeMap[c3]||30;
    const p1=Math.min(l1,Math.round(L*0.30));
    const p2=Math.min(p1+l2,Math.round(L*0.62));
    if(p1>=4&&p2>p1&&p2<=L-5&&(L-p2)<=l3+6){
      options.push({ stops:2, compounds:[c1,c2,c3], pitLaps:[p1,p2], feasible:p1<=l1+2&&(p2-p1)<=l2+3&&(L-p2)<=l3+6 });
    }
  });
  // 3 arrêts si haute dégradation
  if(circuit.tyreDegradation>1.2){
    const p1=Math.round(L*.22),p2=Math.round(L*.47),p3=Math.round(L*.72);
    if(p3<=L-4) options.push({ stops:3, compounds:['SOFT','SOFT','SOFT','HARD'], pitLaps:[p1,p2,p3], feasible:(lifeMap['SOFT']||12)>=10 });
  }

  _stratOptions = options.sort((a,b) => b.feasible - a.feasible || (a.stops - b.stops));
  return _stratOptions;
}

// Applique une stratégie recommandée aux selects (par index)
function applyStratReco(idx) {
  const opt = _stratOptions[idx];
  if (!opt) return;
  myDrivers.forEach(driver => {
    const c1 = opt.compounds[0]||'MEDIUM', c2 = opt.compounds[1]||'HARD', c3 = opt.compounds[2]||'MEDIUM';
    const p1 = opt.pitLaps[0], p2 = opt.pitLaps[1];
    const sel1 = document.getElementById(`rc1-${driver.id}`);
    const sel2 = document.getElementById(`rc2-${driver.id}`);
    const sel3 = document.getElementById(`rc3-${driver.id}`);
    const inp1 = document.getElementById(`rp1-${driver.id}`);
    const inp2 = document.getElementById(`rp2-${driver.id}`);
    if(sel1) sel1.value = c1;
    if(sel2) sel2.value = c2;
    if(sel3) sel3.value = c3;
    if(inp1) inp1.value = p1||'';
    if(inp2) inp2.value = p2||'';
  });
  // Flash confirmation
  const rows = document.querySelectorAll('.strat-row');
  rows.forEach(r => { r.style.background='#1a2a00'; setTimeout(()=>r.style.background='',600); });
}

function tyreOpts(sel) {
  return ['SOFT','MEDIUM','HARD','INTER','WET'].map(c =>
    `<option value="${c}" ${c===sel?'selected':''}>${F1Data.tyres[c].name}</option>`
  ).join('');
}

// Calcule l'estimation de durée pour chaque compound testé en EL
function calcTyreEstimates() {
  const estimates = [];
  const tested    = {};

  fpResults.forEach(r => {
    if (r.program !== 'long_run' && r.program !== 'quali_sim') return;
    if (tested[r.compound]) return;
    tested[r.compound] = true;

    const wearPerLap = (100 - r.tyreLife) / r.laps;
    // Ignorer si le run est trop court (<8 tours) — données non représentatives
    if (wearPerLap <= 0 || r.laps < 8) return;

    // Estimer combien de tours avant d'atteindre 20% de vie (cliff)
    const lifeTotal = Math.round(80 / wearPerLap);
    const tyre      = F1Data.tyres[r.compound];

    // Sanity check — si la durée estimée dépasse 90% des tours de course, ignorer
    if (lifeTotal > circuit.laps * 0.9) return;

    estimates.push({
      compound:   r.compound,
      color:      tyre.color,
      life:       Math.min(lifeTotal, circuit.laps),
      wearPerLap: wearPerLap,
    });
  });

  // Si pas de données EL, estimer depuis les stats circuit
  if (!estimates.length) {
    ['SOFT','MEDIUM','HARD'].forEach(c => {
      const tyre       = F1Data.tyres[c];
      const wearPerLap = tyre.degradationRate * circuit.tyreDegradation * 100;
      const lifeTotal  = Math.round(80 / wearPerLap);
      estimates.push({ compound:c, color:tyre.color, life:Math.min(lifeTotal,circuit.laps), wearPerLap });
    });
  }

  return estimates.sort((a,b) => a.life - b.life); // du plus fragile au plus dur
}

function goToRace() {
  // Sauvegarder les stratégies de course
  const strategies = {};
  myDrivers.forEach(driver => {
    const c1 = document.getElementById(`rc1-${driver.id}`)?.value || 'MEDIUM';
    const c2 = document.getElementById(`rc2-${driver.id}`)?.value || 'HARD';
    const c3 = document.getElementById(`rc3-${driver.id}`)?.value || 'SOFT';
    const p1 = parseInt(document.getElementById(`rp1-${driver.id}`)?.value || '', 10);
    const p2 = parseInt(document.getElementById(`rp2-${driver.id}`)?.value || '', 10);
    const compounds = [c1, c2];
    const pitLaps   = [];
    if (Number.isFinite(p1)) pitLaps.push(p1);
    if (Number.isFinite(p2)) { pitLaps.push(p2); compounds.push(c3); }
    strategies[driver.id] = { compounds, pitLaps };
  });

  save.raceStrategies  = strategies;
  save.raceQualiGrid   = save.qualiGrid;
  save.weekendKnowledge= save.weekendKnowledge || {};
  Save.save(save);

  window.location.href = 'race.html';
}

// ── HELPERS ─────────────────────────────────────────────
function getDriverName(id) {
  const d = F1Data.drivers.find(dr => dr.id === id);
  return d ? `${d.firstName} ${d.name}` : '—';
}

function toast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = `toast${isError?' error':''}`;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

init();

function updateSetupHint(val) {
  const hints = {
    balanced:   '⚖️ Neutre — aucun bonus ni malus en course.',
    low_drag:   '💨 +vitesse ligne droite, -grip en virage. Circuits rapides (Monza, Baku).',
    high_df:    '🔄 +grip en virage, -vitesse max. Circuits techniques (Monaco, Suzuka).',
    quali_mode: '⚡ -0.08s/tour en course MAIS +12% dégradation pneus. Stratégie 1 arrêt risquée.',
    race_mode:  '🏁 +0.05s/tour MAIS -10% dégradation. Idéal pour stratégie 2 arrêts ou pluie.',
  };
  const colors = {
    quali_mode: 'background:rgba(245,200,66,.08);color:var(--gold);border:1px solid rgba(245,200,66,.15)',
    race_mode:  'background:rgba(0,217,126,.08);color:var(--green);border:1px solid rgba(0,217,126,.15)',
  };
  const el = document.getElementById('setup-hint');
  if (!el) return;
  el.textContent = hints[val] || hints.balanced;
  el.style.cssText = `font-family:var(--fh);font-size:11px;padding:6px 10px;border-radius:5px;margin-bottom:10px;${colors[val]||'background:var(--surface2);color:var(--muted);border:1px solid var(--border)'}`;
}
</script>

<script>
(function(){
  function syncUnifiedTopbar(){
    try{
      const save = ((window.Save && Save.load) ? Save.load() : null) || JSON.parse(localStorage.getItem('f1manager_v1') || localStorage.getItem('f1manager_save') || localStorage.getItem('f1-manager-save') || '{}') || {};
      const season = document.getElementById('seasonBadge');
      const budget = document.getElementById('budgetBadge');
      if(season && (!season.textContent || season.textContent.trim()==='—')) season.textContent = `Saison ${save.season || 2025}`;
      if(budget && (!budget.textContent || budget.textContent.trim()==='—')) budget.textContent = `💰 ${Math.round((save.budget || 0)*10)/10}M €`;
    }catch(e){}
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',syncUnifiedTopbar); else syncUnifiedTopbar();
})();
</script>
