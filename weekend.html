<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>F1 Manager — Weekend</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;0,900;1,700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070d;--surface:#0f0f18;--surface2:#161622;--border:#22223a;
  --text:#e4e4f0;--muted:#55556a;--accent:#e8003d;--gold:#f5c842;
  --green:#00d97e;--blue:#3d7eff;--orange:#ff8c42;--purple:#a855f7;
  --fh:'Barlow Condensed',sans-serif;--fb:'Barlow',sans-serif;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--fb)}

.topbar{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;position:sticky;top:0;z-index:100}
.logo{font-family:var(--fh);font-weight:900;font-size:22px;letter-spacing:3px;color:var(--accent)}
.logo span{color:var(--text)}
.top-pills{margin-left:auto;display:flex;gap:8px;align-items:center}
.pill{font-family:var(--fh);font-weight:700;font-size:13px;padding:4px 12px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);white-space:nowrap}
.pill-gold{color:var(--gold);border-color:#3a3400;background:#161200}
.pill-muted{color:var(--muted)}

.page{padding:12px;display:flex;flex-direction:column;gap:12px;max-width:800px;margin:0 auto}

/* TEAM SELECT */
.select-screen{padding:20px 4px}
.select-title{font-family:var(--fh);font-weight:900;font-size:26px;letter-spacing:2px;margin-bottom:4px}
.select-sub{font-family:var(--fh);font-size:13px;color:var(--muted);margin-bottom:20px}
.teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:16px}
.team-card{background:var(--surface);border:2px solid var(--border);border-radius:8px;padding:12px 10px;cursor:pointer;transition:all .15s;text-align:center}
.team-card:active{transform:scale(.97)}
.team-card.selected{border-color:var(--gold);background:var(--surface2)}
.tc-name{font-family:var(--fh);font-weight:900;font-size:15px;margin-bottom:3px}
.tc-perf{font-family:var(--fh);font-size:11px;color:var(--muted)}
.tc-budget{font-family:var(--fh);font-size:12px;color:var(--gold);margin-top:3px}
.btn-confirm{font-family:var(--fh);font-weight:900;font-size:15px;letter-spacing:2px;text-transform:uppercase;background:var(--accent);color:#fff;border:none;border-radius:6px;padding:12px 32px;cursor:pointer;display:none;width:100%;transition:background .15s}

/* RACE HERO */
.race-hero{background:linear-gradient(135deg,#12000e,#07070d);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;padding:16px;display:flex;align-items:center;gap:14px;text-decoration:none;color:inherit;transition:background .15s}
.race-hero:active{background:var(--surface)}
.rh-flag{font-size:36px;line-height:1}
.rh-info{flex:1}
.rh-label{font-family:var(--fh);font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:3px}
.rh-name{font-family:var(--fh);font-weight:900;font-size:20px;letter-spacing:1px}
.rh-detail{font-family:var(--fh);font-size:11px;color:var(--muted);margin-top:3px}
.rh-cta{font-family:var(--fh);font-weight:900;font-size:11px;letter-spacing:1px;text-transform:uppercase;background:var(--accent);color:#fff;padding:8px 14px;border-radius:5px;white-space:nowrap;flex-shrink:0}

/* SECTION LABEL */
.sec-lbl{font-family:var(--fh);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);padding-bottom:6px;border-bottom:1px solid var(--border)}

/* PILOTES */
.driver-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border);text-decoration:none;color:inherit;transition:background .1s}
.driver-row:last-child{border-bottom:0}
.driver-row:active{background:var(--surface2)}
.dr-num{font-family:var(--fh);font-weight:900;font-size:26px;min-width:40px;text-align:center}
.dr-info{flex:1}
.dr-name{font-family:var(--fh);font-weight:700;font-size:16px}
.dr-trait{font-family:var(--fh);font-size:11px;color:var(--muted);margin-top:2px}
.dr-pace{font-family:var(--fh);font-weight:900;font-size:24px}

/* TUILES */
.tiles-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tile{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:13px;text-decoration:none;color:inherit;display:block;transition:background .1s}
.tile:active{background:var(--surface2)}
.tile-icon{font-size:20px;margin-bottom:6px;display:block}
.tile-lbl{font-family:var(--fh);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.tile-val{font-family:var(--fh);font-weight:900;font-size:20px;line-height:1;margin-bottom:3px}
.tile-sub{font-family:var(--fh);font-size:11px;color:var(--muted);line-height:1.4}

/* STAT BAR */
.sbar{height:3px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
.sbar-fill{height:100%;border-radius:2px;transition:width .5s}

/* CLASSEMENT */
.st-row{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border);font-family:var(--fh);font-size:13px}
.st-row:last-child{border-bottom:0}
.st-pos{font-weight:900;font-size:15px;width:22px}
.st-bar{width:3px;height:18px;border-radius:2px;flex-shrink:0}
.st-name{flex:1}
.st-pts{color:var(--gold);font-weight:700}

/* NEWS */
.news-row{padding:11px 14px;border-bottom:1px solid var(--border)}
.news-row:last-child{border-bottom:0}
.news-title{font-family:var(--fh);font-weight:700;font-size:14px;margin-bottom:3px}
.news-text{font-family:var(--fb);font-size:12px;color:var(--muted);line-height:1.5}

/* BANNER SAISON */
.season-banner{background:linear-gradient(135deg,#1a1a00,#0a1400);border:1px solid var(--gold);border-left:3px solid var(--gold);border-radius:8px;padding:14px 16px}

/* PANEL */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}

/* BTN */
.btn{font-family:var(--fh);font-weight:700;font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:6px 14px;border:none;border-radius:4px;cursor:pointer;text-decoration:none;display:inline-block}
.btn-red{background:var(--accent);color:#fff}
.btn-gold{background:#161200;color:var(--gold);border:1px solid #3a3400}
.btn-sec{background:var(--surface2);color:var(--text);border:1px solid var(--border)}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:6px;padding:10px 18px;font-family:var(--fh);font-size:13px;z-index:500;transition:transform .3s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.error{border-left-color:var(--accent)}

::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.ph .dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
.ph .ml{margin-left:auto;font-weight:400;letter-spacing:0;font-size:11px}

    .tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}

    /* PHASE INDICATOR */

<body>
<div class="topbar">
  <div class="logo">F1<span>Manager</span></div>
  <a href="index.html" class="back-home">← Accueil</a>
  <div class="top-pills">
    <div class="pill pill-muted" id="seasonBadge">—</div>
    <div class="pill pill-gold" id="budgetBadge">—</div>
  </div>
</div>
    <div class="pill" id="raceBadge" style="color:var(--gold)">—</div>
  </div>

<div class="page">

  <!-- PHASES DU WEEKEND -->
  <div class="phases" id="phasesBar"></div>

  <!-- CONTENU DYNAMIQUE -->
  <div id="weekendContent"></div>

</div>

<div class="toast" id="toast"></div>

<script src="js/data.js"></script>
<script src="js/save.js"></script>
<script src="js/engine.js"></script>
<script src="js/events.js"></script>
<script src="js/career.js"></script>
<script src="js/weekend.js"></script>
<script>

// ══════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════
let save       = null;
let circuit    = null;
let myDrivers  = [];
let phase      = 'fp'; // fp | quali | race_briefing

// Résultats accumulés
let fpResults  = [];   // résultats EL
let qualiResult= null; // résultat qualifs

const CIRCUIT_FLAGS = {
  bahrain:'🇧🇭',jeddah:'🇸🇦',melbourne:'🇦🇺',imola:'🇮🇹',miami:'🇺🇸',monaco:'🇲🇨',
  canada:'🇨🇦',barcelona:'🇪🇸',austria:'🇦🇹',silverstone:'🇬🇧',hungary:'🇭🇺',
  spa:'🇧🇪',zandvoort:'🇳🇱',monza:'🇮🇹',baku:'🇦🇿',singapore:'🇸🇬',suzuka:'🇯🇵',
  qatar:'🇶🇦',cota:'🇺🇸',mexico:'🇲🇽',brazil:'🇧🇷',vegas:'🇺🇸',abudhabi:'🇦🇪',
};

// ══════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════
function init() {
  save = Save.load();
  if (!save || !save.playerTeamId) {
    document.querySelector('.page').innerHTML = `<div style="padding:40px;text-align:center;color:var(--muted);font-family:var(--fh)"><div style="font-size:22px;margin-bottom:12px">Aucune carrière trouvée</div><a href="index.html" class="btn btn-red">Créer une carrière</a></div>`;
    return;
  }

  // Restaurer pilotes
  if (save.driverStates) {
    F1Data.drivers.forEach(d => {
      const st = save.driverStates[d.id];
      if (st) Object.assign(d, st);
    });
  }
  if (save.generatedDrivers?.length) {
    save.generatedDrivers.forEach(gd => {
      if (!F1Data.drivers.find(d => d.id === gd.id)) F1Data.drivers.push(gd);
    });
  }

  circuit   = F1Data.circuits[(save.race || 0) % F1Data.circuits.length];
  myDrivers = F1Data.drivers.filter(d => d.teamId === save.playerTeamId && !d.retired);

  // Générer météo weekend si pas encore fait
  if (!save.weekendWeather || save.weekendCircuit !== circuit.id) {
    save.weekendWeather  = Weekend.generateWeekendWeather(circuit);
    save.weekendCircuit  = circuit.id;
    save.weekendFPDone   = 0;  // nombre de séances EL faites
    save.weekendQualiDone= false;
    save.weekendSetup    = 'balanced';
    save.qualiGrid       = null;
    save.qualiStrategy   = {};
    Save.save(save);
  }

  // Restaurer état weekend
  fpResults   = save.weekendFPResults || [];
  qualiResult = save.qualiGrid ? { grid: save.qualiGrid, poleTime: save.qualiGrid[0]?.qualiTime } : null;

  // Déterminer la phase courante
  if (save.weekendQualiDone) phase = 'race_briefing';
  else if (save.weekendFPDone >= 3) phase = 'quali';
  else phase = 'fp';

  document.getElementById('seasonBadge').textContent = `Saison ${save.season || 2025}`;
  document.getElementById('raceBadge').textContent   = `GP ${(save.race || 0) + 1} — ${circuit.name}`;

  renderPhases();
  renderContent();
}

// ══════════════════════════════════════════════════════════
//  PHASES BAR
// ══════════════════════════════════════════════════════════
function renderPhases() {
  const phases = [
    { id:'fp',            icon:'🔧', label:'Essais Libres', done: save.weekendFPDone >= 3 },
    { id:'quali',         icon:'⚡', label:'Qualifications', done: save.weekendQualiDone },
    { id:'race_briefing', icon:'🏁', label:'Course',        done: false },
  ];

  document.getElementById('phasesBar').innerHTML = phases.map(p => {
    const isDone   = p.done;
    const isActive = p.id === phase;
    const isLocked = (p.id === 'quali' && save.weekendFPDone < 3) || (p.id === 'race_briefing' && !save.weekendQualiDone);
    const cls = isDone ? 'done' : isActive ? 'active' : isLocked ? 'locked' : '';
    return `<div class="phase ${cls}" onclick="goPhase('${p.id}')">
      <span class="phase-icon">${isDone ? '✅' : p.icon}</span>${p.label}
    </div>`;
  }).join('');
}

function goPhase(p) {
  if (p === 'quali' && save.weekendFPDone < 3) { toast('❌ Termine les 3 séances d\'essais libres d\'abord !', true); return; }
  if (p === 'race_briefing' && !save.weekendQualiDone) { toast('❌ Fais les qualifications d\'abord !', true); return; }
  phase = p;
  renderPhases();
  renderContent();
}

// ══════════════════════════════════════════════════════════
//  DISPATCH CONTENU
// ══════════════════════════════════════════════════════════
function renderContent() {
  const content = document.getElementById('weekendContent');
  content.innerHTML = '';
  content.appendChild(buildCircuitHero());
  if (phase === 'fp')            content.appendChild(buildFPSection());
  else if (phase === 'quali')    content.appendChild(buildQualiSection());
  else                           content.appendChild(buildRaceBriefing());
}

// ── CIRCUIT HERO ─────────────────────────────────────────

function runFP() {
  if (save.weekendFPDone >= 3) { toast('Les 3 séances sont déjà terminées !', true); return; }

  const setup = document.getElementById('fp-setup')?.value || 'balanced';
  save.weekendSetup = setup;

  const sessionResults = [];

  myDrivers.forEach(driver => {
    const compound = document.getElementById(`fp-compound-${driver.id}`)?.value || 'MEDIUM';
    const program  = document.getElementById(`fp-program-${driver.id}`)?.value  || 'quali_sim';
    const result   = Weekend.simulateFP(save, circuit, driver, compound, program, setup);
    if (result) sessionResults.push(result);
  });

  fpResults = [...fpResults, ...sessionResults];
  save.weekendFPResults = fpResults;
  save.weekendFPDone    = (save.weekendFPDone || 0) + 1;
  Save.save(save);

  toast(`✅ Séance EL${save.weekendFPDone} terminée !`);

  renderPhases();
  renderContent();
}

// Stocke les options calculées pour y accéder via index
let _stratOptions = [];

function calcStrategyOptions(tyreEst) {
  const L       = circuit.laps;
  const lifeMap = {};
  tyreEst.forEach(e => lifeMap[e.compound] = e.life);
  ['SOFT','MEDIUM','HARD'].forEach(c => {
    if (!lifeMap[c]) {
      const t = F1Data.tyres[c];
      lifeMap[c] = Math.min(Math.round(80 / (t.degradationRate * circuit.tyreDegradation * 100)), L-2);
    }
  });

  const options = [];

  // 1 arrêt
  [['MEDIUM','HARD'],['HARD','MEDIUM'],['SOFT','HARD'],['MEDIUM','MEDIUM']].forEach(([c1,c2])=>{
    const l1=lifeMap[c1]||20, l2=lifeMap[c2]||30;
    const p1=Math.min(l1,Math.round(L*0.48));
    if(p1>=5&&p1<=L-5&&(L-p1)<=l2+6){
      options.push({ stops:1, compounds:[c1,c2], pitLaps:[p1], feasible:p1<=l1+3&&(L-p1)<=l2+6 });
    }
  });
  // 2 arrêts
  [['SOFT','MEDIUM','HARD'],['SOFT','HARD','MEDIUM'],['MEDIUM','SOFT','HARD'],['SOFT','SOFT','HARD']].forEach(([c1,c2,c3])=>{
    const l1=lifeMap[c1]||15, l2=lifeMap[c2]||20, l3=lifeMap[c3]||30;
    const p1=Math.min(l1,Math.round(L*0.30));
    const p2=Math.min(p1+l2,Math.round(L*0.62));
    if(p1>=4&&p2>p1&&p2<=L-5&&(L-p2)<=l3+6){
      options.push({ stops:2, compounds:[c1,c2,c3], pitLaps:[p1,p2], feasible:p1<=l1+2&&(p2-p1)<=l2+3&&(L-p2)<=l3+6 });
    }
  });
  // 3 arrêts si haute dégradation
  if(circuit.tyreDegradation>1.2){
    const p1=Math.round(L*.22),p2=Math.round(L*.47),p3=Math.round(L*.72);
    if(p3<=L-4) options.push({ stops:3, compounds:['SOFT','SOFT','SOFT','HARD'], pitLaps:[p1,p2,p3], feasible:(lifeMap['SOFT']||12)>=10 });
  }

  _stratOptions = options.sort((a,b) => b.feasible - a.feasible || (a.stops - b.stops));
  return _stratOptions;
}

// Applique une stratégie recommandée aux selects (par index)
function applyStratReco(idx) {
  const opt = _stratOptions[idx];
  if (!opt) return;
  myDrivers.forEach(driver => {
    const c1 = opt.compounds[0]||'MEDIUM', c2 = opt.compounds[1]||'HARD', c3 = opt.compounds[2]||'MEDIUM';
    const p1 = opt.pitLaps[0], p2 = opt.pitLaps[1];
    const sel1 = document.getElementById(`rc1-${driver.id}`);
    const sel2 = document.getElementById(`rc2-${driver.id}`);
    const sel3 = document.getElementById(`rc3-${driver.id}`);
    const inp1 = document.getElementById(`rp1-${driver.id}`);
    const inp2 = document.getElementById(`rp2-${driver.id}`);
    if(sel1) sel1.value = c1;
    if(sel2) sel2.value = c2;
    if(sel3) sel3.value = c3;
    if(inp1) inp1.value = p1||'';
    if(inp2) inp2.value = p2||'';
  });
  // Flash confirmation
  const rows = document.querySelectorAll('.strat-row');
  rows.forEach(r => { r.style.background='#1a2a00'; setTimeout(()=>r.style.background='',600); });
}

function tyreOpts(sel) {
  return ['SOFT','MEDIUM','HARD','INTER','WET'].map(c =>
    `<option value="${c}" ${c===sel?'selected':''}>${F1Data.tyres[c].name}</option>`
  ).join('');
}

// Calcule l'estimation de durée pour chaque compound testé en EL
function calcTyreEstimates() {
  const estimates = [];
  const tested    = {};

  fpResults.forEach(r => {
    if (r.program !== 'long_run' && r.program !== 'quali_sim') return;
    if (tested[r.compound]) return;
    tested[r.compound] = true;

    const wearPerLap = (100 - r.tyreLife) / r.laps;
    if (wearPerLap <= 0) return;

    // Estimer combien de tours avant d'atteindre 20% de vie (cliff)
    const lifeTotal = Math.round(80 / wearPerLap);
    const tyre      = F1Data.tyres[r.compound];

    estimates.push({
      compound:   r.compound,
      color:      tyre.color,
      life:       Math.min(lifeTotal, circuit.laps),
      wearPerLap: wearPerLap,
    });
  });

  // Si pas de données EL, estimer depuis les stats circuit
  if (!estimates.length) {
    ['SOFT','MEDIUM','HARD'].forEach(c => {
      const tyre       = F1Data.tyres[c];
      const wearPerLap = tyre.degradationRate * circuit.tyreDegradation * 100;
      const lifeTotal  = Math.round(80 / wearPerLap);
      estimates.push({ compound:c, color:tyre.color, life:Math.min(lifeTotal,circuit.laps), wearPerLap });
    });
  }

  return estimates.sort((a,b) => a.life - b.life); // du plus fragile au plus dur
}

function goToRace() {
  // Sauvegarder les stratégies de course
  const strategies = {};
  myDrivers.forEach(driver => {
    const c1 = document.getElementById(`rc1-${driver.id}`)?.value || 'MEDIUM';
    const c2 = document.getElementById(`rc2-${driver.id}`)?.value || 'HARD';
    const c3 = document.getElementById(`rc3-${driver.id}`)?.value || 'SOFT';
    const p1 = parseInt(document.getElementById(`rp1-${driver.id}`)?.value || '', 10);
    const p2 = parseInt(document.getElementById(`rp2-${driver.id}`)?.value || '', 10);
    const compounds = [c1, c2];
    const pitLaps   = [];
    if (Number.isFinite(p1)) pitLaps.push(p1);
    if (Number.isFinite(p2)) { pitLaps.push(p2); compounds.push(c3); }
    strategies[driver.id] = { compounds, pitLaps };
  });

  save.raceStrategies  = strategies;
  save.raceQualiGrid   = save.qualiGrid;
  save.weekendKnowledge= save.weekendKnowledge || {};
  Save.save(save);

  window.location.href = 'race.html';
}

// ── HELPERS ─────────────────────────────────────────────
function getDriverName(id) {
  const d = F1Data.drivers.find(dr => dr.id === id);
  return d ? `${d.firstName} ${d.name}` : '—';
}

function toast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = `toast${isError?' error':''}`;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

init();
</script>

      const season = document.getElementById('seasonBadge');
      const budget = document.getElementById('budgetBadge');
      if(season && (!season.textContent || season.textContent.trim()==='—')) season.textContent = `Saison ${save.season || 2025}`;
      if(budget && (!budget.textContent || budget.textContent.trim()==='—')) budget.textContent = `💰 ${Math.round((save.budget || 0)*10)/10}M €`;
    }catch(e){}

  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',syncUnifiedTopbar); else syncUnifiedTopbar();
})();
