<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>F1 Manager — Weekend</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;--border:#2a2a3e;--text:#e8e8f0;--muted:#6a6a8a;--accent:#e8003d;--gold:#ffd700;--green:#00e676;--orange:#ff9944;--blue:#2979ff;--fh:'Barlow Condensed',sans-serif;--fb:'Barlow',sans-serif}
    html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--fb);font-size:14px}

    /* TOPBAR */
    .topbar{background:var(--surface);border-bottom:2px solid var(--accent);padding:0 14px;height:50px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
    .logo{font-family:var(--fh);font-weight:900;font-size:20px;color:var(--accent);letter-spacing:2px}
    .logo span{color:var(--text)}
    .nav-link{font-family:var(--fh);font-size:12px;font-weight:700;color:var(--muted);text-decoration:none;letter-spacing:1px;text-transform:uppercase;padding:3px 7px}
    .nav-link:hover,.nav-link.active{color:var(--accent)}
    .tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
    .pill{font-family:var(--fh);font-weight:700;font-size:13px;padding:4px 12px;border-radius:4px;background:var(--surface2);border:1px solid var(--border)}

    .page{padding:12px;display:flex;flex-direction:column;gap:10px;max-width:900px;margin:0 auto}

    /* PHASE INDICATOR */
    .phases{display:flex;gap:0;background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:2px}
    .phase{flex:1;padding:10px 6px;text-align:center;font-family:var(--fh);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border-right:1px solid var(--border);transition:all .2s;cursor:pointer}
    .phase:last-child{border-right:0}
    .phase.done{color:var(--green);background:#001a0a}
    .phase.active{color:var(--gold);background:#1a1a00;border-bottom:3px solid var(--gold)}
    .phase.locked{opacity:.4;cursor:not-allowed}
    .phase-icon{font-size:18px;display:block;margin-bottom:3px}

    /* PANEL */
    .panel{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden}
    .ph{background:var(--surface2);border-bottom:1px solid var(--border);padding:8px 14px;font-family:var(--fh);font-weight:700;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:8px}
    .ph .dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
    .ph .ml{margin-left:auto;font-size:11px;font-weight:400;letter-spacing:0}
    .content{padding:12px}

    /* CIRCUIT HERO */
    .circuit-hero{background:linear-gradient(135deg,#0a0a14,#12121f);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;gap:14px;align-items:center}
    .circuit-flag{font-size:40px}
    .circuit-name{font-family:var(--fh);font-weight:900;font-size:24px;color:var(--text)}
    .circuit-full{font-family:var(--fh);font-size:12px;color:var(--muted);margin-top:2px}
    .circuit-stats{display:flex;gap:16px;margin-top:8px;flex-wrap:wrap}
    .cstat{font-family:var(--fh);font-size:11px;color:var(--muted)}
    .cstat span{color:var(--text);font-weight:700}
    .weather-badge{font-family:var(--fh);font-weight:700;font-size:12px;padding:4px 12px;border-radius:12px;margin-left:auto;align-self:flex-start}
    .w-dry{background:#1a2a1a;color:var(--green);border:1px solid #1e4a1e}
    .w-rain{background:#1a1a3a;color:#88aaff;border:1px solid #2a2a5a}
    .w-heavy{background:#0a0a2a;color:#6688ff;border:1px solid #2a2a6a}

    /* BOUTONS */
    .btn{font-family:var(--fh);font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;padding:7px 16px;border:none;border-radius:4px;cursor:pointer;transition:all .15s;white-space:nowrap;text-decoration:none;display:inline-block}
    .btn-red{background:var(--accent);color:#fff}
    .btn-red:hover{background:#ff1a52}
    .btn-red:disabled{background:#3a1a22;color:#664;cursor:not-allowed}
    .btn-sec{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
    .btn-sec:hover{border-color:var(--accent);color:var(--accent)}
    .btn-gold{background:#1a1a00;color:var(--gold);border:1px solid #3a3a00}
    .btn-gold:hover{background:#2a2a00}
    .btn-green{background:#001a0a;color:var(--green);border:1px solid #003a18}

    /* FP SESSION CARD */
    .fp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    @media(max-width:600px){.fp-grid{grid-template-columns:1fr}}
    .fp-card{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:12px}
    .fp-card.done{border-color:var(--green)}
    .fp-title{font-family:var(--fh);font-weight:900;font-size:15px;margin-bottom:6px}
    .fp-driver{font-family:var(--fh);font-size:12px;color:var(--muted);margin-bottom:8px}
    .select-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;align-items:center}
    .lbl{font-family:var(--fh);font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;min-width:50px}
    select.sel{font-family:var(--fh);font-size:12px;background:var(--surface);color:var(--text);border:1px solid var(--border);padding:4px 8px;border-radius:4px;outline:none;flex:1}
    .fp-result{background:#0a0a14;border-radius:4px;padding:8px;margin-top:6px;font-family:var(--fh);font-size:11px}
    .fp-result .best{color:var(--gold);font-size:15px;font-weight:900}
    .fp-result .laps-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
    .fp-result .lap{background:var(--surface2);padding:2px 6px;border-radius:3px;font-size:10px;color:var(--muted)}
    .fp-result .lap.best-lap{color:var(--gold);border:1px solid #3a3a00;background:#1a1a00}
    .tyre-bar-wrap{height:3px;background:#0a0a14;border-radius:2px;margin-top:5px;overflow:hidden}
    .tyre-bar-fill{height:100%;border-radius:2px;transition:width .4s}
    .knowledge-box{background:#001a0a;border:1px solid #003a18;border-radius:5px;padding:10px 12px;font-family:var(--fh);font-size:12px}
    .knowledge-title{color:var(--green);font-weight:700;font-size:13px;margin-bottom:5px}

    /* QUALI */
    .quali-setup{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    @media(max-width:600px){.quali-setup{grid-template-columns:1fr}}
    .driver-quali-card{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:12px}
    .dqc-name{font-family:var(--fh);font-weight:900;font-size:16px;margin-bottom:6px}

    /* RÉSULTATS QUALI */
    .quali-results{display:flex;flex-direction:column;gap:3px}
    .qrow{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:4px;font-family:var(--fh);font-size:13px}
    .qrow.player{background:#1a1a00;border:1px solid #3a3a00}
    .qrow.pole{background:#1a0a00;border:1px solid #5a2a00}
    .qpos{font-weight:900;font-size:16px;width:28px;text-align:center}
    .qpos.p1{color:var(--gold)} .qpos.p2{color:#c0c0c0} .qpos.p3{color:#cd7f32}
    .qnum{font-size:11px;color:var(--muted);width:22px}
    .qbar{width:3px;height:20px;border-radius:2px;flex-shrink:0}
    .qname{flex:1;font-weight:700}
    .qtime{font-size:12px;color:var(--muted);text-align:right}
    .qgap{font-size:11px;color:var(--muted);width:70px;text-align:right}
    .q-elim{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:#2a0a0a;color:#ff6666;border:1px solid #5a1a1a}
    .q-player-badge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:#1a1a00;color:var(--gold);border:1px solid #3a3a00}

    /* STRATÉGIE PRÉ-COURSE */
    .strat-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:8px 0;border-bottom:1px solid var(--border)}
    .strat-row:last-child{border-bottom:0}
    .strat-name{min-width:80px;font-family:var(--fh);font-weight:700;font-size:14px}
    .strat-grid-pos{font-family:var(--fh);font-weight:900;font-size:18px;color:var(--gold);width:30px;text-align:center}
    .mini-sel{background:#101018;color:var(--text);border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-family:var(--fh);font-size:12px;outline:none}

    /* TOAST */
    .toast{position:fixed;bottom:20px;right:20px;background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:5px;padding:12px 16px;font-family:var(--fh);font-size:13px;z-index:500;transform:translateX(120%);transition:transform .3s;max-width:300px}
    .toast.show{transform:translateX(0)}
    .toast.error{border-left-color:var(--accent)}

    ::-webkit-scrollbar{width:3px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo">F1<span>Manager</span></div>
  <a href="index.html"     class="nav-link">🏠 Équipe</a>
  <a href="weekend.html"   class="nav-link active">🏁 Weekend</a>
  <a href="standings.html" class="nav-link">🏆 Champ.</a>
  <a href="drivers.html"   class="nav-link">👤 Pilotes</a>
  <div class="tb-right">
    <div class="pill" id="seasonBadge">—</div>
    <div class="pill" id="raceBadge" style="color:var(--gold)">—</div>
  </div>
</div>

<div class="page">

  <!-- PHASES DU WEEKEND -->
  <div class="phases" id="phasesBar"></div>

  <!-- CONTENU DYNAMIQUE -->
  <div id="weekendContent"></div>

</div>

<div class="toast" id="toast"></div>

<script src="js/data.js"></script>
<script src="js/save.js"></script>
<script src="js/engine.js"></script>
<script src="js/events.js"></script>
<script src="js/career.js"></script>
<script src="js/weekend.js"></script>
<script>

// ══════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════
let save       = null;
let circuit    = null;
let myDrivers  = [];
let phase      = 'fp'; // fp | quali | race_briefing

// Résultats accumulés
let fpResults  = [];   // résultats EL
let qualiResult= null; // résultat qualifs

const CIRCUIT_FLAGS = {
  bahrain:'🇧🇭',jeddah:'🇸🇦',melbourne:'🇦🇺',imola:'🇮🇹',miami:'🇺🇸',monaco:'🇲🇨',
  canada:'🇨🇦',barcelona:'🇪🇸',austria:'🇦🇹',silverstone:'🇬🇧',hungary:'🇭🇺',
  spa:'🇧🇪',zandvoort:'🇳🇱',monza:'🇮🇹',baku:'🇦🇿',singapore:'🇸🇬',suzuka:'🇯🇵',
  qatar:'🇶🇦',cota:'🇺🇸',mexico:'🇲🇽',brazil:'🇧🇷',vegas:'🇺🇸',abudhabi:'🇦🇪',
};

// ══════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════
function init() {
  save = Save.load();
  if (!save || !save.playerTeamId) {
    document.querySelector('.page').innerHTML = `<div style="padding:40px;text-align:center;color:var(--muted);font-family:var(--fh)"><div style="font-size:22px;margin-bottom:12px">Aucune carrière trouvée</div><a href="index.html" class="btn btn-red">Créer une carrière</a></div>`;
    return;
  }

  // Restaurer pilotes
  if (save.driverStates) {
    F1Data.drivers.forEach(d => {
      const st = save.driverStates[d.id];
      if (st) Object.assign(d, st);
    });
  }
  if (save.generatedDrivers?.length) {
    save.generatedDrivers.forEach(gd => {
      if (!F1Data.drivers.find(d => d.id === gd.id)) F1Data.drivers.push(gd);
    });
  }

  circuit   = F1Data.circuits[(save.race || 0) % F1Data.circuits.length];
  myDrivers = F1Data.drivers.filter(d => d.teamId === save.playerTeamId && !d.retired);

  // Générer météo weekend si pas encore fait
  if (!save.weekendWeather || save.weekendCircuit !== circuit.id) {
    save.weekendWeather  = Weekend.generateWeekendWeather(circuit);
    save.weekendCircuit  = circuit.id;
    save.weekendFPDone   = 0;  // nombre de séances EL faites
    save.weekendQualiDone= false;
    save.weekendSetup    = 'balanced';
    save.qualiGrid       = null;
    save.qualiStrategy   = {};
    Save.save(save);
  }

  // Restaurer état weekend
  fpResults   = save.weekendFPResults || [];
  qualiResult = save.qualiGrid ? { grid: save.qualiGrid, poleTime: save.qualiGrid[0]?.qualiTime } : null;

  // Déterminer la phase courante
  if (save.weekendQualiDone) phase = 'race_briefing';
  else if (save.weekendFPDone >= 3) phase = 'quali';
  else phase = 'fp';

  document.getElementById('seasonBadge').textContent = `Saison ${save.season || 2025}`;
  document.getElementById('raceBadge').textContent   = `GP ${(save.race || 0) + 1} — ${circuit.name}`;

  renderPhases();
  renderContent();
}

// ══════════════════════════════════════════════════════════
//  PHASES BAR
// ══════════════════════════════════════════════════════════
function renderPhases() {
  const phases = [
    { id:'fp',            icon:'🔧', label:'Essais Libres', done: save.weekendFPDone >= 3 },
    { id:'quali',         icon:'⚡', label:'Qualifications', done: save.weekendQualiDone },
    { id:'race_briefing', icon:'🏁', label:'Course',        done: false },
  ];

  document.getElementById('phasesBar').innerHTML = phases.map(p => {
    const isDone   = p.done;
    const isActive = p.id === phase;
    const isLocked = (p.id === 'quali' && save.weekendFPDone < 3) || (p.id === 'race_briefing' && !save.weekendQualiDone);
    const cls = isDone ? 'done' : isActive ? 'active' : isLocked ? 'locked' : '';
    return `<div class="phase ${cls}" onclick="goPhase('${p.id}')">
      <span class="phase-icon">${isDone ? '✅' : p.icon}</span>${p.label}
    </div>`;
  }).join('');
}

function goPhase(p) {
  if (p === 'quali' && save.weekendFPDone < 3) { toast('❌ Termine les 3 séances d\'essais libres d\'abord !', true); return; }
  if (p === 'race_briefing' && !save.weekendQualiDone) { toast('❌ Fais les qualifications d\'abord !', true); return; }
  phase = p;
  renderPhases();
  renderContent();
}

// ══════════════════════════════════════════════════════════
//  DISPATCH CONTENU
// ══════════════════════════════════════════════════════════
function renderContent() {
  const content = document.getElementById('weekendContent');
  content.innerHTML = '';
  content.appendChild(buildCircuitHero());
  if (phase === 'fp')            content.appendChild(buildFPSection());
  else if (phase === 'quali')    content.appendChild(buildQualiSection());
  else                           content.appendChild(buildRaceBriefing());
}

// ── CIRCUIT HERO ─────────────────────────────────────────
function buildCircuitHero() {
  const flag  = CIRCUIT_FLAGS[circuit.id] || '🏁';
  const w     = save.weekendWeather || 'dry';
  const wText = w === 'heavy_rain' ? '⛈️ Forte pluie' : w === 'light_rain' ? '🌧️ Pluie légère' : '☀️ Sec';
  const wCls  = w === 'heavy_rain' ? 'w-heavy' : w === 'light_rain' ? 'w-rain' : 'w-dry';

  const el = document.createElement('div');
  el.className = 'panel';
  el.innerHTML = `
    <div class="circuit-hero">
      <div class="circuit-flag">${flag}</div>
      <div>
        <div class="circuit-name">${circuit.fullName || circuit.name}</div>
        <div class="circuit-full">Grand Prix de ${circuit.name} · Saison ${save.season || 2025}</div>
        <div class="circuit-stats">
          <div class="cstat">🔄 <span>${circuit.laps}</span> tours</div>
          <div class="cstat">📏 <span>${circuit.lapDistance}</span> km/tour</div>
          <div class="cstat">⏱ <span>${Weekend.fmtTime(circuit.baseLapTime)}</span> ref.</div>
          <div class="cstat">🏎️ DRS <span>${circuit.drsZones}</span> zones</div>
          <div class="cstat">🔧 Pit <span>${circuit.pitLoss}s</span></div>
        </div>
      </div>
      <div class="weather-badge ${wCls}">${wText}</div>
    </div>`;
  return el;
}

// ══════════════════════════════════════════════════════════
//  ESSAIS LIBRES
// ══════════════════════════════════════════════════════════
function buildFPSection() {
  const el = document.createElement('div');

  // Connaissance circuit actuelle
  const knowledge = Weekend.calcKnowledgeBonus(fpResults);
  const sessions  = ['EL1','EL2','EL3'];

  el.innerHTML = `
    <div class="panel" style="margin-bottom:10px">
      <div class="ph"><div class="dot"></div>🔧 Essais Libres — ${save.weekendFPDone}/3 séances
        <span class="ml">${knowledge.label}</span>
      </div>
      <div class="content">
        <div style="font-family:var(--fh);font-size:12px;color:var(--muted);margin-bottom:10px">
          Chaque séance te donne des données précieuses. Les long runs révèlent la dégradation,
          les quali sims donnent le temps de référence, le travail de setup améliore ta voiture.
        </div>
        ${save.weekendFPDone < 3 ? `
        <div class="knowledge-box">
          <div class="knowledge-title">📊 Bonus de connaissance</div>
          <div style="display:flex;gap:12px;font-family:var(--fh);font-size:11px;color:var(--muted)">
            <span>🛞 Pneus +${(knowledge.tyreBonus * 100).toFixed(0)}%</span>
            <span>⚙️ Setup +${(knowledge.setupBonus * 100).toFixed(0)}%</span>
            <span>⏱ Pace +${(knowledge.paceBonus * 100).toFixed(0)}%</span>
          </div>
        </div>` : ''}
      </div>
    </div>

    <div class="panel">
      <div class="ph"><div class="dot"></div>Configuration séance ${save.weekendFPDone + 1} — ${sessions[save.weekendFPDone] || 'Terminé'}</div>
      <div class="content" id="fpConfig">
        ${save.weekendFPDone < 3 ? buildFPConfig() : buildFPSummary()}
      </div>
    </div>
  `;

  return el;
}

function buildFPConfig() {
  const compounds = Object.keys(F1Data.tyres);

  return myDrivers.map(driver => `
    <div class="fp-card" id="fp-card-${driver.id}">
      <div class="fp-title">${driver.firstName} ${driver.name}</div>
      <div class="fp-driver">${F1Data.teams.find(t=>t.id===driver.teamId)?.name || '—'}</div>
      <div class="select-row">
        <span class="lbl">Pneu</span>
        <select class="sel" id="fp-compound-${driver.id}">
          ${compounds.filter(c=>!['INTER','WET'].includes(c) || save.weekendWeather !== 'dry').map(c =>
            `<option value="${c}" ${c==='MEDIUM'?'selected':''}>${F1Data.tyres[c].name}</option>`
          ).join('')}
        </select>
      </div>
      <div class="select-row">
        <span class="lbl">Programme</span>
        <select class="sel" id="fp-program-${driver.id}">
          ${Weekend.PROGRAM_OPTIONS.map(p =>
            `<option value="${p.id}">${p.label} — ${p.desc}</option>`
          ).join('')}
        </select>
      </div>
    </div>
  `).join('') + `
    <div style="margin-top:10px">
      <div class="select-row" style="margin-bottom:8px">
        <span class="lbl">Setup global</span>
        <select class="sel" id="fp-setup">
          ${Weekend.SETUP_OPTIONS.map(s =>
            `<option value="${s.id}" ${s.id===save.weekendSetup?'selected':''}>${s.label} — ${s.desc}</option>`
          ).join('')}
        </select>
      </div>
      <button class="btn btn-red" onclick="runFP()">🚦 Lancer la séance</button>
    </div>
  `;
}

function buildFPResults(results) {
  return results.map(r => {
    const driver  = F1Data.drivers.find(d => d.id === r.driver);
    const tyre    = F1Data.tyres[r.compound];
    const minLap  = Math.min(...r.lapTimes);
    const tyreClr = r.finalWear > 60 ? '#ff4444' : r.finalWear > 35 ? '#ffea00' : '#00e676';

    return `
      <div class="fp-card done" style="margin-bottom:8px">
        <div class="fp-title">${driver?.firstName} ${driver?.name} — <span style="color:${tyre.color}">${tyre.name}</span></div>
        <div class="fp-result">
          <div class="best">⏱ ${Weekend.fmtTime(r.bestLap)}</div>
          <div style="color:var(--muted);font-size:10px;margin-top:2px">Moy: ${Weekend.fmtTime(r.avgLap)} · Usure: ${r.finalWear.toFixed(0)}% · Vie restante: ${r.tyreLife.toFixed(0)}%</div>
          <div class="laps-row">
            ${r.lapTimes.map(l => `<span class="lap${l===minLap?' best-lap':''}">${l.toFixed(3)}</span>`).join('')}
          </div>
          <div style="margin-top:5px;font-size:10px;color:var(--muted)">Dégradation</div>
          <div class="tyre-bar-wrap"><div class="tyre-bar-fill" style="width:${r.finalWear}%;background:${tyreClr}"></div></div>
        </div>
      </div>
    `;
  }).join('');
}

function buildFPSummary() {
  const knowledge = Weekend.calcKnowledgeBonus(fpResults);
  return `
    <div class="knowledge-box" style="margin-bottom:12px">
      <div class="knowledge-title">✅ ${knowledge.label} — Bonus acquis</div>
      <div style="display:flex;gap:16px;font-family:var(--fh);font-size:12px;margin-top:5px">
        <span style="color:var(--gold)">🛞 Dégradation -${(knowledge.tyreBonus*100).toFixed(0)}%</span>
        <span style="color:var(--blue)">⚙️ Setup +${(knowledge.setupBonus*100).toFixed(0)}%</span>
        <span style="color:var(--green)">⏱ Pace +${(knowledge.paceBonus*100).toFixed(0)}%</span>
      </div>
    </div>
    ${buildFPResults(fpResults)}
    <div style="margin-top:12px;display:flex;gap:8px">
      <button class="btn btn-red" onclick="goPhase('quali')">⚡ Passer aux qualifications →</button>
    </div>
  `;
}

function runFP() {
  if (save.weekendFPDone >= 3) { toast('Les 3 séances sont déjà terminées !', true); return; }

  const setup = document.getElementById('fp-setup')?.value || 'balanced';
  save.weekendSetup = setup;

  const sessionResults = [];

  myDrivers.forEach(driver => {
    const compound = document.getElementById(`fp-compound-${driver.id}`)?.value || 'MEDIUM';
    const program  = document.getElementById(`fp-program-${driver.id}`)?.value  || 'quali_sim';
    const result   = Weekend.simulateFP(save, circuit, driver, compound, program, setup);
    if (result) sessionResults.push(result);
  });

  fpResults = [...fpResults, ...sessionResults];
  save.weekendFPResults = fpResults;
  save.weekendFPDone    = (save.weekendFPDone || 0) + 1;
  Save.save(save);

  toast(`✅ Séance EL${save.weekendFPDone} terminée !`);

  renderPhases();
  renderContent();
}

// ══════════════════════════════════════════════════════════
//  QUALIFICATIONS
// ══════════════════════════════════════════════════════════
function buildQualiSection() {
  const el = document.createElement('div');

  const knowledge = Weekend.calcKnowledgeBonus(fpResults);

  if (!save.weekendQualiDone) {
    // Config qualifications
    el.innerHTML = `
      <div class="panel" style="margin-bottom:10px">
        <div class="ph"><div class="dot"></div>⚡ Qualifications — Configuration</div>
        <div class="content">
          <div style="font-family:var(--fh);font-size:12px;color:var(--muted);margin-bottom:10px">
            Q1 → 20 pilotes (élimine les 5 derniers) · Q2 → 15 pilotes (élimine les 5 derniers) · Q3 → 10 pilotes (pole position)
            <br>En Q3 : tout le monde roule en <strong style="color:#FF3333">Soft</strong>.
          </div>
          <div class="quali-setup" id="qualiConfig">
            ${myDrivers.map(driver => `
              <div class="driver-quali-card">
                <div class="dqc-name">${driver.firstName} ${driver.name}</div>
                <div class="select-row">
                  <span class="lbl">Mode</span>
                  <select class="sel" id="qm-${driver.id}">
                    <option value="push">🔥 Push — Tour lancé max</option>
                    <option value="normal" selected>◼ Normal</option>
                  </select>
                </div>
                <div style="font-family:var(--fh);font-size:10px;color:var(--muted);margin-top:4px">
                  Pneu : ${save.weekendWeather==='heavy_rain'?'Full Wet':save.weekendWeather==='light_rain'?'Inter':'🔴 Soft (Q3) / Soft (Q1-Q2)'} · Bonus EL: ${knowledge.paceBonus>0?'+'+knowledge.paceBonus.toFixed(2)+'s':'—'}
                </div>
              </div>
            `).join('')}
          </div>
          <div style="margin-top:12px">
            <button class="btn btn-red" onclick="runQuali()">⚡ Lancer les qualifications</button>
          </div>
        </div>
      </div>
    `;
  } else {
    // Résultats qualifications
    el.appendChild(buildQualiResults());
  }

  return el;
}

function runQuali() {
  // Sauvegarder les stratégies quali
  save.qualiStrategy = {};
  myDrivers.forEach(driver => {
    save.qualiStrategy[driver.id] = {
      mode: document.getElementById(`qm-${driver.id}`)?.value || 'normal',
    };
  });

  // Appliquer les bonus EL
  const knowledge = Weekend.calcKnowledgeBonus(fpResults);
  save.weekendKnowledge = knowledge;

  // Simuler
  qualiResult = Weekend.simulateQuali(save, circuit);

  save.qualiGrid        = qualiResult.grid;
  save.weekendQualiDone = true;
  Save.save(save);

  phase = 'race_briefing';
  renderPhases();
  renderContent();
  toast('🏁 Qualifications terminées !');
}

function buildQualiResults() {
  if (!qualiResult) return document.createElement('div');
  const el   = document.createElement('div');
  const grid = qualiResult.grid;
  const pole = grid[0];

  const playerPositions = grid.filter(d => d.isPlayer).map(d => `P${d.gridPos}`).join(' / ');

  el.innerHTML = `
    <div class="panel">
      <div class="ph"><div class="dot"></div>⚡ Résultats des qualifications
        <span class="ml">Tes pilotes : ${playerPositions}</span>
      </div>
      <div class="content">
        <div style="font-family:var(--fh);font-size:12px;color:var(--muted);margin-bottom:10px">
          🏆 Pole position : <strong style="color:var(--gold)">${getDriverName(pole?.driverId)}</strong> — ${Weekend.fmtTime(pole?.qualiTime || 0)}
        </div>
        <div class="quali-results">
          ${grid.map(d => {
            const driver = F1Data.drivers.find(dr => dr.id === d.driverId);
            const team   = F1Data.teams.find(t => t.id === d.teamId);
            const pc     = d.gridPos <= 3 ? `p${d.gridPos}` : '';
            const gap    = d.gridPos === 1 ? Weekend.fmtTime(d.qualiTime) : Weekend.fmtGap(pole.qualiTime, d.qualiTime);
            return `
              <div class="qrow${d.isPlayer?' player':''}${d.gridPos===1?' pole':''}">
                <div class="qpos ${pc}">${d.gridPos}</div>
                <div class="qnum">${driver?.number || '?'}</div>
                <div class="qbar" style="background:${team?.color||'#888'}"></div>
                <div class="qname">${driver?.firstName||''} ${driver?.name||'?'}
                  ${d.isPlayer?'<span class="q-player-badge">MON PILOTE</span>':''}
                </div>
                <div class="qgap">${gap}</div>
                <div class="qtime">${d.eliminatedIn === 'Q1' ? '<span class="q-elim">éliminé Q1</span>' : d.eliminatedIn === 'Q2' ? '<span class="q-elim">éliminé Q2</span>' : ''}</div>
              </div>
            `;
          }).join('')}
        </div>
        <div style="margin-top:14px">
          <button class="btn btn-red" onclick="goPhase('race_briefing')">🏁 Briefing course →</button>
        </div>
      </div>
    </div>
  `;
  return el;
}

// ══════════════════════════════════════════════════════════
//  BRIEFING COURSE (stratégie pré-course)
// ══════════════════════════════════════════════════════════
function buildRaceBriefing() {
  const el       = document.createElement('div');
  const grid     = save.qualiGrid || [];
  const knowledge= save.weekendKnowledge || { tyreBonus:0, setupBonus:0, paceBonus:0 };

  // Fenêtres de pit recommandées depuis les EL
  const longRun = fpResults.filter(r => r.program === 'long_run')[0];

  // Calculer l'estimation de durée par compound depuis les EL
  const tyreEstimates = calcTyreEstimates();

  let pitWindow = '';
  if (longRun) {
    const cliffIdx = longRun.tyreData.findIndex(c => c < 30);
    if (cliffIdx > 0) {
      // Extrapoler sur la durée d'un vrai relais
      const wearPerLap = (100 - longRun.tyreLife) / longRun.laps;
      const cliffLap   = Math.round((100 - 30) / wearPerLap);
      pitWindow = `${F1Data.tyres[longRun.compound].name} : cliff estimé vers le tour ${Math.min(cliffLap, circuit.laps - 3)}`;
    } else {
      const wearPerLap = (100 - longRun.tyreLife) / longRun.laps;
      const lifeTotal  = Math.round(70 / wearPerLap); // jusqu'à 30% restant
      pitWindow = `${F1Data.tyres[longRun.compound].name} : durée estimée ~${Math.min(lifeTotal, circuit.laps)} tours`;
    }
  }

  el.innerHTML = `
    <div class="panel" style="margin-bottom:10px">
      <div class="ph"><div class="dot"></div>📋 Briefing pré-course</div>
      <div class="content">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
          <div style="background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:10px;font-family:var(--fh);font-size:12px">
            <div style="color:var(--gold);font-weight:700;margin-bottom:5px">📊 Bilan du weekend</div>
            <div style="color:var(--muted)">EL effectuées : <strong style="color:var(--text)">${save.weekendFPDone}/3</strong></div>
            <div style="color:var(--muted)">Bonus pneus : <strong style="color:var(--green)">-${(knowledge.tyreBonus*100).toFixed(0)}% dégradation</strong></div>
            <div style="color:var(--muted)">Bonus setup : <strong style="color:var(--blue)">+${(knowledge.setupBonus*100).toFixed(0)}% stabilité</strong></div>
            ${pitWindow ? `<div style="color:var(--orange);margin-top:4px">⚠️ ${pitWindow}</div>` : ''}
            ${tyreEstimates.length ? `
              <div style="margin-top:6px;font-weight:700;color:var(--text)">Estimations durée pneus :</div>
              ${tyreEstimates.map(e => `
                <div style="color:${e.color}">● ${e.compound} : ~${e.life} tours · Dégradation ~${e.wearPerLap.toFixed(1)}%/tour</div>
              `).join('')}
            ` : ''}
          </div>
          <div style="background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:10px;font-family:var(--fh);font-size:12px">
            <div style="color:var(--gold);font-weight:700;margin-bottom:5px">🏎️ Grille de départ</div>
            ${grid.filter(d => d.isPlayer).map(d => {
              const driver = F1Data.drivers.find(dr => dr.id === d.driverId);
              return `<div style="color:var(--text)"><strong style="color:var(--gold)">P${d.gridPos}</strong> — ${driver?.firstName||''} ${driver?.name||'?'}</div>`;
            }).join('') || '<div style="color:var(--muted)">Grille non disponible</div>'}
            <div style="color:var(--muted);margin-top:4px">Circuit : ${circuit.overtakingDifficulty > 0.7 ? '⛔ Dépassements difficiles' : circuit.overtakingDifficulty < 0.4 ? '✅ Piste propice aux dépassements' : '⚠️ Dépassements possibles'}</div>
          </div>
        </div>

        <div class="ph" style="border:1px solid var(--border);border-radius:5px;margin-bottom:8px"><div class="dot"></div>🔧 Stratégie de course — Tes pilotes</div>
        <div id="raceStratConfig">
          ${myDrivers.map(driver => {
            const gridEntry = grid.find(g => g.driverId === driver.id);
            const gridPos   = gridEntry?.gridPos || '?';
            const defPit    = circuit.tyreDegradation > 1.2 ? [Math.round(circuit.laps*0.33), Math.round(circuit.laps*0.66)] : [Math.round(circuit.laps*0.48)];
            return `
              <div class="strat-row">
                <div class="strat-grid-pos">P${gridPos}</div>
                <div class="strat-name">${driver.firstName} ${driver.name}</div>
                <select class="mini-sel" id="rc1-${driver.id}">
                  ${tyreOpts('MEDIUM')}
                </select>
                <span style="font-family:var(--fh);font-size:11px;color:var(--muted)">→ T.</span>
                <input class="mini-sel" id="rp1-${driver.id}" type="number" min="2" max="${circuit.laps-3}" value="${defPit[0]||''}" style="width:52px">
                <select class="mini-sel" id="rc2-${driver.id}">
                  ${tyreOpts('HARD')}
                </select>
                <span style="font-family:var(--fh);font-size:11px;color:var(--muted)">→ T.</span>
                <input class="mini-sel" id="rp2-${driver.id}" type="number" min="2" max="${circuit.laps-3}" value="${defPit[1]||''}" style="width:52px">
                <select class="mini-sel" id="rc3-${driver.id}">
                  ${tyreOpts('SOFT')}
                </select>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    </div>

    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-sec" onclick="goPhase('quali')">← Revoir les qualifs</button>
      <button class="btn btn-red" onclick="goToRace()">🏁 Lancer la course !</button>
    </div>
  `;
  return el;
}

function tyreOpts(sel) {
  return ['SOFT','MEDIUM','HARD','INTER','WET'].map(c =>
    `<option value="${c}" ${c===sel?'selected':''}>${F1Data.tyres[c].name}</option>`
  ).join('');
}

// Calcule l'estimation de durée pour chaque compound testé en EL
function calcTyreEstimates() {
  const estimates = [];
  const tested    = {};

  fpResults.forEach(r => {
    if (r.program !== 'long_run' && r.program !== 'quali_sim') return;
    if (tested[r.compound]) return;
    tested[r.compound] = true;

    const wearPerLap = (100 - r.tyreLife) / r.laps;
    if (wearPerLap <= 0) return;

    // Estimer combien de tours avant d'atteindre 20% de vie (cliff)
    const lifeTotal = Math.round(80 / wearPerLap);
    const tyre      = F1Data.tyres[r.compound];

    estimates.push({
      compound:   r.compound,
      color:      tyre.color,
      life:       Math.min(lifeTotal, circuit.laps),
      wearPerLap: wearPerLap,
    });
  });

  // Si pas de données EL, estimer depuis les stats circuit
  if (!estimates.length) {
    ['SOFT','MEDIUM','HARD'].forEach(c => {
      const tyre       = F1Data.tyres[c];
      const wearPerLap = tyre.degradationRate * circuit.tyreDegradation * 100;
      const lifeTotal  = Math.round(80 / wearPerLap);
      estimates.push({ compound:c, color:tyre.color, life:Math.min(lifeTotal,circuit.laps), wearPerLap });
    });
  }

  return estimates.sort((a,b) => a.life - b.life); // du plus fragile au plus dur
}

function goToRace() {
  // Sauvegarder les stratégies de course
  const strategies = {};
  myDrivers.forEach(driver => {
    const c1 = document.getElementById(`rc1-${driver.id}`)?.value || 'MEDIUM';
    const c2 = document.getElementById(`rc2-${driver.id}`)?.value || 'HARD';
    const c3 = document.getElementById(`rc3-${driver.id}`)?.value || 'SOFT';
    const p1 = parseInt(document.getElementById(`rp1-${driver.id}`)?.value || '', 10);
    const p2 = parseInt(document.getElementById(`rp2-${driver.id}`)?.value || '', 10);
    const compounds = [c1, c2];
    const pitLaps   = [];
    if (Number.isFinite(p1)) pitLaps.push(p1);
    if (Number.isFinite(p2)) { pitLaps.push(p2); compounds.push(c3); }
    strategies[driver.id] = { compounds, pitLaps };
  });

  save.raceStrategies  = strategies;
  save.raceQualiGrid   = save.qualiGrid;
  save.weekendKnowledge= save.weekendKnowledge || {};
  Save.save(save);

  window.location.href = 'race.html';
}

// ── HELPERS ─────────────────────────────────────────────
function getDriverName(id) {
  const d = F1Data.drivers.find(dr => dr.id === id);
  return d ? `${d.firstName} ${d.name}` : '—';
}

function toast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = `toast${isError?' error':''}`;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

init();
</script>
</body>
</html>
